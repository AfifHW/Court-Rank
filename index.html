<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CourtRank</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@500;600;700&family=DM+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/lz-string/1.5.0/lz-string.min.js"></script>

  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "react/jsx-runtime": "https://esm.sh/react@18.2.0/jsx-runtime",
        "react/jsx-dev-runtime": "https://esm.sh/react@18.2.0/jsx-dev-runtime"
      }
    }
  </script>

  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    :root {
      --cr-bg: #FAF7F2;
      --cr-surface: #FFFFFF;
      --cr-surface-2: #DCEEF9;
      --cr-ink: #16232E;
      --cr-muted: #52677F;
      --cr-line: #16232E;
      --cr-primary: #E4574F;
      --cr-primary-strong: #E4574F;
      --cr-secondary: #16232E;
      --cr-tertiary: #F0B429;
      --cr-accent-blue: #3A7BD5;
      --cr-accent-blue-soft: #3A7BD51A;
      --cr-accent-blue-line: #3A7BD54D;
      --cr-danger-soft: #FFE9EC;
      --cr-success: #0F8A5F;
      --cr-space-1: 4px;
      --cr-space-2: 8px;
      --cr-space-3: 12px;
      --cr-space-4: 16px;
      --cr-space-6: 24px;
      --cr-space-8: 32px;
      --cr-radius-sm: 10px;
      --cr-radius-md: 14px;
      --cr-radius-lg: 18px;
      --cr-radius-xl: 22px;
      --cr-shadow-hard: 3px 3px 0 var(--cr-line);
      --cr-shadow-soft: 0 14px 34px rgba(22, 35, 46, 0.14);
      --cr-tap: 0.97;
      --cr-ease: 180ms ease-in-out;
      --cr-safe-top: env(safe-area-inset-top, 0px);
      --cr-safe-bottom: env(safe-area-inset-bottom, 0px);
    }
    html {
      overflow-y: scroll;
      scrollbar-gutter: stable;
      background: var(--cr-bg);
      -webkit-text-size-adjust: 100%;
    }
    body {
      margin: 0;
      padding: 0;
      background: var(--cr-bg);
      color: var(--cr-ink);
      font-family: 'DM Sans', sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      touch-action: manipulation;
    }
    #root { min-height: 100dvh; background: var(--cr-bg); }
    * { box-sizing: border-box; }
    input, button, select, textarea { font-family: inherit; font-size: 14px; }
    button, [role="button"] {
      min-height: 44px;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      transition: transform var(--cr-ease), opacity var(--cr-ease), filter var(--cr-ease), box-shadow var(--cr-ease), border-color var(--cr-ease), background-color var(--cr-ease);
    }
    button:active, [role="button"]:active { transform: scale(var(--cr-tap)); filter: brightness(0.96); }
    button:disabled { opacity: 0.62; cursor: not-allowed !important; transform: none; }
    input, select, textarea {
      min-height: 44px;
      transition: border-color var(--cr-ease), box-shadow var(--cr-ease), background-color var(--cr-ease);
    }
    input:focus, select:focus, textarea:focus, button:focus-visible {
      outline: none;
      box-shadow: 0 0 0 3px rgba(228, 87, 79, 0.22) !important;
      border-color: var(--cr-primary) !important;
    }
    a { color: var(--cr-primary-strong); }
    .cr-skeleton {
      position: relative;
      overflow: hidden;
      background: linear-gradient(90deg, rgba(22, 35, 46,0.08), rgba(255,255,255,0.78), rgba(22, 35, 46,0.08));
      background-size: 220% 100%;
      animation: shimmer 1.25s ease-in-out infinite;
    }
    .cr-touch-row { min-height: 48px; }
    @keyframes shimmer {
      0% { background-position: 100% 0; }
      100% { background-position: -100% 0; }
    }
    @keyframes slideDown {
      from { transform: translateY(-100%); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(-18%); animation-timing-function: cubic-bezier(0.8,0,1,1); }
      50% { transform: translateY(0); animation-timing-function: cubic-bezier(0,0,0.2,1); }
    }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; scroll-behavior: auto !important; transition-duration: 0.01ms !important; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useMemo, useCallback, useEffect, useRef } from "react";
    import { createRoot } from "react-dom/client";

    const TIER_WEIGHT = { S: 500, A: 400, B: 300, C: 200, D: 100, E: 50 };
    const TIER_COLORS = {
      S: { bg: "#fef3c7", text: "#92400e", border: "#fcd34d" },
      A: { bg: "#ede9fe", text: "#5b21b6", border: "#c4b5fd" },
      B: { bg: "#dbeafe", text: "#1e40af", border: "#93c5fd" },
      C: { bg: "#dcfce7", text: "#166534", border: "#86efac" },
      D: { bg: "#f1f5f9", text: "#475569", border: "#44515E" },
      E: { bg: "#fce7f3", text: "#9d174d", border: "#f9a8d4" },
    };

    const INITIAL_PLAYERS = [
      { id: 1, name: "Wowo", tier: "S" },
      { id: 2, name: "Bunted", tier: "A" },
      { id: 3, name: "Lilbah", tier: "A" },
      { id: 4, name: "Mulyono", tier: "B" },
      { id: 5, name: "Gib run", tier: "B" },
      { id: 6, name: "Loe Hut", tier: "C" },
      { id: 7, name: "Tok hir", tier: "C" },
      { id: 8, name: "PuHan", tier: "D" },
      { id: 9, name: "Dak Dan", tier: "D" },
      { id: 10, name: "Siahr oni", tier: "E" },
    ];

    const INITIAL_MATCHES = [
      {
        id: "m1", courtId: 1, status: "done",
        team1: [1, 4], team2: [2, 7],
        games: [{ t1: 21, t2: 15 }, { t1: 18, t2: 21 }, { t1: 21, t2: 19 }],
      },
      {
        id: "m2", courtId: 2, status: "done",
        team1: [3, 6], team2: [5, 8],
        games: [{ t1: 21, t2: 12 }, { t1: 21, t2: 14 }],
      },
      {
        id: "m3", courtId: 1, status: "done",
        team1: [9, 1], team2: [10, 2],
        games: [{ t1: 21, t2: 18 }, { t1: 21, t2: 20 }],
      },
    ];

    // ==========================================
    // FIX #1: R diberikan untuk underdog berdasarkan selisih tier
    // FIX #2: logika return diperjelas agar tidak ada ambiguitas
    // ==========================================
    function calcMatchResult(match, players) {
      const { team1 = [], team2 = [], games = [], tierSnapshot } = match;
      const safeGames = games.map(g => ({ t1: Number(g?.t1) || 0, t2: Number(g?.t2) || 0 }));
      const t1Score = safeGames.reduce((s, g) => s + g.t1, 0);
      const t2Score = safeGames.reduce((s, g) => s + g.t2, 0);
      const gamesWonT1 = safeGames.filter(g => g.t1 > g.t2).length;
      const gamesWonT2 = safeGames.filter(g => g.t2 > g.t1).length;

      let t1Win = gamesWonT1 > gamesWonT2;
      let t2Win = gamesWonT2 > gamesWonT1;
      let isTie = gamesWonT1 === gamesWonT2;

      if (isTie) {
        if (t1Score > t2Score) { t1Win = true; isTie = false; }
        else if (t2Score > t1Score) { t2Win = true; isTie = false; }
      }

      // Opsi A: pakai tierSnapshot jika ada, fallback ke tier current
      const getWeight = id => {
        const tier = (tierSnapshot && tierSnapshot[id]) || players.find(p => p.id === id)?.tier || "E";
        return TIER_WEIGHT[tier] ?? TIER_WEIGHT.E;
      };
      const tw1 = team1.reduce((s, id) => s + getWeight(id), 0);
      const tw2 = team2.reduce((s, id) => s + getWeight(id), 0);
      const diff = Math.abs(tw1 - tw2);
      const underdogTeam = tw1 < tw2 ? 1 : tw2 < tw1 ? 2 : 0;

      // FIX: R underdog dihitung dari hasil match dan selisih tier
      const calcR = (isWinner, isUnderdog) => {
        if (!isUnderdog) return 0;
        if (diff >= 200) return isWinner ? 4 : 2;
        if (diff >= 50) return isWinner ? 2 : 1;
        return 0;
      };

      const lastGame = safeGames[safeGames.length - 1] || { t1: 0, t2: 0 };

      // FIX: loserLastGameScore hanya relevan jika ada pemenang, bukan saat draw
      const calcS = (isWinner, isDraw, loserLastGameScore) => {
        if (isWinner) return 3;
        if (isDraw) return 1;
        return 0;
      };

      // FIX: hitung loserLastGameScore dengan benar — skor set terakhir milik tim yang kalah
      let t1LastGameScore = lastGame.t1;
      let t2LastGameScore = lastGame.t2;

      const t1S = calcS(t1Win, isTie, t1LastGameScore); // t1 kalah → skor terakhirnya adalah t1LastGameScore
      const t2S = calcS(t2Win, isTie, t2LastGameScore);

      // FIX: underdog tetap mendapat R saat draw/kalah sesuai selisih tier
      const t1R = calcR(t1Win, underdogTeam === 1);
      const t2R = calcR(t2Win, underdogTeam === 2);

      return {
        t1Score, t2Score, t1Win, t2Win, isTie,
        t1R, t2R, t1S, t2S, tw1, tw2,
      };
    }

    // ==========================================
    // FIX #3: maxMatches hanya dihitung dari pemain yang hadir (checkedIn)
    // ==========================================
    function buildStandings(players, matches, checkedIn, withM = true) {
      const checkedInPlayers = players.filter(p => checkedIn.has(p.id));

      const maxMatches = (!withM || checkedInPlayers.length === 0) ? 0 : Math.max(
        ...checkedInPlayers.map(p =>
          matches.filter(m => m.status === "done" && [...m.team1, ...m.team2].includes(p.id)).length
        ),
        0
      );

      return players.map(player => {
        const pid = player.id;
        const myMatches = matches.filter(
          m => m.status === "done" && [...m.team1, ...m.team2].includes(pid)
        );
        let totalPts = 0, wins = 0, losses = 0, draws = 0, totalFor = 0, totalAgainst = 0, gamesPlayed = 0, totalR = 0;

        myMatches.forEach(m => {
          const res = calcMatchResult(m, players);
          const onT1 = m.team1.includes(pid);
          const myScore = onT1 ? res.t1Score : res.t2Score;
          const oppScore = onT1 ? res.t2Score : res.t1Score;
          const won = onT1 ? res.t1Win : res.t2Win;
          const isDraw = res.isTie;
          const S = onT1 ? res.t1S : res.t2S;
          const R = onT1 ? res.t1R : res.t2R;

          totalFor += myScore;
          totalAgainst += oppScore;
          gamesPlayed += m.games.length;

          if (won) wins++;
          else if (isDraw) draws++;
          else losses++;

          totalR += R;
          totalPts += myScore + S + R;
        });

        // M hanya di mode Harian (withM=true) dan hanya untuk yang check-in
        const M = (withM && checkedIn.has(pid)) ? Math.max(0, maxMatches - myMatches.length) * 10 : 0;
        const totalPtsWithM = totalPts + M;
        const diff = totalFor - totalAgainst;

        return {
          ...player,
          G: gamesPlayed,
          matchesPlayed: myMatches.length,
          W: wins, D: draws, L: losses,
          totalFor, totalAgainst,
          diff, M, totalR,
          P: totalPtsWithM,
        };
      }).sort((a, b) => {
        if (b.P !== a.P) return b.P - a.P;
        if (b.diff !== a.diff) return b.diff - a.diff;
        return b.W - a.W;
      });
    }

    const TierBadge = ({ tier, small }) => {
      const c = TIER_COLORS[tier];
      return (
        <span style={{
          background: c.bg, color: c.text, border: `1px solid ${c.border}`,
          borderRadius: 6, padding: small ? "1px 6px" : "2px 8px",
          fontSize: small ? 11 : 12, fontWeight: 600, letterSpacing: "0.03em",
        }}>{tier}</span>
      );
    };

    const StandingsLegend = ({ showMPlus = false }) => {
      const items = [
        ["Tier", "level pemain"],
        ["P", "poin klasemen"],
        ["M", showMPlus ? "(+10) jumlah match dimainkan" : "jumlah match dimainkan"],
        ["TS", "poin skor murni"],
        ["Diff", "selisih poin"],
        ["R", "subsidi tier"],
      ];
      return (
        <div style={{
          marginTop: 12, background: "#FFFFFF", border: "2px solid #16232E",
          borderRadius: 10, padding: "10px 12px", fontSize: 11, color: "#44515E",
          lineHeight: 1.35,
        }}>
          <div style={{ color: "#16232E", fontWeight: 800, marginBottom: 8, fontSize: 11, letterSpacing: "0.06em", textTransform: "uppercase" }}>
            Legenda Klasemen
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(2, minmax(0, 1fr))", gap: "6px 10px" }}>
            {items.map(([label, value]) => (
              <div key={label} style={{ display: "grid", gridTemplateColumns: "48px 1fr", alignItems: "center", gap: 6, minWidth: 0 }}>
                <span style={{
                  display: "inline-flex", alignItems: "center", justifyContent: "center",
                  minHeight: 20, padding: "2px 6px", borderRadius: 7,
                  background: "#EDF4EA", border: "1px solid #B7C8D9",
                  color: "var(--cr-accent-blue)", fontWeight: 900, fontSize: 10,
                }}>{label}</span>
                <span style={{ minWidth: 0, color: "#44515E", fontSize: 11 }}>{value}</span>
              </div>
            ))}
          </div>
          <div style={{ marginTop: 8, display: "grid", gridTemplateColumns: "48px 1fr", alignItems: "start", gap: 6, minWidth: 0 }}>
            <span style={{
              display: "inline-flex", alignItems: "center", justifyContent: "center",
              minHeight: 20, padding: "2px 6px", borderRadius: 7,
              background: "#EDF4EA", border: "1px solid #B7C8D9",
              color: "var(--cr-accent-blue)", fontWeight: 900, fontSize: 10,
            }}>WDL</span>
            <span style={{ minWidth: 0, color: "#44515E", fontSize: 11, lineHeight: 1.35 }}>
              W = Win (+3) · D = Draw (+1) · L = Lose (0)
            </span>
          </div>
          {!showMPlus && (
            <div style={{ marginTop: 8, paddingTop: 7, borderTop: "1px solid #D8E1D6", color: "#6D7F94" }}>
              <strong style={{ color: "#16232E" }}>M</strong> di Harian memberi +10 poin untuk pemain yang match-nya lebih sedikit pada sesi harian, tidak berlaku pada klasemen All Time.
            </div>
          )}
        </div>
      );
    };

    const RankingTrendChart = ({ players, matches, sessions }) => {
      const [rangeMode, setRangeMode] = React.useState("5");
      const [pageFromEnd, setPageFromEnd] = React.useState(0);
      const chartShareRef = React.useRef(null);
      const [chartShareBusy, setChartShareBusy] = React.useState(null);
      const colors = ["#E4574F", "#F0B429", "#059669", "#3A7BD5", "#8B5CF6", "#A43D63", "#EA580C", "#16232E"];
      const chart = React.useMemo(() => {
        const sessionOrder = new Map((sessions || []).map((s, idx) => [s.id, idx]));
        const allIds = new Set((players || []).map(p => p.id));
        const doneMatches = (matches || []).filter(m => m.status === "done");
        const doneSessions = (sessions || []).filter((sess, idx) => doneMatches.some(m => (m.sessionId ? m.sessionId === sess.id : idx === 0)));
        const timeline = doneSessions.map(sess => {
          const sessIdx = sessionOrder.has(sess.id) ? sessionOrder.get(sess.id) : 0;
          const cumulative = doneMatches.filter(m => {
            const matchIdx = m.sessionId && sessionOrder.has(m.sessionId) ? sessionOrder.get(m.sessionId) : 0;
            return matchIdx <= sessIdx;
          });
          const standings = buildStandings(players, cumulative, allIds, false);
          const ranks = new Map(standings.map((p, idx) => [p.id, { rank: idx + 1, name: p.name }]));
          return { session: sess, ranks, top5: standings.slice(0, 5).map(p => p.id) };
        });
        const focusIds = [];
        timeline.forEach(point => point.top5.forEach(id => { if (!focusIds.includes(id)) focusIds.push(id); }));
        return { timeline, focusIds };
      }, [players, matches, sessions]);

      const total = chart.timeline.length;
      const pageSize = rangeMode === "all" ? total : Number(rangeMode);
      const pageCount = rangeMode === "all" || pageSize === 0 ? 1 : Math.max(1, Math.ceil(total / pageSize));
      const safePageFromEnd = Math.min(pageFromEnd, pageCount - 1);
      React.useEffect(() => { setPageFromEnd(0); }, [rangeMode, total]);

      if (total < 2 || chart.focusIds.length === 0) {
        return (
          <div style={{ background: "#FFFFFF", border: "2px solid #16232E", borderRadius: 18, padding: 14, boxShadow: "3px 3px 0 #16232E" }}>
            <div style={{ fontFamily: "'Space Grotesk', sans-serif", fontSize: 18, fontWeight: 700, color: "#16232E", textTransform: "uppercase" }}>Trend Ranking</div>
            <div style={{ fontSize: 12, color: "#617181", marginTop: 4 }}>Butuh minimal 2 sesi selesai untuk melihat pergerakan ranking All Time.</div>
          </div>
        );
      }

      const start = rangeMode === "all" ? 0 : Math.max(0, total - pageSize * (safePageFromEnd + 1));
      const end = rangeMode === "all" ? total : Math.min(total, total - pageSize * safePageFromEnd);
      const visible = chart.timeline.slice(start, end);
      const visibleStartLabel = visible[0]?.session?.label || "-";
      const visibleEndLabel = visible[visible.length - 1]?.session?.label || "-";
      const W = 360, H = 220, L = 30, R = 14, T = 18, B = 34;
      const plotW = W - L - R;
      const plotH = H - T - B;
      const xFor = idx => L + (visible.length === 1 ? plotW / 2 : (idx / (visible.length - 1)) * plotW);
      const yFor = rank => T + ((Math.min(7, Math.max(1, rank)) - 1) / 6) * plotH;
      const labelFor = id => players.find(p => p.id === id)?.name || id;
      const colorFor = id => colors[chart.focusIds.indexOf(id) % colors.length];
      const legendLimit = 6;
      const visibleLegendIds = chart.focusIds.slice(0, legendLimit);
      const hiddenLegendCount = Math.max(0, chart.focusIds.length - legendLimit);

      const getChartBlob = async () => {
        const el = chartShareRef.current;
        if (!el || !window.html2canvas) throw new Error("Chart ranking belum siap");
        const originalCss = el.style.cssText;
        el.style.width = "430px";
        el.style.maxWidth = "430px";
        const canvas = await window.html2canvas(el, { backgroundColor: "#FAF7F2", scale: 2, useCORS: true });
        el.style.cssText = originalCss;
        return new Promise(resolve => canvas.toBlob(resolve, "image/jpeg", 0.9));
      };

      const handleDownloadChartImage = async () => {
        setChartShareBusy("download");
        try {
          const blob = await getChartBlob();
          const url = URL.createObjectURL(blob);
          const a = document.createElement("a");
          a.href = url;
          a.download = "trend-ranking-top-5.jpg";
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          URL.revokeObjectURL(url);
        } catch (e) { console.error(e); }
        setChartShareBusy(null);
      };

      const handleShareChartWA = async () => {
        setChartShareBusy("share");
        try {
          const blob = await getChartBlob();
          const file = new File([blob], "trend-ranking-top-5.jpg", { type: "image/jpeg" });
          let textMsg = `📈 *TREND RANKING TOP 5 COURTRANK*\n\n`;
          textMsg += `Ranking All Time ${rangeMode === "all" ? "semua sesi" : `${visibleStartLabel} - ${visibleEndLabel}`}\n`;
          textMsg += `Garis abu putus-putus = pemain keluar dari 5 besar pada sesi tersebut.`;
          if (navigator.canShare && navigator.canShare({ files: [file] })) {
            await navigator.share({ title: "Trend Ranking Top 5 CourtRank", text: textMsg, files: [file] });
          } else {
            window.open(`https://wa.me/?text=${encodeURIComponent(textMsg)}`, "_blank");
          }
        } catch (e) {
          if (e.name !== "AbortError") console.error(e);
        }
        setChartShareBusy(null);
      };

      return (
        <div style={{ background: "#FFFFFF", border: "2px solid #16232E", borderRadius: 18, padding: 14, boxShadow: "3px 3px 0 #16232E" }}>
          <div ref={chartShareRef} style={{ background: "#FFFFFF", borderRadius: 14, padding: 0 }}>
          <div style={{ display: "flex", alignItems: "flex-start", justifyContent: "space-between", gap: 10, marginBottom: 10 }}>
            <div style={{ minWidth: 0 }}>
              <div style={{ fontFamily: "'Space Grotesk', sans-serif", fontSize: 18, fontWeight: 700, color: "#16232E", textTransform: "uppercase" }}>Trend Ranking Top 5</div>
              <div style={{ fontSize: 12, color: "#617181", marginTop: 3 }}>Ranking All Time setelah tiap sesi selesai</div>
            </div>
            <div style={{ display: "flex", background: "#FAF7F2", border: "1px solid #16232E20", borderRadius: 12, padding: 3, flex: "0 0 auto" }}>
              {[["5", "5"], ["10", "10"], ["all", "All"]].map(([key, label]) => (
                <button key={key} onClick={() => setRangeMode(key)} style={{ minHeight: 32, padding: "5px 8px", border: "none", borderRadius: 9, background: rangeMode === key ? "#E4574F" : "transparent", color: rangeMode === key ? "#fff" : "#44515E", fontSize: 11, fontWeight: 800, cursor: "pointer" }}>{label}</button>
              ))}
            </div>
          </div>
          <div style={{ border: "1px solid #16232E14", borderRadius: 14, background: "#FAF7F2", padding: "8px 6px 6px", overflowX: "auto" }}>
            <svg viewBox={`0 0 ${W} ${H}`} width="100%" height="220" role="img" aria-label="Trend ranking top 5 all time">
              {[1,2,3,4,5,6,7].map(rank => <g key={rank}><line x1={L} x2={W-R} y1={yFor(rank)} y2={yFor(rank)} stroke="#16232E" strokeOpacity={rank <= 5 ? 0.14 : 0.08} strokeDasharray={rank > 5 ? "3 4" : "0"} /><text x={8} y={yFor(rank)+4} fontSize="10" fontWeight="800" fill={rank <= 5 ? "#16232E" : "#9AA4AE"}>{rank}</text></g>)}
              {chart.focusIds.map(id => {
                const segments = [];
                for (let i = 0; i < visible.length - 1; i++) {
                  const a = visible[i].ranks.get(id);
                  const b = visible[i + 1].ranks.get(id);
                  if (!a || !b) continue;
                  const solid = a.rank <= 5 && b.rank <= 5;
                  segments.push(<line key={`${id}-${i}`} x1={xFor(i)} y1={yFor(a.rank)} x2={xFor(i+1)} y2={yFor(b.rank)} stroke={solid ? colorFor(id) : "#B8B8B0"} strokeWidth={2.4} strokeLinecap="round" strokeDasharray={solid ? "0" : "3 4"} />);
                }
                return <g key={id}>{segments}</g>;
              })}
              {chart.focusIds.map(id => visible.map((point, idx) => {
                const r = point.ranks.get(id);
                if (!r) return null;
                const inTop = r.rank <= 5;
                return <circle key={`${id}-${idx}`} cx={xFor(idx)} cy={yFor(r.rank)} r={4.4} fill={inTop ? colorFor(id) : "#FAF7F2"} stroke={inTop ? "#16232E" : "#B8B8B0"} strokeWidth={1.5} />;
              }))}
              {visible.map((point, idx) => <text key={point.session.id} x={xFor(idx)} y={H-8} textAnchor="middle" fontSize="9" fontWeight="700" fill="#617181">S{(sessions || []).findIndex(s => s.id === point.session.id) + 1}</text>)}
            </svg>
          </div>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", gap: 8, marginTop: 10 }}>
            <button disabled={rangeMode === "all" || safePageFromEnd >= pageCount - 1} onClick={() => setPageFromEnd(p => Math.min(pageCount - 1, p + 1))} style={{ minHeight: 36, padding: "7px 10px", borderRadius: 12, border: "2px solid #16232E", background: "#FFFFFF", color: "#16232E", fontSize: 11, fontWeight: 800, cursor: "pointer" }}>← Lama</button>
            <div style={{ flex: 1, textAlign: "center", fontSize: 11, color: "#617181", fontWeight: 700 }}>{rangeMode === "all" ? "Semua sesi" : `${visibleStartLabel} - ${visibleEndLabel}`}</div>
            <button disabled={rangeMode === "all" || safePageFromEnd === 0} onClick={() => setPageFromEnd(p => Math.max(0, p - 1))} style={{ minHeight: 36, padding: "7px 10px", borderRadius: 12, border: "2px solid #16232E", background: "#FFFFFF", color: "#16232E", fontSize: 11, fontWeight: 800, cursor: "pointer" }}>Baru →</button>
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "6px 10px", marginTop: 12 }}>
            {visibleLegendIds.map(id => <div key={id} style={{ display: "flex", alignItems: "center", gap: 7, minWidth: 0 }}><span style={{ width: 10, height: 10, borderRadius: 3, background: colorFor(id), border: "1px solid #16232E", flex: "0 0 auto" }} /><span style={{ fontSize: 11, color: "#16232E", fontWeight: 800, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{labelFor(id)}</span></div>)}
            {hiddenLegendCount > 0 && <div style={{ display: "flex", alignItems: "center", gap: 7, minWidth: 0, color: "#617181", fontSize: 11, fontWeight: 800 }}>+{hiddenLegendCount} pemain lain</div>}
          </div>
          <div style={{ marginTop: 8, fontSize: 10, color: "#617181", lineHeight: 1.35 }}>Garis abu putus-putus berarti pemain sedang keluar dari 5 besar pada sesi tersebut.</div>
          </div>
          <div style={{ display: "flex", gap: 8, marginTop: 12 }}>
            <button onClick={handleDownloadChartImage} disabled={chartShareBusy !== null} style={{ flex: 1, background: "#FFFFFF", border: "2px solid #16232E", borderRadius: 16, padding: "12px 10px", cursor: chartShareBusy !== null ? "default" : "pointer", color: "#44515E", fontWeight: 800, fontSize: 12, fontFamily: "'DM Sans', sans-serif" }}>{chartShareBusy === "download" ? "⏳" : "💾"} Simpan Gambar</button>
            <button onClick={handleShareChartWA} disabled={chartShareBusy !== null} style={{ flex: 1, background: chartShareBusy === "share" ? "#778899" : "#16232E", border: "2px solid #16232E", borderRadius: 16, padding: "12px 10px", cursor: chartShareBusy !== null ? "default" : "pointer", color: "#fff", fontWeight: 800, fontSize: 12, fontFamily: "'DM Sans', sans-serif" }}>{chartShareBusy === "share" ? "⏳" : "💬"} Kirim WA</button>
          </div>
        </div>
      );
    };

    function repairStoredText(value) {
      if (typeof value !== "string") return value;
      if (value.includes(" ")) return value.replace(/ +/g, "").trim();
      if (!/[ðÂâÎï]/.test(value)) return value;
      try {
        const bytes = Uint8Array.from(Array.from(value, ch => ch.charCodeAt(0) & 255));
        const decoded = new TextDecoder("utf-8").decode(bytes);
        return decoded.includes(" ") ? "" : decoded;
      } catch (e) {
        return value;
      }
    }

    function repairWorkspace(workspace) {
      const name = repairStoredText(workspace.name) || workspace.name || "Badminton";
      const repairedEmoji = repairStoredText(workspace.emoji);
      const isBadminton = name.toLowerCase().includes("badminton");
      const emojiLooksBroken = !repairedEmoji || repairedEmoji === "X" || repairedEmoji === "x" || repairedEmoji.length > 4;
      const emoji = isBadminton && emojiLooksBroken ? "🏸" : (repairedEmoji || "🎾");
      return { ...workspace, name, emoji };
    }
    // ==========================================
    // FIX #4: fallbackCopy didefinisikan sebagai fungsi global yang bisa dipanggil
    // ==========================================
    function fallbackCopy(text) {
      const ta = document.createElement("textarea");
      ta.value = text;
      ta.style.position = "fixed";
      ta.style.top = "-9999px";
      document.body.appendChild(ta);
      ta.focus();
      ta.select();
      let ok = false;
      try { ok = document.execCommand("copy"); } catch(e) { console.error("Fallback copy gagal", e); }
      document.body.removeChild(ta);
      if (!ok) window.prompt("Salin teks ini:", text);
      return ok;
    }

    function App() {
      const [screen, setScreen] = useState("workspace"); // "workspace" | "app"
      const [workspaceId, setWorkspaceId] = useState(null); // key into localStorage
      const [workspaces, setWorkspaces] = useState([]); // [{id, name, emoji, updatedAt}]
      const [isLoaded, setIsLoaded] = useState(false);
      const [githubToken, setGithubToken] = useState("");
      const [githubGistId, setGithubGistId] = useState(""); // per workspace
      const [readOnly, setReadOnly] = useState(false);
      const [gistStatus, setGistStatus] = useState(null); // null | "saving" | "saved" | "error"
      const [showGistModal, setShowGistModal] = useState(false);
      const [smartPreview, setSmartPreview] = useState(null); // {team1, team2, court, allCandidates}
      const [players, setPlayers] = useState(INITIAL_PLAYERS);
      const [matches, setMatches] = useState(INITIAL_MATCHES);
      const [checkedInBySession, setCheckedInBySession] = useState({ s1: [1, 2, 3, 4, 5, 6, 7, 8] });
      const [numCourts, setNumCourts] = useState(3);
      const [sessions, setSessions] = useState([{ id: "s1", label: "Sesi 1", date: new Date().toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long' }), createdAt: Date.now() }]);
      const [currentSessionId, setCurrentSessionId] = useState("s1");
      const checkedIn = useMemo(() => new Set(checkedInBySession[currentSessionId] || []), [checkedInBySession, currentSessionId]);
      const setCheckedIn = useCallback((next) => {
        setCheckedInBySession(prev => {
          const current = new Set(prev[currentSessionId] || []);
          const nextSet = typeof next === "function" ? next(current) : next;
          return { ...prev, [currentSessionId]: Array.from(nextSet || []) };
        });
      }, [currentSessionId]);

      const [tab, setTab] = useState("courts"); // courts | standings(harian) | settings
      const [isProcessing, setIsProcessing] = useState(null);
      const courts = useMemo(() => Array.from({ length: numCourts }, (_, i) => i + 1), [numCourts]);

      const [newPlayerName, setNewPlayerName] = useState("");
      const [newPlayerTier, setNewPlayerTier] = useState("C");

      const [scoreModal, setScoreModal] = useState(null);
      const [manualModal, setManualModal] = useState(false);
      const [manualSelected, setManualSelected] = useState([]);
      const [manualCourt, setManualCourt] = useState(1);
      const [notify, setNotify] = useState(null);
      const [confirmDialog, setConfirmDialog] = useState(null);
      const [editingPlayer, setEditingPlayer] = useState(null);
      const [turnBanner, setTurnBanner] = useState(null);
      const [h2hPlayer, setH2hPlayer] = useState(null);
      const [statsPlayerId, setStatsPlayerId] = useState(null);
      const [statsFrom, setStatsFrom] = useState("session");
      const appHistoryReadyRef = useRef(false);
      const applyingBrowserHistoryRef = useRef(false);
      const replaceNextHistoryRef = useRef(false);
      const appHistoryDepthRef = useRef(0);
      const lastAppHistoryKeyRef = useRef("");
      const workspaceLoadedRef = useRef(false);
      const lastSavedWorkspaceJsonRef = useRef("");
      // standingsMode removed — harian in app, alltime in session screen

      // ---- helpers to load/save per-workspace data ----
      const WORKSPACES_KEY = "courtRank_workspaces";
      const GITHUB_TOKEN_KEY = "courtRank_githubToken";
      const buildCheckedInBySession = (data, fallbackSessionId = "s1") => {
        const sessionsForData = data?.sessions?.length ? data.sessions : [{ id: fallbackSessionId }];
        const firstSessionId = sessionsForData[0]?.id || fallbackSessionId;
        const currentId = data?.currentSessionId || firstSessionId;
        const result = {};

        sessionsForData.forEach(s => { result[s.id] = []; });

        if (data?.checkedInBySession) {
          Object.entries(data.checkedInBySession).forEach(([sid, ids]) => {
            result[sid] = Array.from(new Set(ids || []));
          });
          return result;
        }

        (data?.matches || []).forEach(m => {
          const sid = m.sessionId || firstSessionId;
          if (!result[sid]) result[sid] = [];
          result[sid] = Array.from(new Set([...result[sid], ...(m.team1 || []), ...(m.team2 || [])]));
        });

        if (data?.checkedIn) {
          result[currentId] = Array.from(new Set([...(result[currentId] || []), ...data.checkedIn]));
        }

        return result;
      };

      const loadWorkspaceData = (wsId, dataOverride) => {
        const raw = dataOverride || localStorage.getItem(`courtRank_ws_${wsId}`);
        if (!raw) return;
        workspaceLoadedRef.current = false;
        lastSavedWorkspaceJsonRef.current = raw;
        try {
          const data = JSON.parse(raw);
          if (data.players) setPlayers(data.players.map(p => ({ ...p, name: repairStoredText(p.name) })));
          if (data.matches) setMatches(data.matches);
          setCheckedInBySession(buildCheckedInBySession(data));
          if (data.numCourts) setNumCourts(data.numCourts);
          if (data.sessions) setSessions(data.sessions);
          if (data.currentSessionId) setCurrentSessionId(data.currentSessionId);
          if (data.githubGistId) setGithubGistId(data.githubGistId);
          else setGithubGistId("");
          const isReadOnlyData = !!data.readOnly;
          setReadOnly(isReadOnlyData);
          if (isReadOnlyData) setTab("courts");
        } catch(e) { console.error(e); }
      };

      const buildAppHistoryState = useCallback(() => ({
        courtRankNav: true,
        screen,
        workspaceId,
        currentSessionId,
        statsPlayerId,
        statsFrom,
      }), [screen, workspaceId, currentSessionId, statsPlayerId, statsFrom]);

      const goBackInApp = useCallback((fallback) => {
        if (appHistoryDepthRef.current > 0) {
          window.history.back();
          return;
        }
        replaceNextHistoryRef.current = true;
        fallback();
      }, []);

      useEffect(() => {
        // Load workspaces list
        let wsList = JSON.parse(localStorage.getItem(WORKSPACES_KEY) || "[]").map(repairWorkspace);
        localStorage.setItem(WORKSPACES_KEY, JSON.stringify(wsList));

        // ===== MIGRASI / INISIALISASI DATA =====
        const legacyData = localStorage.getItem('courtRankState');
        if (wsList.length === 0) {
          const defaultSession = { id: "s1", label: "Sesi 1", date: new Date().toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long' }), createdAt: Date.now() };
          if (legacyData) {
            // Migrasi data lama
            try {
              const old = JSON.parse(legacyData);
              if (old.players && old.players.length > 0) {
                const migratedId = `ws_migrated`;
                wsList = [{ id: migratedId, name: "Badminton", emoji: "🏸", updatedAt: Date.now() }];
                localStorage.setItem(WORKSPACES_KEY, JSON.stringify(wsList));
                localStorage.setItem(`courtRank_ws_${migratedId}`, JSON.stringify({
                  players: old.players || [], matches: old.matches || [],
                  checkedIn: old.checkedIn || [], checkedInBySession: buildCheckedInBySession(old, "s1"), numCourts: old.numCourts || 3,
                  sessions: old.sessions || [defaultSession],
                  currentSessionId: old.currentSessionId || "s1", githubGistId: "",
                }));
              }
            } catch(e) { console.error("Migrasi gagal:", e); }
          } else {
            // User baru — buat workspace demo dengan data contoh
            const demoId = `ws_demo`;
            const demoSession = { ...defaultSession };
            wsList = [{ id: demoId, name: "Badminton", emoji: "🏸", updatedAt: Date.now() }];
            localStorage.setItem(WORKSPACES_KEY, JSON.stringify(wsList));
            localStorage.setItem(`courtRank_ws_${demoId}`, JSON.stringify({
              players: INITIAL_PLAYERS.map(p => ({...p, tierHistory:[{from:null,to:p.tier,sessionId:"s1",sessionLabel:"Sesi 1",date:new Date().toLocaleDateString('id-ID',{day:'numeric',month:'short',year:'numeric'}),type:"init"}]})),
              matches: INITIAL_MATCHES,
              checkedIn: INITIAL_PLAYERS.map(p => p.id),
              checkedInBySession: { s1: INITIAL_PLAYERS.map(p => p.id) },
              numCourts: 3,
              sessions: [demoSession],
              currentSessionId: "s1", githubGistId: "",
            }));
          }
        }
        // ===== END MIGRASI / INISIALISASI =====

        setWorkspaces(wsList);
        const savedToken = localStorage.getItem(GITHUB_TOKEN_KEY) || "";
        setGithubToken(savedToken);

        // Check URL for shared Arena data
        const params = new URLSearchParams(window.location.search);
        const hashParams = new URLSearchParams((window.location.hash || '').replace(/^#/, ''));
        const sharedDataRaw = params.get('d') || params.get('data') || hashParams.get('d') || hashParams.get('data') || '';
        // Some apps turn '+' into spaces; decodeURIComponent is safe for links we encode on share.
        const sharedData = sharedDataRaw.replace(/ /g, '+');
        if (sharedData && window.LZString) {
          try {
            const decompressed = window.LZString.decompressFromEncodedURIComponent(sharedData);
            if (decompressed) {
              const data = JSON.parse(decompressed);
              if (data.p && data.m) {
                const isMinified = Array.isArray(data.p[0]);
                const restoredPlayers = isMinified ? data.p.map(a => ({ id: a[0], name: a[1], tier: a[2] })) : data.p;
                const restoredMatches = isMinified ? data.m.map(a => ({
                  id: a[0], courtId: a[1], status: a[2] === 0 ? 'ongoing' : 'done',
                  team1: a[3], team2: a[4], games: a[5].map(g => ({ t1: g[0], t2: g[1] })),
                  tierSnapshot: a[6] || {}, sessionId: a[7] || "s1",
                })) : data.m;
                const wsName = repairStoredText(data.wsName || "Arena dari Link");
                const wsEmoji = repairStoredText(data.wsEmoji || "🏸");
                const newWsId = `ws_${Date.now()}`;
                const newWs = { id: newWsId, name: wsName, emoji: wsEmoji, updatedAt: Date.now(), readOnly: !!data.viewOnly };
                const updatedList = [...wsList.filter(w => w.name !== wsName), newWs];
                localStorage.setItem(WORKSPACES_KEY, JSON.stringify(updatedList));
                setWorkspaces(updatedList);
                const wsData = {
                  players: restoredPlayers, matches: restoredMatches,
                  checkedIn: data.c || [], checkedInBySession: data.cbs || buildCheckedInBySession({ ...data, checkedIn: data.c || [] }), numCourts: data.n || 3,
                  sessions: data.sessions || [{ id: "s1", label: "Sesi 1", date: new Date().toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long' }), createdAt: Date.now() }],
                  currentSessionId: data.currentSessionId || "s1",
                  githubGistId: data.gistId || "",
                  readOnly: !!data.viewOnly,
                };
                localStorage.setItem(`courtRank_ws_${newWsId}`, JSON.stringify(wsData));
                window.history.replaceState({}, document.title, window.location.pathname);
                setWorkspaceId(newWsId);
                loadWorkspaceData(newWsId, JSON.stringify(wsData));
                setScreen("session");
                setIsLoaded(true);
                return;
              }
            }
          } catch(e) { console.error("Gagal load dari link", e); setNotify({ msg: "Link Bagikan tidak terbaca. Coba kirim ulang dari app versi terbaru.", type: "error" }); }
        }
        setIsLoaded(true);
      }, []);

      useEffect(() => {
        const handlePopState = (event) => {
          const nav = event.state;
          if (!nav || !nav.courtRankNav) return;
          applyingBrowserHistoryRef.current = true;
          appHistoryDepthRef.current = Math.max(0, appHistoryDepthRef.current - 1);
          setScreen(nav.screen || "workspace");
          setWorkspaceId(nav.workspaceId || null);
          if (nav.workspaceId && nav.workspaceId !== workspaceId) loadWorkspaceData(nav.workspaceId);
          setCurrentSessionId(nav.currentSessionId || "s1");
          setStatsPlayerId(nav.statsPlayerId || null);
          setStatsFrom(nav.statsFrom || "session");
          setScoreModal(null);
          setManualModal(false);
          setSmartPreview(null);
          setEditingPlayer(null);
          setConfirmDialog(null);
          setH2hPlayer(null);
        };
        window.addEventListener("popstate", handlePopState);
        return () => window.removeEventListener("popstate", handlePopState);
      }, [workspaceId]);

      useEffect(() => {
        if (!isLoaded) return;
        const nav = buildAppHistoryState();
        const key = JSON.stringify(nav);
        if (!appHistoryReadyRef.current) {
          window.history.replaceState(nav, "", window.location.href);
          appHistoryReadyRef.current = true;
          lastAppHistoryKeyRef.current = key;
          return;
        }
        if (applyingBrowserHistoryRef.current) {
          lastAppHistoryKeyRef.current = key;
          applyingBrowserHistoryRef.current = false;
          return;
        }
        if (key === lastAppHistoryKeyRef.current) return;
        if (replaceNextHistoryRef.current) {
          window.history.replaceState(nav, "", window.location.href);
          replaceNextHistoryRef.current = false;
        } else {
          window.history.pushState(nav, "", window.location.href);
          appHistoryDepthRef.current += 1;
        }
        lastAppHistoryKeyRef.current = key;
      }, [isLoaded, buildAppHistoryState]);

      // Save per-workspace. Arena timestamp hanya naik kalau data benar-benar berubah,
      // bukan saat arena sekadar dibuka untuk dilihat.
      useEffect(() => {
        if (!isLoaded || !workspaceId) return;
        const wsData = {
          players, matches, checkedIn: Array.from(checkedIn), checkedInBySession,
          numCourts, sessions, currentSessionId, githubGistId, readOnly
        };
        const nextJson = JSON.stringify(wsData);
        const prevJson = lastSavedWorkspaceJsonRef.current || localStorage.getItem(`courtRank_ws_${workspaceId}`) || "";
        const dataChanged = nextJson !== prevJson;

        localStorage.setItem(`courtRank_ws_${workspaceId}`, nextJson);
        lastSavedWorkspaceJsonRef.current = nextJson;

        if (!workspaceLoadedRef.current) {
          workspaceLoadedRef.current = true;
          return;
        }
        if (!dataChanged) return;

        setWorkspaces(prev => {
          const updated = prev.map(w => w.id === workspaceId ? { ...w, updatedAt: Date.now() } : w);
          localStorage.setItem(WORKSPACES_KEY, JSON.stringify(updated));
          return updated;
        });
      }, [players, matches, checkedIn, checkedInBySession, numCourts, sessions, currentSessionId, githubGistId, readOnly, isLoaded, workspaceId]);

      // Save github token globally (not per workspace)
      useEffect(() => {
        if (githubToken) localStorage.setItem(GITHUB_TOKEN_KEY, githubToken);
      }, [githubToken]);

      const currentSessionMatches = useMemo(() => {
        const firstSessionId = sessions[0]?.id || "s1";
        return matches.filter(m =>
          m.sessionId === currentSessionId || (!m.sessionId && currentSessionId === firstSessionId)
        );
      }, [matches, currentSessionId, sessions]);

      const ongoingMatches = useMemo(() =>
        currentSessionMatches.filter(m => m.status === "ongoing"), [currentSessionMatches]);

      const activePlayers = useMemo(() =>
        new Set(ongoingMatches.flatMap(m => [...m.team1, ...m.team2])), [ongoingMatches]);

      const availablePlayers = useMemo(() =>
        players.filter(p => checkedIn.has(p.id) && !activePlayers.has(p.id)), [players, checkedIn, activePlayers]);

      const standingsHarian = useMemo(() => {
        // Klasemen harian hanya menampilkan pemain yang hadir/check-in.
        const sessionDoneMatches = currentSessionMatches.filter(m => m.status === "done");
        const presentPlayers = players.filter(p => checkedIn.has(p.id));
        return buildStandings(presentPlayers, sessionDoneMatches, checkedIn, true);
      }, [players, currentSessionMatches, checkedIn]);

      const standings = standingsHarian; // app always shows harian

      const buildH2H = (pid) => {
        const doneMatches = matches.filter(m => m.status === "done" && [...m.team1, ...m.team2].includes(pid));
        const opponentStats = {};
        const partnerStats = {};
        const tierStats = {}; // tier -> { w, l }

        // Sort by sessionId then match id for streak calc
        const sorted = [...doneMatches].sort((a, b) => a.id.localeCompare(b.id));
        let streak = 0, streakType = null;
        let maxWinStreak = 0, curWin = 0, maxLoseStreak = 0, curLose = 0;

        sorted.forEach(m => {
          const onT1 = m.team1.includes(pid);
          const myTeam = onT1 ? m.team1 : m.team2;
          const oppTeam = onT1 ? m.team2 : m.team1;
          const res = calcMatchResult(m, players);
          const won = onT1 ? res.t1Win : res.t2Win;
          const lost = onT1 ? res.t2Win : res.t1Win;

          // streak
          if (won) { curWin++; curLose = 0; maxWinStreak = Math.max(maxWinStreak, curWin); }
          else if (lost) { curLose++; curWin = 0; maxLoseStreak = Math.max(maxLoseStreak, curLose); }
          else { curWin = 0; curLose = 0; }

          // current streak (last result dominates)
          if (won) { streak = streakType === "W" ? streak + 1 : 1; streakType = "W"; }
          else if (lost) { streak = streakType === "L" ? streak + 1 : 1; streakType = "L"; }
          else { streak = 0; streakType = null; }

          oppTeam.forEach(oid => {
            if (!opponentStats[oid]) opponentStats[oid] = { w: 0, l: 0, d: 0 };
            if (won) opponentStats[oid].w++;
            else if (lost) opponentStats[oid].l++;
            else opponentStats[oid].d++;

            // tier stats using snapshot
            const oppTier = (m.tierSnapshot && m.tierSnapshot[oid]) || players.find(p => p.id === oid)?.tier || "E";
            if (!tierStats[oppTier]) tierStats[oppTier] = { w: 0, l: 0 };
            if (won) tierStats[oppTier].w++;
            else if (lost) tierStats[oppTier].l++;
          });

          myTeam.filter(id => id !== pid).forEach(pid2 => {
            if (!partnerStats[pid2]) partnerStats[pid2] = { w: 0, l: 0 };
            if (won) partnerStats[pid2].w++;
            else if (lost) partnerStats[pid2].l++;
          });
        });

        // Poin per sesi for trend
        const sessTrend = sessions.map(sess => {
          const sm = doneMatches.filter(m => m.sessionId === sess.id || (!m.sessionId && sess.id === sessions[0]?.id));
          if (sm.length === 0) return null;
          let pts = 0;
          sm.forEach(m => {
            const res = calcMatchResult(m, players);
            const onT1 = m.team1.includes(pid);
            const S = onT1 ? res.t1S : res.t2S;
            const R = onT1 ? res.t1R : res.t2R;
            const score = onT1 ? res.t1Score : res.t2Score;
            pts += score + S + R;
          });
          return { label: sess.label, pts, matchCount: sm.length };
        }).filter(Boolean);

      // Smart Match: prioritaskan rotasi/jumlah main, lalu pilih susunan tier yang seimbang antar tim dan tidak terlalu jomplang dalam pasangan.
      const calcBestMatches = (avail, freeCourt, allowRelaxedShuffle = false) => {
        const matchCount = (id) => standings.find(s => s.id === id)?.matchesPlayed || 0;
        const pool = [...avail];
        const allCounts = pool.map(p => matchCount(p.id));
        const minPlayed = Math.min(...allCounts);
        const candidates = [];

        for (let i = 0; i < pool.length - 3; i++)
          for (let j = i + 1; j < pool.length - 2; j++)
            for (let k = j + 1; k < pool.length - 1; k++)
              for (let l = k + 1; l < pool.length; l++) {
                const combo = [pool[i], pool[j], pool[k], pool[l]];
                const counts = combo.map(p => matchCount(p.id));
                const totalPlayed = counts.reduce((s, n) => s + n, 0);
                const fatigueSpread = Math.max(...counts) - Math.min(...counts);
                const behindCount = counts.filter(n => n === minPlayed).length;
                const rotationScore = (totalPlayed * 100) + (fatigueSpread * 20) - (behindCount * 30);

                [[[0,1],[2,3]],[[0,2],[1,3]],[[0,3],[1,2]]].forEach(([a,b]) => {
                  const weightsA = a.map(x => TIER_WEIGHT[combo[x].tier] || TIER_WEIGHT.E);
                  const weightsB = b.map(x => TIER_WEIGHT[combo[x].tier] || TIER_WEIGHT.E);
                  const w1 = weightsA.reduce((s, n) => s + n, 0);
                  const w2 = weightsB.reduce((s, n) => s + n, 0);
                  const tierDiff = Math.abs(w1 - w2);
                  const pairGapA = Math.abs((weightsA[0] || 0) - (weightsA[1] || 0));
                  const pairGapB = Math.abs((weightsB[0] || 0) - (weightsB[1] || 0));
                  const pairGapTotal = pairGapA + pairGapB;
                  const pairGapWorst = Math.max(pairGapA, pairGapB);
                  const extremePairPenalty = Math.max(0, pairGapWorst - 200);
                  const tierQuality = tierDiff + (pairGapTotal * 0.45) + (pairGapWorst * 0.25) + (extremePairPenalty * 0.8);
                  const score = (rotationScore * 1000) + tierQuality;
                  candidates.push({
                    team1: a.map(x => combo[x].id),
                    team2: b.map(x => combo[x].id),
                    diff: tierDiff,
                    pairGapTotal,
                    pairGapWorst,
                    tierQuality,
                    score,
                    rotationScore,
                    totalPlayed,
                    fatigueSpread,
                    behindCount,
                  });
                });
              }

        if (candidates.length === 0) return [];
        candidates.sort((a, b) => a.rotationScore - b.rotationScore || a.diff - b.diff || a.score - b.score);
        const bestRotation = candidates[0].rotationScore;
        const rotationLimit = allowRelaxedShuffle ? bestRotation + 100 : bestRotation;
        const rotationPool = candidates.filter(c => c.rotationScore <= rotationLimit);
        const bestQuality = Math.min(...rotationPool.map(c => c.tierQuality));
        const tierTolerance = allowRelaxedShuffle ? 120 : 0;
        let balancedPool = rotationPool.filter(c => c.tierQuality <= bestQuality + tierTolerance);

        if (allowRelaxedShuffle && balancedPool.length < 2) {
          balancedPool = rotationPool.filter(c => c.tierQuality <= bestQuality + 180);
        }

        return balancedPool
          .sort((a, b) => a.rotationScore - b.rotationScore || a.tierQuality - b.tierQuality || a.diff - b.diff || a.pairGapWorst - b.pairGapWorst || a.score - b.score)
          .slice(0, Math.min(16, balancedPool.length));
      };

        const freeCourt = courts.find(c => !occupiedCourts.has(c));
        if (!freeCourt) { showNotify("Semua lapangan sedang terpakai!", "error"); return; }
        const bestMatches = calcBestMatches(avail, freeCourt);
        if (bestMatches.length === 0) { showNotify("Tidak bisa buat match!", "error"); return; }
        const chosen = bestMatches[Math.floor(Math.random() * bestMatches.length)];

        const visibleTeam2 = currentTeam2 || smartPreview.team2;
        const sameTeam = (a, b) => a.length === b.length && a.every(id => b.includes(id));
        const others = bestMatches.filter(m =>
          !(sameTeam(m.team1, visibleTeam1) && sameTeam(m.team2, visibleTeam2)) &&
          !(sameTeam(m.team1, visibleTeam2) && sameTeam(m.team2, visibleTeam1))

        const pool = others.length > 0 ? others : bestMatches;
        const chosen = pool[Math.floor(Math.random() * pool.length)];
        setSmartPreview(prev => ({ ...prev, team1: chosen.team1, team2: chosen.team2, allCandidates: bestMatches }));
