      const diff = Math.abs(t1Weight - t2Weight);
      const t1Role = diff === 0 ? "Seimbang" : (t1Weight > t2Weight ? "Jagoan" : "Underdog");
      const t2Role = diff === 0 ? "Seimbang" : (t2Weight > t1Weight ? "Jagoan" : "Underdog");
      const roleColor = (role) => role === "Jagoan" ? "#C1121F" : role === "Underdog" ? "#B07D00" : "#1D3557";
      const balanceText = diff === 0 ? "⚖ Seimbang" : `${diff} pts tier`;

      const handleTap = (id) => {
        if (!swapping) { setSwapping(id); return; }
        if (swapping === id) { setSwapping(null); return; }
        // Swap the two tapped players between teams
        const newT1 = team1.map(x => x === swapping ? id : x === id ? swapping : x);
        const newT2 = team2.map(x => x === swapping ? id : x === id ? swapping : x);
        setTeam1(newT1); setTeam2(newT2); setSwapping(null);
      };

      const handleShuffle = () => {
        setSwapping(null);
        onShuffle(team1, team2);
      };

      React.useEffect(() => {
        setTeam1([...preview.team1]); setTeam2([...preview.team2]);
      }, [preview.team1.join(), preview.team2.join()]);

      const TeamBlock = ({ ids, label, weight, role }) => (
        <div style={{ flex: 1 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", gap: 6, marginBottom: 6 }}>
            <div style={{ fontSize: 10, fontWeight: 700, color: "#70839C", letterSpacing: "0.06em" }}>{label}</div>
            <div style={{ fontSize: 10, color: roleColor(role), fontWeight: 800, fontFamily: "'DM Mono', monospace" }}>{weight} · {role}</div>
          </div>
          {ids.map(id => {
            const p = getPlayer(id);
            const isSwapping = swapping === id;
            return (
              <div key={id} onClick={() => handleTap(id)} style={{
                display: "flex", alignItems: "center", gap: 8, padding: "8px 10px",
                background: isSwapping ? "#FFB70320" : "#10171108",
                border: `1px solid ${isSwapping ? "#FFB70380" : swapping ? "#E6394640" : "#1017110a"}`,
                borderRadius: 10, marginBottom: 6, cursor: "pointer", transition: "all 0.15s",
              }}>
                <div style={{ width: 28, height: 28, borderRadius: 7, background: isSwapping ? "#FFB70320" : "#10171108", border: `1px solid ${isSwapping ? "#FFB70360" : "#10171115"}`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 10, fontWeight: 700, color: isSwapping ? "#B07D00" : "#70839C" }}>
                  {p?.name.slice(0,2).toUpperCase()}
                </div>
                <span style={{ fontSize: 13, fontWeight: 600, color: isSwapping ? "#B07D00" : "#101711", flex: 1 }}>{p?.name}</span>
                <TierBadge tier={p?.tier} small />
                {isSwapping && <span style={{ fontSize: 10, color: "#B07D00" }}>⇄</span>}
              </div>
            );
          })}
        </div>
      );

      return (
        <div style={{ position: "fixed", inset: 0, background: "#000000dd", zIndex: 1500, display: "flex", alignItems: "flex-end", justifyContent: "center" }} onClick={onClose}>
          <div style={{ background: "#FFFFFF", borderRadius: "28px 28px 0 0", padding: 20, width: "100%", maxWidth: 430, border: "2px solid #E63946" }} onClick={e => e.stopPropagation()}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 4 }}>
              <div style={{ fontWeight: 700, fontSize: 15, color: "#101711" }}>⚡ Smart Match — Lapangan {preview.court}</div>
              <div style={{ fontSize: 11, color: diff === 0 ? "#1D3557" : diff <= 10 ? "#B07D00" : "#E63946", fontWeight: 700, background: diff === 0 ? "#1D355715" : diff <= 10 ? "#B07D0015" : "#E6394615", padding: "3px 8px", borderRadius: 6, border: `1px solid ${diff === 0 ? "#1D355730" : diff <= 10 ? "#B07D0030" : "#E6394630"}` }}>
                {balanceText}
              </div>
            </div>
            <div style={{ fontSize: 12, color: "#70839C", marginBottom: 10 }}>
              {swapping ? "Tap pemain lain untuk tukar posisi" : "Tap dua pemain untuk tukar tim · atau acak ulang"}
            </div>

            <div style={{ display: "flex", gap: 8, alignItems: "center", justifyContent: "space-between", background: "#F1FAEE", border: "2px solid #1D3557", borderRadius: 10, padding: "8px 10px", marginBottom: 12 }}>
              <div style={{ fontSize: 11, color: roleColor(t1Role), fontWeight: 800 }}>Tim A: {t1Weight} pts · {t1Role}</div>
              <div style={{ fontSize: 10, color: "#70839C", fontWeight: 700 }}>vs</div>
              <div style={{ fontSize: 11, color: roleColor(t2Role), fontWeight: 800, textAlign: "right" }}>Tim B: {t2Weight} pts · {t2Role}</div>
            </div>

            <div style={{ display: "flex", gap: 10, marginBottom: 16 }}>
              <TeamBlock ids={team1} label="TIM A" weight={t1Weight} role={t1Role} />
              <div style={{ display: "flex", alignItems: "center", color: "#70839C", fontSize: 13, fontWeight: 700, paddingTop: 20 }}>VS</div>
              <TeamBlock ids={team2} label="TIM B" weight={t2Weight} role={t2Role} />
            </div>

            <div style={{ display: "flex", gap: 8 }}>
              <button onClick={handleShuffle} style={{ flex: 1, padding: "12px", background: "#FFFFFF", border: "2px solid #1D3557", borderRadius: 14, color: "#5A3A3D", fontWeight: 700, fontSize: 13, cursor: "pointer" }}>🔀 Acak Ulang</button>
              <button onClick={() => onConfirm(team1, team2)} style={{ flex: 2, padding: "12px", background: "#E63946", border: "none", borderRadius: 16, color: "#fff", fontWeight: 800, fontSize: 14, cursor: "pointer" }}>✅ Mulai Match!</button>
            </div>
          </div>
        </div>
      );
    }


    // ===== PLAYER STATS SCREEN =====
    function PlayerStatsScreen({ player, players, matches, sessions, currentSessionId, initialMode = "alltime", showModeSwitch = false, onBack }) {
      const [mode, setMode] = React.useState(initialMode); // "alltime" | "session"
      const [trendRange, setTrendRange] = React.useState(12); // 12 | 24 | "all"
      const [playerStatsShareBusy, setPlayerStatsShareBusy] = React.useState(null);
      const playerStatsRef = React.useRef(null);
      React.useEffect(() => setMode(initialMode), [initialMode, player.id]);
      const getPlayer = id => players.find(p => p.id === id);

      const getPlayerStatsBlob = async () => {
        const el = playerStatsRef.current;
        if (!el || !window.html2canvas) throw new Error("Statistik pemain belum siap");
        const originalCss = el.style.cssText;
        el.style.width = "430px";
        el.style.maxWidth = "430px";
        const canvas = await window.html2canvas(el, { backgroundColor: "#F1FAEE", scale: 2, useCORS: true });
        el.style.cssText = originalCss;
        return new Promise(resolve => canvas.toBlob(resolve, "image/jpeg", 0.9));
      };

      const handleDownloadPlayerStats = async () => {
        setPlayerStatsShareBusy("download");
        try {
          const blob = await getPlayerStatsBlob();
          const safeName = player.name.replace(/[^a-z0-9]+/gi, "-").replace(/^-|-$/g, "") || "Pemain";
          const url = URL.createObjectURL(blob);
          const a = document.createElement("a");
          a.href = url;
          a.download = `Statistik-${safeName}-CourtRank-${new Date().toISOString().slice(0, 10)}.jpg`;
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          URL.revokeObjectURL(url);
        } catch (e) {
          console.error(e);
        }
        setPlayerStatsShareBusy(null);
      };

      const handleSharePlayerStatsWA = async () => {
        setPlayerStatsShareBusy("share");
        try {
          const blob = await getPlayerStatsBlob();
          const file = new File([blob], "statistik-pemain.jpg", { type: "image/jpeg" });
          const modeLabel = mode === "alltime" ? "All Time" : "Sesi Ini";
          let textMsg = `📊 *STATISTIK PEMAIN COURTRANK*\n\n`;
          textMsg += `${player.name} · Tier ${player.tier} · ${modeLabel}\n`;
          textMsg += `${stats.total} match · ${stats.wins}W ${stats.draws}D ${stats.losses}L\n`;
          textMsg += `Win Rate ${stats.winRate}% · ${stats.totalPts} pts · Diff ${stats.totalFor - stats.totalAgainst >= 0 ? "+" : ""}${stats.totalFor - stats.totalAgainst}`;
          if (navigator.canShare && navigator.canShare({ files: [file] })) {
            await navigator.share({ title: `Statistik ${player.name}`, text: textMsg, files: [file] });
          } else {
            window.open(`https://wa.me/?text=${encodeURIComponent(textMsg)}`, "_blank");
          }
        } catch (e) {
          if (e.name !== "AbortError") console.error(e);
        }
        setPlayerStatsShareBusy(null);
      };

      const computeStats = (pid, matchPool) => {
        const done = matchPool.filter(m => m.status === "done" && [...m.team1,...m.team2].includes(pid));
        const sorted = [...done].sort((a,b) => a.id.localeCompare(b.id));

        let wins=0, losses=0, draws=0, totalFor=0, totalAgainst=0, totalPts=0, totalR=0;
        let streak=0, streakType=null, maxWin=0, maxLose=0, curWin=0, curLose=0;
        const opponentStats={}, partnerStats={}, tierStats={};

        sorted.forEach(m => {
          const onT1 = m.team1.includes(pid);
          const myTeam = onT1 ? m.team1 : m.team2;
          const oppTeam = onT1 ? m.team2 : m.team1;
          const res = calcMatchResult(m, players);
          const won = onT1 ? res.t1Win : res.t2Win;
          const lost = onT1 ? res.t2Win : res.t1Win;
          const myScore = onT1 ? res.t1Score : res.t2Score;
          const oppScore = onT1 ? res.t2Score : res.t1Score;
          const S = onT1 ? res.t1S : res.t2S;
          const R = onT1 ? res.t1R : res.t2R;

          totalFor += myScore; totalAgainst += oppScore;
          totalPts += myScore + S + R; totalR += R;
          if (won) { wins++; curWin++; curLose=0; maxWin=Math.max(maxWin,curWin); streak=streakType==="W"?streak+1:1; streakType="W"; }
          else if (lost) { losses++; curLose++; curWin=0; maxLose=Math.max(maxLose,curLose); streak=streakType==="L"?streak+1:1; streakType="L"; }
          else { draws++; curWin=0; curLose=0; streak=0; streakType=null; }

          oppTeam.forEach(oid => {
            if (!opponentStats[oid]) opponentStats[oid] = {w:0,l:0,d:0};
            if (won) opponentStats[oid].w++; else if (lost) opponentStats[oid].l++; else opponentStats[oid].d++;
            const oppTier = (m.tierSnapshot&&m.tierSnapshot[oid]) || getPlayer(oid)?.tier || "E";
            if (!tierStats[oppTier]) tierStats[oppTier] = {w:0,l:0};
            if (won) tierStats[oppTier].w++; else if (lost) tierStats[oppTier].l++;
          });
          myTeam.filter(id=>id!==pid).forEach(pid2 => {
            if (!partnerStats[pid2]) partnerStats[pid2] = {w:0,l:0};
            if (won) partnerStats[pid2].w++; else if (lost) partnerStats[pid2].l++;
          });
        });

        const total = wins+losses+draws;
        const winRate = total > 0 ? Math.round((wins/total)*100) : 0;
        const avgScore = total > 0 ? (totalFor/total).toFixed(1) : "0";
        const avgAgainst = total > 0 ? (totalAgainst/total).toFixed(1) : "0";
        const bestPartner = Object.entries(partnerStats).sort((a,b)=>b[1].w-a[1].w)[0];
        const nemesis = Object.entries(opponentStats).sort((a,b)=>b[1].l-a[1].l)[0];
        const favorite = Object.entries(opponentStats).sort((a,b)=>b[1].w-a[1].w)[0];

        // Tren poin per sesi
        const sessTrend = sessions.map(sess => {
          const sm = done.filter(m => m.sessionId===sess.id || (!m.sessionId&&sess.id===sessions[0]?.id));
          if (!sm.length) return null;
          let pts=0, w=0, l=0;
          sm.forEach(m => {
            const onT1=m.team1.includes(pid);
            const res=calcMatchResult(m,players);
            const S=onT1?res.t1S:res.t2S; const R=onT1?res.t1R:res.t2R;
            pts += (onT1?res.t1Score:res.t2Score)+S+R;
            if (onT1?res.t1Win:res.t2Win) w++; else if (onT1?res.t2Win:res.t1Win) l++;
          });
          return { label: sess.label, pts, w, l, matchCount: sm.length };
        }).filter(Boolean);

        return { total, wins, losses, draws, winRate, avgScore, avgAgainst, totalFor, totalAgainst, totalPts, totalR,
                 streak, streakType, maxWin, maxLose, opponentStats, partnerStats, tierStats,
                 bestPartner, nemesis, favorite, sessTrend };
      };

      const allMatches = matches;
      const sessMatches = matches.filter(m => m.sessionId===currentSessionId || (!m.sessionId&&sessions[0]?.id===currentSessionId));
      const stats = mode === "alltime" ? computeStats(player.id, allMatches) : computeStats(player.id, sessMatches);
      const pid = player.id;
      const tierHistory = (player.tierHistory||[]).filter(h=>h.type!=="init");

      const StatBox = ({label, value, sub, color="#101711"}) => (
        <div style={{flex:1, background:"#FFFFFF", border:"1px solid #1017110a", borderRadius:10, padding:"12px 10px", textAlign:"center"}}>
          <div style={{fontSize:22, fontWeight:800, color, fontFamily:"'DM Mono',monospace"}}>{value}</div>
          <div style={{fontSize:10, color:"#70839C", marginTop:2}}>{label}</div>
          {sub && <div style={{fontSize:10, color:"#8798AE", marginTop:1}}>{sub}</div>}
        </div>
      );

      return (
        <div style={{minHeight:"100vh", background:"#F1FAEE", color:"#101711", maxWidth:430, margin:"0 auto"}}>
          {/* Header */}
          <div style={{background:"linear-gradient(135deg,#FFFFFF,#F1FAEE)", borderBottom:"1px solid #10171118", padding:"16px 20px 0"}}>
            <div style={{display:"flex", alignItems:"center", gap:10, marginBottom:12}}>
              <button onClick={onBack} style={{background:"#10171110", border:"none", borderRadius:8, padding:"6px 10px", color:"#5E4648", fontSize:13, cursor:"pointer"}}>←</button>
              <div style={{width:38, height:38, borderRadius:10, background:"linear-gradient(135deg,#E6394630,#E6394630)", border:"1px solid #E6394660", display:"flex", alignItems:"center", justifyContent:"center", fontSize:15, fontWeight:800, color:"#C1121F"}}>{player.name.slice(0,2).toUpperCase()}</div>
              <div style={{flex:1}}>
                <div style={{fontWeight:800, fontSize:16}}>{player.name}</div>
                <div style={{fontSize:11, color:"#5E4648", display:"flex", alignItems:"center", gap:6}}><TierBadge tier={player.tier} small /> {stats.total} match dimainkan</div>
              </div>
            </div>
            {showModeSwitch && (
              <div style={{display:"flex", background:"#F1FAEE", borderRadius:10, padding:3, marginBottom:12, border:"1px solid #10171110"}}>
                {[["alltime","🏆 All Time"],["session","📅 Sesi Ini"]].map(([k,l])=>(
                  <button key={k} onClick={()=>setMode(k)} style={{flex:1, padding:"7px 0", borderRadius:8, border:"none", cursor:"pointer", fontWeight:700, fontSize:12, background:mode===k?"#E63946":"none", color:mode===k?"#fff":"#70839C", fontFamily:"'Lexend',sans-serif"}}>{l}</button>
                ))}
              </div>
            )}
          </div>

          <div style={{padding:"12px 16px 0", display:"flex", gap:8}}>
            <button onClick={handleDownloadPlayerStats} disabled={playerStatsShareBusy !== null} style={{flex:1, background:"#FFFFFF", border:"2px solid #1D3557", borderRadius:16, padding:"12px 10px", cursor:playerStatsShareBusy !== null ? "default" : "pointer", color:"#5A3A3D", fontWeight:800, fontSize:12, fontFamily:"'Lexend',sans-serif"}}>{playerStatsShareBusy === "download" ? "⏳" : "💾"} Simpan Gambar</button>
            <button onClick={handleSharePlayerStatsWA} disabled={playerStatsShareBusy !== null} style={{flex:1, background:playerStatsShareBusy === "share" ? "#8798AE" : "#1D3557", border:"2px solid #1D3557", borderRadius:16, padding:"12px 10px", cursor:playerStatsShareBusy !== null ? "default" : "pointer", color:"#fff", fontWeight:800, fontSize:12, fontFamily:"'Lexend',sans-serif"}}>{playerStatsShareBusy === "share" ? "⏳" : "💬"} Kirim WA</button>
          </div>

          <div ref={playerStatsRef} id="player-stats-board" style={{padding:"16px 16px 40px", display:"flex", flexDirection:"column", gap:14, background:"#F1FAEE"}}>

            <div style={{background:"#FFFFFF", border:"2px solid #1D3557", borderRadius:18, padding:"12px 14px", boxShadow:"6px 8px 0 #1D3557"}}>
              <div style={{fontSize:10, color:"#70839C", fontWeight:800, letterSpacing:"0.08em", textTransform:"uppercase", marginBottom:4}}>Statistik Pemain · {mode === "alltime" ? "All Time" : "Sesi Ini"}</div>
              <div style={{display:"flex", alignItems:"center", gap:8}}>
                <div style={{fontFamily:"'Archivo Narrow',sans-serif", fontStyle:"italic", fontWeight:700, fontSize:24, color:"#C1121F", textTransform:"uppercase", flex:1}}>{player.name}</div>
                <TierBadge tier={player.tier} />
              </div>
              <div style={{fontSize:11, color:"#5E4648", marginTop:4}}>{stats.total} match dimainkan · {stats.wins}W {stats.draws}D {stats.losses}L</div>
            </div>

            {/* Overview boxes */}
            <div style={{display:"flex", gap:8}}>
              <StatBox label="Win Rate" value={`${stats.winRate}%`} sub={`${stats.wins}W ${stats.losses}L`} color={stats.winRate>=50?"#1D3557":"#E63946"} />
              <StatBox label="Total Poin" value={stats.totalPts} sub={`+${stats.totalR}R underdog`} color="#C1121F" />
              <StatBox label="Rata Skor" value={stats.avgScore} sub={`vs ${stats.avgAgainst}`} />
            </div>
            <div style={{display:"flex", gap:8}}>
              <StatBox label="Match" value={stats.total} sub={`${stats.wins}W ${stats.draws}D ${stats.losses}L`} />
              <StatBox label="Avg Menang" value={stats.total>0?`${Math.round((stats.wins/stats.total)*100)}%`:"—"} sub="per match" color="#B07D00" />
              <StatBox label="Diff" value={stats.totalFor-stats.totalAgainst>=0?`+${stats.totalFor-stats.totalAgainst}`:stats.totalFor-stats.totalAgainst} color={(stats.totalFor-stats.totalAgainst)>=0?"#1D3557":"#E63946"} sub="skor masuk-kemasukan" />
            </div>

            {/* Streak */}
            {stats.total > 0 && (
              <div style={{background:stats.streakType==="W"?"#1D355712":"#E6394612", border:`1px solid ${stats.streakType==="W"?"#1D355725":"#E6394625"}`, borderRadius:12, padding:"12px 16px", display:"flex", alignItems:"center", gap:12}}>
                <span style={{fontSize:28}}>{stats.streakType==="W"?"🔥":"🧊"}</span>
                <div>
                  <div style={{fontSize:14, fontWeight:700, color:stats.streakType==="W"?"#1D3557":"#E63946"}}>
                    {stats.streak > 0 && stats.streakType ? `${stats.streak} ${stats.streakType==="W"?"Menang":"Kalah"} Beruntun` : "Belum ada streak"}
                  </div>
                  <div style={{fontSize:11, color:"#70839C"}}>Best: 🏆{stats.maxWin} menang · 😢{stats.maxLose} kalah beruntun</div>
                </div>
              </div>
            )}

            {/* Tren poin per sesi */}
            {stats.sessTrend.length > 0 && (
              <div style={{background:"#FFFFFF", border:"1px solid #1017110a", borderRadius:12, padding:14}}>
                <div style={{display:"flex", alignItems:"center", justifyContent:"space-between", gap:10, marginBottom:10}}>
                  <div>
                    <div style={{fontSize:11, fontWeight:700, color:"#70839C", letterSpacing:"0.06em"}}>📈 TREN POIN PER SESI</div>
                    {stats.sessTrend.length > 1 && (
                      <div style={{fontSize:10, color:"#8798AE", marginTop:2}}>
                        {trendRange === "all" ? "All Time" : `${Math.min(trendRange, stats.sessTrend.length)} sesi terakhir`} dari {stats.sessTrend.length} sesi tercatat
                      </div>
                    )}
                  </div>
                  {stats.sessTrend.length > 12 && (
                    <div style={{display:"flex", gap:4, background:"#F1FAEE", border:"1px solid #10171114", borderRadius:8, padding:3}}>
                      {[[12,"12"],[24,"24"],["all","Semua"]].map(([value,label]) => (
                        <button key={label} onClick={() => setTrendRange(value)} style={{border:"none", borderRadius:6, padding:"5px 8px", background:trendRange===value?"#E63946":"transparent", color:trendRange===value?"#fff":"#5E4648", fontSize:10, fontWeight:700, cursor:"pointer"}}>{label}</button>
                      ))}
                    </div>
                  )}
                </div>
                {stats.sessTrend.length === 1 ? (
                  <div style={{fontSize:12, color:"#8798AE", textAlign:"center", padding:"8px 0"}}>Butuh minimal 2 sesi untuk melihat tren</div>
                ) : (
                  <div>
                    {(() => {
                      const visibleTrend = trendRange === "all" ? stats.sessTrend : stats.sessTrend.slice(-trendRange);
                      const maxPts = Math.max(...visibleTrend.map(s=>s.pts),1);
                      const first = visibleTrend[0];
                      const last = visibleTrend[visibleTrend.length-1];
                      const best = visibleTrend.reduce((top, s) => s.pts > top.pts ? s : top, first);
                      const delta = last.pts - first.pts;
                      const labelStep = visibleTrend.length > 36 ? 10 : visibleTrend.length > 24 ? 5 : visibleTrend.length > 12 ? 3 : 1;
                      return (
                        <>
                          <div style={{display:"flex", gap:8, marginBottom:10}}>
                            <div style={{flex:1, background:"#F1FAEE", border:"1px solid #10171114", borderRadius:8, padding:"7px 9px"}}>
                              <div style={{fontSize:9, color:"#8798AE", fontWeight:700, letterSpacing:"0.05em"}}>PERUBAHAN</div>
                              <div style={{fontSize:14, color:delta>0?"#1D3557":delta<0?"#E63946":"#5E4648", fontWeight:800}}>{delta>0?`+${delta}`:delta} pts</div>
                            </div>
                            <div style={{flex:1, background:"#F1FAEE", border:"1px solid #10171114", borderRadius:8, padding:"7px 9px"}}>
                              <div style={{fontSize:9, color:"#8798AE", fontWeight:700, letterSpacing:"0.05em"}}>TERTINGGI</div>
                              <div style={{fontSize:14, color:"#101711", fontWeight:800}}>{best.pts} <span style={{fontSize:10, color:"#70839C", fontWeight:600}}>{best.label.replace("Sesi ","S")}</span></div>
                            </div>
                          </div>
                          <div style={{display:"flex", gap:3, alignItems:"flex-end", height:66, marginBottom:6}}>
                            {visibleTrend.map((s,i)=>{
                              const originalIndex = stats.sessTrend.length - visibleTrend.length + i;
                              const isLast = originalIndex===stats.sessTrend.length-1;
                              const prev = originalIndex>0?stats.sessTrend[originalIndex-1]:null;
                              const trend = prev ? (s.pts>prev.pts?"up":s.pts<prev.pts?"down":"flat") : "flat";
                              const showLabel = i===0 || i===visibleTrend.length-1 || i % labelStep === 0;
                              const barColor = isLast ? "linear-gradient(180deg,#E63946,#C1121F)" : trend==="up"?"#1D355760":trend==="down"?"#E6394660":"#10171120";
                              return (
                                <div key={`${s.label}-${i}`} title={`${s.label}: ${s.pts} pts`} style={{flex:1, minWidth:trendRange==="all"?3:6, display:"flex", flexDirection:"column", alignItems:"center", gap:2}}>
                                  {(visibleTrend.length <= 24 || isLast || s.pts === best.pts) && <div style={{fontSize:8, color:"#70839C", minHeight:10}}>{s.pts}</div>}
                                  <div style={{width:"100%", height:`${Math.max(6,(s.pts/maxPts)*48)}px`, background:barColor, borderRadius:"3px 3px 0 0"}} />
                                  <div style={{fontSize:8, color:showLabel?"#8798AE":"transparent", textAlign:"center", lineHeight:1, minHeight:9}}>{s.label.replace("Sesi ","S")}</div>
                                </div>
                              );
                            })}
                          </div>
                        </>
                      );
                    })()}
                    <div style={{display:"flex", gap:10, justifyContent:"center", marginTop:4}}>
                      {[["#1D355760","Naik"],["#E6394660","Turun"],["linear-gradient(180deg,#E63946,#C1121F)","Terkini"]].map(([c,l])=>(
                        <div key={l} style={{display:"flex", alignItems:"center", gap:4, fontSize:10, color:"#70839C"}}>
                          <div style={{width:8, height:8, borderRadius:2, background:c}} />{l}
                        </div>
                      ))}
                    </div>
                  </div>
                )}
              </div>
            )}

            {/* Win rate vs tier */}
            {Object.keys(stats.tierStats).length > 0 && (
              <div style={{background:"#FFFFFF", border:"1px solid #1017110a", borderRadius:12, padding:14}}>
                <div style={{fontSize:11, fontWeight:700, color:"#70839C", letterSpacing:"0.06em", marginBottom:10}}>📊 WIN RATE VS TIER</div>
                <div style={{display:"flex", flexDirection:"column", gap:7}}>
                  {Object.entries(TIER_WEIGHT).filter(([t])=>stats.tierStats[t]).map(([tier])=>{
                    const ts = stats.tierStats[tier];
                    const tot = ts.w+ts.l;
                    const pct = tot>0?Math.round((ts.w/tot)*100):0;
                    const c = TIER_COLORS[tier];
                    return (
                      <div key={tier} style={{display:"flex", alignItems:"center", gap:8}}>
                        <span style={{fontSize:11, background:c.bg, color:c.text, border:`1px solid ${c.border}`, borderRadius:4, padding:"1px 6px", minWidth:28, textAlign:"center", fontWeight:700}}>Tier {tier}</span>
                        <div style={{flex:1, height:8, background:"#F1FAEE", borderRadius:99, overflow:"hidden"}}>
                          <div style={{height:"100%", width:`${pct}%`, background:pct>=50?"#1D3557":"#E63946", borderRadius:99, transition:"width 0.5s"}} />
                        </div>
                        <span style={{fontSize:12, color:pct>=50?"#1D3557":"#E63946", fontWeight:700, minWidth:36, textAlign:"right"}}>{pct}%</span>
                        <span style={{fontSize:10, color:"#8798AE", minWidth:44}}>{ts.w}W {ts.l}L</span>
                      </div>
                    );
                  })}
                </div>
              </div>
            )}

            {/* Highlights: Partner, Nemesis, Mangsa */}
            {(stats.bestPartner||stats.nemesis||stats.favorite) && (
              <div style={{display:"flex", flexDirection:"column", gap:8}}>
                <div style={{fontSize:11, fontWeight:700, color:"#70839C", letterSpacing:"0.06em"}}>🎖 HIGHLIGHTS</div>
                {stats.bestPartner && (
                  <div style={{background:"#1D355712", border:"1px solid #1D355725", borderRadius:18, padding:"10px 14px", display:"flex", alignItems:"center", gap:10}}>
                    <span style={{fontSize:20}}>🤝</span>
                    <div style={{flex:1}}>
                      <div style={{fontSize:11, color:"#1D3557", fontWeight:700}}>PARTNER TERBAIK</div>
                      <div style={{fontSize:14, fontWeight:700, color:"#101711"}}>{getPlayer(parseInt(stats.bestPartner[0]))?.name||"?"}</div>
                    </div>
                    <div style={{textAlign:"right"}}>
                      <div style={{fontSize:13, fontWeight:700, color:"#1D3557"}}>{stats.bestPartner[1].w}W</div>
                      <div style={{fontSize:10, color:"#70839C"}}>{stats.bestPartner[1].l}L bersama</div>
                    </div>
                  </div>
                )}
                {stats.nemesis && stats.nemesis[1].l > 0 && (
                  <div style={{background:"#ef444412", border:"1px solid #ef444425", borderRadius:18, padding:"10px 14px", display:"flex", alignItems:"center", gap:10}}>
                    <span style={{fontSize:20}}>😤</span>
                    <div style={{flex:1}}>
                      <div style={{fontSize:11, color:"#E63946", fontWeight:700}}>MUSUH BEBUYUTAN</div>
                      <div style={{fontSize:14, fontWeight:700, color:"#101711"}}>{getPlayer(parseInt(stats.nemesis[0]))?.name||"?"}</div>
                    </div>
                    <div style={{textAlign:"right"}}>
                      <div style={{fontSize:13, fontWeight:700, color:"#E63946"}}>Kalah {stats.nemesis[1].l}x</div>
                      <div style={{fontSize:10, color:"#70839C"}}>Menang {stats.nemesis[1].w}x</div>
                    </div>
                  </div>
                )}
                {stats.favorite && stats.favorite[1].w > 0 && (
                  <div style={{background:"#FFB70312", border:"1px solid #FFB70325", borderRadius:18, padding:"10px 14px", display:"flex", alignItems:"center", gap:10}}>
                    <span style={{fontSize:20}}>🎯</span>
                    <div style={{flex:1}}>
                      <div style={{fontSize:11, color:"#B07D00", fontWeight:700}}>MANGSA EMPUK</div>
                      <div style={{fontSize:14, fontWeight:700, color:"#101711"}}>{getPlayer(parseInt(stats.favorite[0]))?.name||"?"}</div>
                    </div>
                    <div style={{textAlign:"right"}}>
                      <div style={{fontSize:13, fontWeight:700, color:"#B07D00"}}>Menang {stats.favorite[1].w}x</div>
                      <div style={{fontSize:10, color:"#70839C"}}>Kalah {stats.favorite[1].l}x</div>
                    </div>
                  </div>
                )}
              </div>
            )}

            {/* Riwayat Tier */}
            {tierHistory.length > 0 && (
              <div style={{background:"#FFFFFF", border:"1px solid #1017110a", borderRadius:12, padding:14}}>
                <div style={{fontSize:11, fontWeight:700, color:"#70839C", letterSpacing:"0.06em", marginBottom:8}}>📋 RIWAYAT TIER</div>
                {tierHistory.map((h,i)=>(
                  <div key={i} style={{display:"flex", alignItems:"center", gap:8, padding:"6px 0", borderBottom:i<tierHistory.length-1?"1px solid #10171108":"none"}}>
                    <span style={{fontSize:13}}>{(h.type==="naik"||h.type==="resmi")?"🚀":"🔧"}</span>
                    <span style={{fontFamily:"'DM Mono',monospace", fontSize:12, color:(h.type==="naik"||h.type==="resmi")?"#C1121F":"#B07D00", fontWeight:700}}>{h.from}→{h.to}</span>
                    <span style={{fontSize:12, color:"#101711", flex:1}}>{h.sessionLabel}</span>
                    <span style={{fontSize:11, color:"#8798AE"}}>{h.date}</span>
                  </div>
                ))}
              </div>
            )}

            {/* H2H Rekor Lawan */}
            {Object.keys(stats.opponentStats).length > 0 && (
              <div style={{background:"#FFFFFF", border:"1px solid #1017110a", borderRadius:12, padding:14}}>
                <div style={{fontSize:11, fontWeight:700, color:"#70839C", letterSpacing:"0.06em", marginBottom:8}}>⚔️ REKOR LAWAN</div>
                {Object.entries(stats.opponentStats).sort((a,b)=>(b[1].w+b[1].l)-(a[1].w+a[1].l)).map(([oid, stat])=>{
                  const opp = getPlayer(parseInt(oid));
                  if (!opp) return null;
                  const tot = stat.w+stat.l+stat.d;
                  const pct = tot>0?Math.round((stat.w/tot)*100):0;
                  return (
                    <div key={oid} style={{display:"flex", alignItems:"center", gap:8, padding:"7px 0", borderBottom:"1px solid #10171106"}}>
                      <TierBadge tier={opp.tier} small />
                      <span style={{flex:1, fontSize:13, color:"#101711", fontWeight:500}}>{opp.name}</span>
                      <span style={{fontSize:12, color:"#1D3557", fontFamily:"'DM Mono',monospace"}}>{stat.w}W</span>
                      {stat.d>0&&<span style={{fontSize:12, color:"#B07D00", fontFamily:"'DM Mono',monospace"}}>{stat.d}D</span>}
                      <span style={{fontSize:12, color:"#E63946", fontFamily:"'DM Mono',monospace"}}>{stat.l}L</span>
                      <span style={{fontSize:11, color:pct>=50?"#1D3557":"#E63946", fontWeight:700, minWidth:34, textAlign:"right"}}>{pct}%</span>
                    </div>
                  );
                })}
              </div>
            )}

            {stats.total === 0 && (
              <div style={{textAlign:"center", padding:"40px 16px", color:"#70839C"}}>
                <div style={{fontSize:32, marginBottom:12}}>🏸</div>
                <div style={{fontSize:14, fontWeight:600}}>Belum ada data match</div>
                <div style={{fontSize:12, marginTop:4}}>{mode==="session"?"Belum ada match di sesi ini":"Pemain ini belum pernah bermain"}</div>
              </div>
            )}

          </div>
        </div>
      );
    }

    // ===== SESSION SCREEN =====
    function SessionScreen({ sessions, matches, players, checkedIn, checkedInBySession, currentSessionId, wsName, wsEmoji, onSelectSession, onNewSession, onDeleteSession, onBack, onHandover, onEditPlayer, onAddPlayer, onDeletePlayer, onViewStats, newPlayerName, setNewPlayerName, newPlayerTier, setNewPlayerTier }) {
      const medals = ["🥇","🥈","🥉"];
      const [sessionTab, setSessionTab] = React.useState("sessions"); // sessions | players | rules
      const [allTimeShareBusy, setAllTimeShareBusy] = React.useState(null);

      const getAllTimeStandingsBlob = async () => {
        const el = document.getElementById("alltime-standings-board");
        if (!el || !window.html2canvas) throw new Error("Klasemen All Time belum siap");
        const originalCss = el.style.cssText;
        el.style.width = "430px";
        el.style.maxWidth = "430px";
        const canvas = await window.html2canvas(el, { backgroundColor: "#F1FAEE", scale: 2, useCORS: true });
        el.style.cssText = originalCss;
        return new Promise(resolve => canvas.toBlob(resolve, "image/jpeg", 0.9));
      };

      const handleDownloadAllTimeImage = async () => {
        setAllTimeShareBusy("download");
        try {
          const blob = await getAllTimeStandingsBlob();
          const url = URL.createObjectURL(blob);
          const a = document.createElement("a");
          a.href = url;
          a.download = `Klasemen-All-Time-CourtRank-${new Date().toISOString().slice(0, 10)}.jpg`;
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          URL.revokeObjectURL(url);
        } catch (e) {
          console.error(e);
        }
        setAllTimeShareBusy(null);
      };

      const handleShareAllTimeWA = async (allTimeStandings, allDoneMatches) => {
        setAllTimeShareBusy("share");
        try {
          const blob = await getAllTimeStandingsBlob();
          const file = new File([blob], "klasemen-all-time.jpg", { type: "image/jpeg" });
          let textMsg = `🏆 *KLASEMEN ALL TIME COURTRANK*\n\n`;
          textMsg += `${wsName} · ${sessions.length} sesi · ${allDoneMatches.length} match selesai\n`;
          if (allTimeStandings.length > 0) {
            textMsg += `\n👑 #1 ${allTimeStandings[0].name} — ${allTimeStandings[0].P} pts`;
          }
          if (navigator.canShare && navigator.canShare({ files: [file] })) {
            await navigator.share({ title: "Klasemen All Time CourtRank", text: textMsg, files: [file] });
          } else {
            window.open(`https://wa.me/?text=${encodeURIComponent(textMsg)}`, "_blank");
          }
        } catch (e) {
          if (e.name !== "AbortError") console.error(e);
        }
        setAllTimeShareBusy(null);
      };

      const getSessionStats = (sess) => {
        const sessMatches = matches.filter(m => m.status === "done" && (m.sessionId === sess.id || (!m.sessionId && sess.id === sessions[0]?.id)));
        const sessCheckedIn = new Set(checkedInBySession?.[sess.id] || []);
        const sessStandings = buildStandings(players, sessMatches, sessCheckedIn).filter(p => sessCheckedIn.has(p.id));
        const wow = sessStandings[0] || null;
        const sos = sessStandings.length > 1 ? sessStandings[sessStandings.length - 1] : null;
        // MBG: Making Big Gains, pemain dengan subsidi tier terbesar
        let mbg = null, maxR = 0;
        sessStandings.forEach(p => { if (p.totalR > maxR) { maxR = p.totalR; mbg = p; } });

        return { matchCount: sessMatches.length, wow, sos, mbg: maxR > 0 ? mbg : null };
      };

      return (
        <div style={{ minHeight: "100vh", background: "#F1FAEE", color: "#101711", maxWidth: 430, margin: "0 auto" }}>
          {/* Header */}
          <div style={{ background: "linear-gradient(135deg, #FFFFFF, #F1FAEE)", borderBottom: "2px solid #1D3557", padding: "16px 20px 0" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 12 }}>
              <button onClick={onBack} style={{ background: "#10171110", border: "none", borderRadius: 16, padding: "8px 12px", color: "#5E4648", fontSize: 13, cursor: "pointer" }}>←</button>
              <div style={{ width: 34, height: 34, borderRadius: 9, background: "#E63946", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 18 }}>{wsEmoji}</div>
              <div style={{ flex: 1 }}>
                <div style={{ fontFamily: "'Archivo Narrow', sans-serif", fontStyle: "italic", fontWeight: 700, fontSize: 24, color: "#C1121F", textTransform: "uppercase" }}>{wsName}</div>
                <div style={{ fontSize: 11, color: "#5E4648" }}>{sessions.length} sesi · {players.length} pemain · {matches.filter(m => m.status === "done").length} match</div>
              </div>
              <button onClick={onHandover} title="Handover arena" style={{ background: "#FFB70320", border: "2px solid #FFB703", color: "#B07D00", borderRadius: 16, padding: "8px 12px", fontSize: 11, cursor: "pointer", fontWeight: 800, whiteSpace: "nowrap" }}>📤 Handover</button>
            </div>
            <div style={{ display: "flex", gap: 0 }}>
              {[["sessions","📅 Sesi"],["alltime","🏆 Klasemen"],["stats","📊 Statistik"],["players","👥 Pemain"],["rules","📖 Aturan"]].map(([k,l]) => (
                <button key={k} onClick={() => setSessionTab(k)} style={{ flex: 1, background: "none", border: "none", cursor: "pointer", padding: "8px 0", fontSize: 12, fontWeight: sessionTab === k ? 700 : 400, color: sessionTab === k ? "#C1121F" : "#70839C", borderBottom: sessionTab === k ? "2px solid #C1121F" : "2px solid transparent" }}>{l}</button>
              ))}
            </div>
          </div>

          <div style={{ padding: "16px 16px 40px" }}>

            {/* === KLASEMEN ALL TIME TAB === */}
            {sessionTab === "alltime" && (() => {
              const allDoneMatches = matches.filter(m => m.status === "done");
              const allTimeStandings = buildStandings(players, allDoneMatches, new Set(players.map(p => p.id)), false);
              const wow = allTimeStandings[0];
              const sos = allTimeStandings[allTimeStandings.length - 1];
              let mbgAt = null, maxR = 0;
              allTimeStandings.forEach(p => { if (p.totalR > maxR) { maxR = p.totalR; mbgAt = p; } });
              return (
                <div>
                  <div id="alltime-standings-board" style={{ padding: "12px", background: "#F1FAEE", borderRadius: 14, margin: "-12px", marginBottom: 16 }}>
                  <div style={{ fontFamily: "'Archivo Narrow', sans-serif", fontSize: 28, fontWeight: 700, color: "#1D3557", textTransform: "uppercase", letterSpacing: "-0.02em", marginBottom: 4 }}>KLASEMEN ALL TIME</div>
                  <div style={{ fontSize: 12, color: "#70839C", marginBottom: 16 }}>{sessions.length} sesi · {allDoneMatches.length} total match</div>

                  {allTimeStandings.length === 0 && (
                    <div style={{ textAlign: "center", padding: "32px 16px", color: "#70839C", fontSize: 13 }}>
                      <div style={{ fontSize: 32, marginBottom: 8 }}>🏸</div>Belum ada match selesai
                    </div>
                  )}

                  {allTimeStandings.length >= 2 && (
                    <div style={{ marginBottom: 16, display: "flex", flexDirection: "column", gap: 6 }}>
                      <div style={{ background: "linear-gradient(135deg, #B07D0015, #FFB70315)", border: "1px solid #B07D0030", borderRadius: 18, padding: "10px 14px" }}>
                        <strong style={{ color: "#B07D00", fontSize: 14, display: "block", marginBottom: 2 }}>🏆 WOW ALL TIME: {wow?.name}</strong>
                        <span style={{ fontSize: 11, color: "#5E4648" }}>(Winner Over Winners) · {wow?.P} pts · {wow?.W}W {wow?.L}L</span>
                      </div>
                      <div style={{ display: "flex", gap: 6 }}>
                        <div style={{ flex: 1, background: "#E6394615", border: "1px solid #E6394630", borderRadius: 18, padding: "10px 14px" }}>
                          <strong style={{ color: "#E63946", fontSize: 13, display: "block", marginBottom: 2 }}>🤡 SOS ALL TIME: {sos?.name}</strong>
                          <span style={{ fontSize: 11, color: "#5E4648" }}>(Score Optimization Needed) · {sos?.P} pts</span>
                        </div>
                        {mbgAt && (
                          <div style={{ flex: 1, background: "#1D355715", border: "1px solid #1D355730", borderRadius: 18, padding: "10px 14px" }}>
                            <strong style={{ color: "#1D3557", fontSize: 13, display: "block", marginBottom: 2 }}>📈 MBG ALL TIME: {mbgAt.name}</strong>
                            <span style={{ fontSize: 11, color: "#5E4648" }}>(Making Big Gains) · +{mbgAt.totalR}R</span>
                          </div>
                        )}
                      </div>
                    </div>
                  )}

                  {allTimeStandings.length > 0 && (
                    <div style={{ overflowX: "auto" }}>
                      <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12 }}>
                        <thead>
                          <tr style={{ borderBottom: "1px solid #10171114" }}>
                            {["#", "Pemain", "Tier", "P", "M", "W-D-L", "TS", "Diff", "R"].map((h, i) => (
                              <th key={i} style={{ padding: "6px 6px", color: "#70839C", fontWeight: 600, textAlign: i === 1 ? "left" : "center", whiteSpace: "nowrap" }}>{h}</th>
                            ))}
                          </tr>
                        </thead>
                        <tbody>
                          {allTimeStandings.map((p, idx) => {
                            const medal = ["🥇","🥈","🥉"][idx] || "";
                            return (
                              <tr key={p.id} style={{ borderBottom: "1px solid #10171106", background: idx===0?"#B07D0008":idx===allTimeStandings.length-1?"#E6394608":"none" }}>
                                <td style={{ padding: "10px 6px", textAlign: "center" }}>{medal || <span style={{ color: "#70839C", fontSize: 11 }}>{idx+1}</span>}</td>
                                <td style={{ padding: "10px 8px", fontSize: 13, fontWeight: 500, whiteSpace: "nowrap", cursor: "pointer" }}
                                  onClick={() => onViewStats && onViewStats(p)}>
                                  <span style={{ borderBottom: "1px dashed #E6394660" }}>{p.name}</span> <span style={{ fontSize: 10, color: "#E6394680" }}>📊</span>
                                </td>
                                <td style={{ padding: "10px 6px", textAlign: "center" }}><TierBadge tier={p.tier} small /></td>
                                <td style={{ padding: "10px 6px", textAlign: "center", fontWeight: 900, color: "#C1121F", fontFamily: "'DM Mono', monospace", fontSize: 13 }}>{p.P}</td>
                                <td style={{ padding: "10px 6px", textAlign: "center", color: "#5E4648" }}>{p.matchesPlayed}</td>
                                <td style={{ padding: "10px 6px", textAlign: "center", fontFamily: "'DM Mono', monospace", fontWeight: 400 }}><span style={{ color: "#1D3557" }}>{p.W}</span><span style={{ color: "#70839C" }}>-</span><span style={{ color: "#B07D00" }}>{p.D}</span><span style={{ color: "#70839C" }}>-</span><span style={{ color: "#E63946" }}>{p.L}</span></td>
                                <td style={{ padding: "10px 6px", textAlign: "center", fontWeight: 400, color: "#5A3A3D", fontFamily: "'DM Mono', monospace" }}>{p.totalFor}</td>
                                <td style={{ padding: "10px 6px", textAlign: "center", fontWeight: 400, color: p.diff>=0?"#1D3557":"#E63946", fontFamily: "'DM Mono', monospace" }}>{p.diff>=0?"+":""}{p.diff}</td>
                                <td style={{ padding: "10px 6px", textAlign: "center", fontWeight: 400, color: "#1D3557", fontFamily: "'DM Mono', monospace" }}>{p.totalR > 0 ? `+${p.totalR}` : "—"}</td>
                              </tr>
                            );
                          })}
                        </tbody>
                      </table>
                      <StandingsLegend />
                    </div>
                  )}
                  </div>
                  {allTimeStandings.length > 0 && (
                    <div style={{ display: "flex", gap: 8, marginTop: 8, paddingBottom: 16 }}>
                      <button onClick={handleDownloadAllTimeImage} disabled={allTimeShareBusy !== null} style={{ flex: 1, background: "#FFFFFF", border: "2px solid #1D3557", borderRadius: 18, padding: "13px 10px", cursor: allTimeShareBusy !== null ? "default" : "pointer", color: "#5A3A3D", fontWeight: 800, fontSize: 13 }}>{allTimeShareBusy === "download" ? "⏳" : "💾"} Simpan Gambar</button>
                      <button onClick={() => handleShareAllTimeWA(allTimeStandings, allDoneMatches)} disabled={allTimeShareBusy !== null} style={{ flex: 1, background: allTimeShareBusy === "share" ? "#8798AE" : "linear-gradient(135deg, #1D3557, #2D4F80)", border: "none", borderRadius: 12, padding: "13px 10px", cursor: allTimeShareBusy !== null ? "default" : "pointer", color: "#fff", fontWeight: 700, fontSize: 13 }}>{allTimeShareBusy === "share" ? "⏳" : "💬"} Kirim WA</button>
                    </div>
                  )}
                </div>
              );
            })()}

            {/* === STATISTIK TAB === */}
            {sessionTab === "stats" && (
              <div>
                <div style={{ fontSize: 13, color: "#70839C", marginBottom: 16 }}>Tap nama pemain untuk melihat statistik lengkap</div>
                <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                  {players.map(p => {
                    const allDone = matches.filter(m => m.status === "done" && [...m.team1,...m.team2].includes(p.id));
                    const wins = allDone.filter(m => {
                      const onT1 = m.team1.includes(p.id);
                      const res = calcMatchResult(m, players);
                      return onT1 ? res.t1Win : res.t2Win;
                    }).length;
                    const winRate = allDone.length > 0 ? Math.round((wins/allDone.length)*100) : 0;
                    return (
                      <div key={p.id} onClick={() => onViewStats && onViewStats(p)} style={{
                        display: "flex", alignItems: "center", gap: 12, padding: "12px 14px",
                        background: "#FFFFFF", border: "2px solid #1D3557", borderRadius: 12, cursor: "pointer",
                      }}>
                        <div style={{ width: 38, height: 38, borderRadius: 10, background: "linear-gradient(135deg,#E6394630,#E6394630)", border: "2px solid #E63946", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 13, fontWeight: 800, color: "#C1121F" }}>{p.name.slice(0,2).toUpperCase()}</div>
                        <div style={{ flex: 1 }}>
                          <div style={{ fontSize: 13, fontWeight: 600, color: "#101711" }}>{p.name}</div>
                          <div style={{ fontSize: 11, color: "#70839C", marginTop: 1 }}>{allDone.length} match · {wins}W · {winRate}% win rate</div>
                        </div>
                        <TierBadge tier={p.tier} small />
                        <div style={{ textAlign: "right" }}>
                          <div style={{ fontSize: 14, fontWeight: 800, color: winRate >= 50 ? "#1D3557" : "#E63946", fontFamily: "'DM Mono', monospace" }}>{winRate}%</div>
                          <div style={{ fontSize: 9, color: "#8798AE" }}>win rate</div>
                        </div>
                        <span style={{ color: "#E6394680", fontSize: 14 }}>›</span>
                      </div>
                    );
                  })}
                  {players.length === 0 && (
                    <div style={{ textAlign: "center", padding: "32px 16px", color: "#70839C", fontSize: 13 }}>Belum ada pemain</div>
                  )}
                </div>
              </div>
            )}

            {/* === PLAYERS TAB === */}
            {sessionTab === "players" && (
              <div>
                <div style={{ background: "#FFFFFF", borderRadius: 22, padding: 16, border: "2px solid #1D3557", boxShadow: "5px 5px 0 #1D3557", marginBottom: 16 }}>
                  <div style={{ fontSize: 13, fontWeight: 600, color: "#101711", marginBottom: 12 }}>+ Tambah Pemain</div>
                  <input type="text" placeholder="Nama Pemain..." value={newPlayerName} onChange={e => setNewPlayerName(e.target.value)}
                    onKeyDown={e => e.key === "Enter" && onAddPlayer()}
                    style={{ width: "100%", background: "#F1FAEE", border: "1px solid #10171120", padding: "12px 14px", borderRadius: 14, color: "#101711", fontSize: 13, outline: "none", marginBottom: 8 }} />
                  <div style={{ display: "flex", gap: 8 }}>
                    <select value={newPlayerTier} onChange={e => setNewPlayerTier(e.target.value)}
                      style={{ flex: 1, background: "#F1FAEE", border: "1px solid #10171120", padding: "12px", borderRadius: 14, color: "#101711", fontSize: 13, outline: "none" }}>
                      {Object.keys(TIER_WEIGHT).map(t => <option key={t} value={t}>Tier {t} — {TIER_WEIGHT[t]} pts</option>)}
                    </select>
                    <button onClick={onAddPlayer} style={{ background: "#E63946", border: "none", borderRadius: 8, padding: "0 20px", color: "#fff", fontWeight: 700, cursor: "pointer" }}>Tambah</button>
                  </div>
                </div>

                {Object.keys(TIER_WEIGHT).map(tier => {
                  const tp = players.filter(p => p.tier === tier);
                  if (!tp.length) return null;
                  const c = TIER_COLORS[tier];
                  return (
                    <div key={tier} style={{ marginBottom: 14 }}>
                      <div style={{ fontSize: 11, fontWeight: 600, color: c.text, background: c.bg, display: "inline-block", padding: "2px 10px", borderRadius: 6, marginBottom: 8, border: `1px solid ${c.border}` }}>
                        Tier {tier} · {TIER_WEIGHT[tier]} pts · {tp.length} pemain
                      </div>
                      <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
                        {tp.map(p => {
                          const history = (p.tierHistory||[]).filter(h=>h.type!=="init");
                          return (
                            <div key={p.id} style={{ background: "#FFFFFF", border: "2px solid #1D3557", borderRadius: 18, padding: "10px 14px" }}>
                              <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                                <div style={{ width: 32, height: 32, borderRadius: 8, background: "#10171108", border: "1px solid #10171115", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 11, fontWeight: 700, color: "#70839C" }}>{p.name.slice(0,2).toUpperCase()}</div>
                                <div style={{ flex: 1 }}>
                                  <div onClick={() => onViewStats && onViewStats(p)} style={{ fontSize: 13, fontWeight: 600, color: "#101711", cursor: "pointer", borderBottom: "1px dashed #E6394640", display: "inline-block" }}>{p.name} <span style={{ fontSize: 10, color: "#E6394680" }}>📊</span></div>
                                  {history.length > 0 && (
                                    <div style={{ fontSize: 10, color: "#70839C", marginTop: 1 }}>
                                      {(history[history.length-1].type === "naik" || history[history.length-1].type === "resmi") ? "🚀" : "🔧"} Tier terakhir diubah di {history[history.length-1].sessionLabel}
                                    </div>
                                  )}
                                </div>
                                <TierBadge tier={p.tier} small />
                                <button onClick={() => onEditPlayer(p)} style={{ background: "#FFFFFF", border: "2px solid #1D3557", color: "#5A3A3D", borderRadius: 6, padding: "4px 10px", fontSize: 11, cursor: "pointer" }}>Edit</button>
                                <button onClick={() => onDeletePlayer(p.id, p.name)} style={{ background: "#FFE9EC30", border: "1px solid #E6394650", color: "#C1121F", borderRadius: 6, padding: "4px 8px", fontSize: 11, cursor: "pointer" }}>✕</button>
                              </div>
                              {history.length > 0 && (
                                <div style={{ marginTop: 8, paddingTop: 8, borderTop: "1px solid #10171108" }}>
                                  <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                                    {history.map((h,i) => (
                                      <span key={i} style={{ fontSize: 10, background: (h.type==="naik"||h.type==="resmi")?"#E6394615":"#FFB70315", border: `1px solid ${(h.type==="naik"||h.type==="resmi")?"#E6394630":"#FFB70330"}`, color: (h.type==="naik"||h.type==="resmi")?"#C1121F":"#B07D00", borderRadius: 6, padding: "2px 7px" }}>
                                        {(h.type==="naik"||h.type==="resmi")?"🚀":"🔧"} {h.from}→{h.to} · {h.sessionLabel}
                                      </span>
                                    ))}
                                  </div>
                                </div>
                              )}
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  );
                })}
                {players.length === 0 && (
                  <div style={{ textAlign: "center", padding: "32px 16px", color: "#70839C", fontSize: 13 }}>Belum ada pemain. Tambah pemain di atas!</div>
                )}
              </div>
            )}

            {/* === RULES TAB === */}
            {sessionTab === "rules" && (
              <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
                <div style={{ background: "linear-gradient(135deg, #E6394620, #E6394620)", border: "2px solid #E63946", borderRadius: 12, padding: 16, textAlign: "center" }}>
                  <div style={{ fontSize: 11, color: "#C1121F", fontWeight: 700, letterSpacing: "0.05em", marginBottom: 4 }}>RUMUS UTAMA KLASEMEN</div>
                  <div style={{ fontFamily: "'DM Mono', monospace", fontSize: 22, fontWeight: 700, color: "#101711" }}>P = TS + S + R + M</div>
                  <div style={{ fontSize: 11, color: "#70839C", marginTop: 4 }}>M hanya berlaku di Klasemen Harian</div>
                </div>
                {[
                  { code: "TS", color: "#374151", text: "#101711", border: "#374151", label: "Total Skor (Poin Murni)", desc: "Akumulasi angka murni dari seluruh Game yang dicetak pemain." },
                  { code: "S", color: "#1D355730", text: "#1D3557", border: "#1D355750", label: "Status Match", desc: "Menang: +3 · Seri/Draw: +1 · Kalah: 0" },
                  { code: "R", color: "#FFB70330", text: "#B07D00", border: "#FFB70350", label: "Subsidi Tier (Underdog)", desc: "Selisih ≥200: Menang +4, Draw/Kalah +2 · Selisih ≥50: Menang +2, Draw/Kalah +1" },
                  { code: "M", color: "#3b82f630", text: "#1D3557", border: "#3b82f650", label: "Kompensasi Absen (Harian)", desc: "+10 per match terlewat vs pemain yang main terbanyak. Hanya untuk yang check-in." },
                ].map(item => (
                  <div key={item.code} style={{ background: "#FFFFFF", borderRadius: 22, padding: 16, boxShadow: "5px 5px 0 #1D3557", border: "2px solid #1D3557" }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 6 }}>
                      <span style={{ background: item.color, color: item.text, border: `1px solid ${item.border}`, padding: "2px 8px", borderRadius: 4, fontSize: 12, fontWeight: 700, fontFamily: "'DM Mono', monospace" }}>{item.code}</span>
                      <span style={{ fontWeight: 600, fontSize: 13, color: "#101711" }}>{item.label}</span>
                    </div>
                    <div style={{ fontSize: 12, color: "#5E4648", lineHeight: 1.5 }}>{item.desc}</div>
                  </div>
                ))}
                <div style={{ background: "#FFFFFF", borderRadius: 22, padding: 16, boxShadow: "5px 5px 0 #1D3557", border: "2px solid #1D3557" }}>
                  <div style={{ fontSize: 11, color: "#70839C", fontWeight: 700, marginBottom: 6 }}>TIE-BREAKER</div>
                  <div style={{ fontSize: 12, color: "#5E4648", lineHeight: 1.6 }}>1. DIFF — selisih skor masuk vs kemasukan<br/>2. W — jumlah kemenangan terbanyak</div>
                </div>
              </div>
            )}

            {/* === SESSIONS TAB === */}
            {sessionTab === "sessions" && <div>
            {/* New Session Button */}
            <button onClick={onNewSession} style={{
              width: "100%", padding: "18px", marginBottom: 24,
              background: "#E63946",
              border: "none", borderRadius: 16, color: "#fff",
              fontWeight: 700, fontSize: 14, cursor: "pointer",
              boxShadow: "6px 6px 0 #1D3557",
              display: "flex", alignItems: "center", justifyContent: "center", gap: 8,
            }}>✨ Mulai Sesi Baru</button>

            {/* Sessions list */}
            <div style={{ fontSize: 12, fontWeight: 700, color: "#70839C", letterSpacing: "0.06em", textTransform: "uppercase", marginBottom: 10 }}>Riwayat Sesi</div>

            {sessions.length === 0 && (
              <div style={{ textAlign: "center", padding: "32px 16px", background: "#FFFFFF", borderRadius: 22, border: "1px dashed #C1121F30", color: "#70839C", fontSize: 13, boxShadow: "6px 6px 0 #1D3557" }}>
                Belum ada sesi. Mulai sesi baru!
              </div>
            )}

            {[...sessions].reverse().map((sess, idx) => {
              const stats = getSessionStats(sess);
              const isActive = sess.id === currentSessionId;
              return (
                <div key={sess.id} onClick={() => onSelectSession(sess.id)}
                  style={{
                    background: isActive ? "linear-gradient(135deg, #FFFFFF, #F1FAEE)" : "#FFFFFF",
                    border: `1px solid ${isActive ? "#E6394660" : "#1017110a"}`,
                    borderRadius: 22, padding: 18, marginBottom: 14, cursor: "pointer", boxShadow: isActive ? "0 18px 42px #E6394618" : "0 12px 34px #5A3A3D10",
                    transition: "all 0.15s",
                  }}>
                  {/* Top row */}
                  <div style={{ display: "flex", alignItems: "flex-start", justifyContent: "space-between", marginBottom: 10 }}>
                    <div>
                      <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                        <span style={{ fontWeight: 700, fontSize: 14, color: isActive ? "#C1121F" : "#101711" }}>{sess.label}</span>
                        {isActive && <span style={{ fontSize: 10, background: "#E6394640", color: "#C1121F", border: "2px solid #E63946", borderRadius: 20, padding: "1px 8px", fontWeight: 700 }}>AKTIF</span>}
                      </div>
                      <div style={{ fontSize: 11, color: "#70839C", marginTop: 2 }}>{sess.date}</div>
                    </div>
                    <div style={{ textAlign: "right", display: "flex", flexDirection: "column", alignItems: "flex-end", gap: 5 }}>
                      <div>
                        <div style={{ fontSize: 18, fontWeight: 800, color: isActive ? "#C1121F" : "#101711", fontFamily: "'DM Mono', monospace" }}>{stats.matchCount}</div>
                        <div style={{ fontSize: 10, color: "#70839C" }}>match</div>
                      </div>
                      {sessions.length > 1 && (
                        <button onClick={(e) => { e.stopPropagation(); onDeleteSession(sess.id); }} style={{ background: "#FFE9EC20", border: "2px solid #E63946", color: "#C1121F", borderRadius: 7, padding: "4px 8px", fontSize: 10, cursor: "pointer", fontWeight: 700 }}>Hapus</button>
                      )}
                    </div>
                  </div>

                  {/* WOW / SOS / MBG / AFK */}
                  {stats.matchCount > 0 && (
                    <div style={{ display: "flex", flexDirection: "column", gap: 5 }}>
                      {stats.wow && (
                        <div style={{ display: "flex", alignItems: "center", gap: 6, background: "#B07D0010", borderRadius: 8, padding: "5px 10px" }}>
                          <span style={{ fontSize: 13 }}>🏆</span>
                          <span style={{ fontSize: 11, color: "#B07D00", fontWeight: 700, minWidth: 52 }}>WOW</span>
                          <span style={{ fontSize: 12, color: "#101711", fontWeight: 600 }}>{stats.wow.name}</span>
                          <span style={{ fontSize: 11, color: "#70839C", marginLeft: "auto", fontFamily: "'DM Mono', monospace" }}>{stats.wow.P}pts · {stats.wow.W}W</span>
                        </div>
                      )}
                      {stats.sos && (
                        <div style={{ display: "flex", alignItems: "center", gap: 6, background: "#ef444415", borderRadius: 8, padding: "5px 10px" }}>
                          <span style={{ fontSize: 13 }}>🤡</span>
                          <span style={{ fontSize: 11, color: "#E63946", fontWeight: 700, minWidth: 52 }}>SOS</span>
                          <span style={{ fontSize: 12, color: "#101711", fontWeight: 600 }}>{stats.sos.name}</span>
                          <span style={{ fontSize: 11, color: "#70839C", marginLeft: "auto", fontFamily: "'DM Mono', monospace" }}>{stats.sos.P}pts · {stats.sos.W}W</span>
                        </div>
                      )}
                      {stats.mbg && (
                        <div style={{ display: "flex", alignItems: "center", gap: 6, background: "#1D355715", borderRadius: 8, padding: "5px 10px" }}>
                          <span style={{ fontSize: 13 }}>📈</span>
                          <span style={{ fontSize: 11, color: "#1D3557", fontWeight: 700, minWidth: 52 }}>MBG</span>
                          <span style={{ fontSize: 12, color: "#101711", fontWeight: 600 }}>{stats.mbg.name}</span>
                          <span style={{ fontSize: 11, color: "#70839C", marginLeft: "auto", fontFamily: "'DM Mono', monospace" }}>+{stats.mbg.totalR}R</span>
                        </div>
                      )}
                      {stats.matchCount > 0 && !stats.wow && (
                        <div style={{ fontSize: 12, color: "#8798AE", textAlign: "center", padding: "4px 0" }}>Belum ada match selesai</div>
                      )}
                    </div>
                  )}

                  {stats.matchCount === 0 && (
                    <div style={{ fontSize: 12, color: "#8798AE" }}>Belum ada match di sesi ini</div>
                  )}

                  <div style={{ marginTop: 10, fontSize: 11, color: isActive ? "#E63946" : "#8798AE", fontWeight: 600, textAlign: "right" }}>
                    {isActive ? "▶ Lanjutkan sesi ini →" : "Tap untuk buka →"}
                  </div>
                </div>
              );
            })}
            </div>}
          </div>
        </div>
      );
    }

    // ===== WORKSPACE SCREEN =====
    function WorkspaceScreen({ workspaces, onOpen, onCreate, onRename, onReset, onDelete, confirmDialog, setConfirmDialog }) {
      const [creating, setCreating] = React.useState(false);
      const [newName, setNewName] = React.useState("");
      const [renamingId, setRenamingId] = React.useState(null);
      const [renameName, setRenameName] = React.useState("");
      const [newEmoji, setNewEmoji] = React.useState("🏸");
      const emojis = ["🏸","🎾","🏓","⚽","🏀","🏐","🥏","🎱"];
      const fmtDate = (ts) => ts ? new Date(ts).toLocaleDateString('id-ID', { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' }) : "-";
      return (
        <div style={{ minHeight: "100vh", background: "#F1FAEE", color: "#101711", maxWidth: 430, margin: "0 auto", padding: "24px 20px 40px" }}>
          <div style={{ display: "flex", alignItems: "flex-start", justifyContent: "space-between", marginBottom: 30 }}>
            <div>
              <div style={{ display: "flex", alignItems: "baseline", gap: 0, fontFamily: "'Archivo Narrow', sans-serif", fontStyle: "italic", fontSize: 38, fontWeight: 700, lineHeight: 0.9, letterSpacing: "-0.04em", textTransform: "uppercase" }}>
                <span style={{ color: "#E63946" }}>COURT</span><span style={{ color: "transparent", WebkitTextStroke: "1.4px #E63946", textStroke: "1.4px #E63946" }}>RANK</span>
              </div>
              <div style={{ fontFamily: "'Archivo Narrow', sans-serif", fontSize: 28, fontWeight: 700, marginTop: 26, color: "#1D3557", textTransform: "uppercase" }}>Pilih Arena</div>
              <div style={{ fontSize: 13, color: "#5E4648", marginTop: 4, lineHeight: 1.45 }}>Pilih arena untuk melanjutkan aktivitasmu hari ini.</div>
            </div>
            <div style={{ width: 46, height: 46, borderRadius: 16, background: "#FFFFFF", boxShadow: "0 10px 28px #5A3A3D18", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 22 }}>🎾</div>
          </div>

          {workspaces.length === 0 && !creating && (
            <div style={{ textAlign: "center", padding: "32px 16px", background: "#FFFFFF", borderRadius: 22, border: "1px dashed #C1121F35", boxShadow: "8px 8px 0 #1D3557", marginBottom: 20 }}>
              <div style={{ fontSize: 32, marginBottom: 12 }}>👋</div>
              <div style={{ fontWeight: 600, color: "#101711", marginBottom: 6 }}>Belum ada Arena</div>
              <div style={{ fontSize: 13, color: "#70839C" }}>Buat Arena baru untuk mulai, atau buka link handover dari teman</div>
            </div>
          )}

          <div style={{ display: "flex", flexDirection: "column", gap: 12, marginBottom: 16 }}>
            {workspaces.map(ws => (
              <div key={ws.id} style={{ background: "#FFFFFF", border: "2px solid #1D3557", borderRadius: 22, padding: 18, boxShadow: "8px 8px 0 #1D3557" }}>
                <div style={{ display: "flex", alignItems: "center", gap: 14, marginBottom: 16 }}>
                  <div style={{ fontSize: 28, width: 54, height: 54, display: "flex", alignItems: "center", justifyContent: "center", background: "linear-gradient(135deg, #1D3557, #C9D9F2)", border: "2px solid #1D3557", borderRadius: 20 }}>{ws.emoji}</div>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ fontWeight: 800, fontSize: 17, color: "#101711", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{ws.name}</div>
                    <div style={{ fontSize: 12, color: "#5E4648", marginTop: 4, lineHeight: 1.35 }}>Update: {fmtDate(ws.updatedAt)}</div>
                  </div>
                  <button onClick={() => onOpen(ws)} style={{ background: "#E63946", border: "2px solid #1D3557", color: "#fff", borderRadius: 16, padding: "14px 26px", fontSize: 15, fontWeight: 850, cursor: "pointer", boxShadow: "5px 5px 0 #1D3557", minWidth: 96 }}>Buka</button>
                </div>
                <div style={{ height: 1, background: "#10171110", marginBottom: 12 }} />
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8 }}>
                  <button onClick={() => { setRenamingId(ws.id); setRenameName(ws.name); }} style={{ background: "#FFFFFF", border: "2px solid #1D3557", color: "#5A3A3D", borderRadius: 16, padding: "10px 6px", fontSize: 12, fontWeight: 800, cursor: "pointer" }}>✎ Rename</button>
                  <button onClick={() => onReset(ws.id)} style={{ background: "#FFFFFF", border: "2px solid #1D3557", color: "#5A3A3D", borderRadius: 16, padding: "10px 6px", fontSize: 12, fontWeight: 800, cursor: "pointer" }}>↻ Reset</button>
                  <button onClick={() => onDelete(ws.id)} style={{ background: "#FFE9EC", border: "2px solid #E63946", color: "#C1121F", borderRadius: 16, padding: "10px 6px", fontSize: 12, fontWeight: 850, cursor: "pointer" }}>⌫ Hapus</button>
                </div>
              </div>
            ))}
          </div>

          {!creating ? (
            <button onClick={() => setCreating(true)} style={{ width: "100%", padding: "18px", background: "#F1FAEE", border: "2px dashed #C1121F30", borderRadius: 22, color: "#5A3A3D", fontWeight: 850, fontSize: 14, cursor: "pointer", minHeight: 104 }}>
              + Buat Arena Baru
            </button>
          ) : (
            <div style={{ background: "#FFFFFF", border: "2px solid #E63946", borderRadius: 22, padding: 20, boxShadow: "8px 8px 0 #1D3557" }}>
              <div style={{ fontWeight: 700, marginBottom: 14, fontSize: 14 }}>Arena Baru</div>
              <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 12 }}>
                {emojis.map(e => (
                  <button key={e} onClick={() => setNewEmoji(e)} style={{ fontSize: 22, background: newEmoji === e ? "#E6394640" : "#10171108", border: `1px solid ${newEmoji === e ? "#E6394680" : "transparent"}`, borderRadius: 16, padding: "8px 12px", cursor: "pointer" }}>{e}</button>
                ))}
              </div>
              <input value={newName} onChange={e => setNewName(e.target.value)} placeholder="Nama (misal: Badminton GBK, Padel Jumat...)"
                style={{ width: "100%", background: "#F1FAEE", border: "1px solid #10171120", borderRadius: 14, padding: "12px 14px", color: "#101711", fontSize: 13, outline: "none", marginBottom: 12 }} />
              <div style={{ display: "flex", gap: 8 }}>
                <button onClick={() => setCreating(false)} style={{ flex: 1, padding: "11px", background: "#10171110", border: "none", borderRadius: 10, color: "#101711", fontWeight: 600, cursor: "pointer" }}>Batal</button>
                <button onClick={() => { if (newName.trim()) { onCreate(newName.trim(), newEmoji); setCreating(false); setNewName(""); }}} style={{ flex: 1, padding: "11px", background: "#E63946", border: "none", borderRadius: 16, color: "#fff", fontWeight: 700, cursor: "pointer" }}>Buat</button>
              </div>
            </div>
          )}

          {renamingId && (
            <div style={{ position: "fixed", inset: 0, background: "#000000cc", zIndex: 1500, display: "flex", alignItems: "center", justifyContent: "center", padding: 20 }} onClick={() => setRenamingId(null)}>
              <div style={{ background: "#FFFFFF", borderRadius: 16, padding: 20, width: "100%", maxWidth: 320, border: "2px solid #1D3557" }} onClick={e => e.stopPropagation()}>
                <div style={{ fontSize: 16, fontWeight: 800, marginBottom: 12, color: "#101711" }}>Rename Arena</div>
                <input value={renameName} onChange={e => setRenameName(e.target.value)} autoFocus style={{ width: "100%", background: "#F1FAEE", border: "1px solid #10171120", borderRadius: 14, padding: "12px 14px", color: "#101711", fontSize: 13, outline: "none", marginBottom: 14 }} />
                <div style={{ display: "flex", gap: 8 }}>
                  <button onClick={() => setRenamingId(null)} style={{ flex: 1, padding: "11px", background: "#10171110", border: "none", borderRadius: 10, color: "#101711", fontWeight: 600, cursor: "pointer" }}>Batal</button>
                  <button onClick={() => { onRename(renamingId, renameName); setRenamingId(null); }} style={{ flex: 1, padding: "11px", background: "#E63946", border: "none", borderRadius: 16, color: "#fff", fontWeight: 700, cursor: "pointer" }}>Simpan</button>
                </div>
              </div>
            </div>
          )}
          {confirmDialog && (
            <div style={{ position: "fixed", inset: 0, background: "#000000cc", zIndex: 1500, display: "flex", alignItems: "center", justifyContent: "center", padding: 20 }} onClick={() => setConfirmDialog(null)}>
              <div style={{ background: "#FFFFFF", borderRadius: 16, padding: 24, width: "100%", maxWidth: 320, border: "2px solid #1D3557", textAlign: "center" }} onClick={e => e.stopPropagation()}>
                <div style={{ fontSize: 16, fontWeight: 700, marginBottom: 12, color: "#C1121F" }}>{confirmDialog.title}</div>
                <div style={{ fontSize: 13, color: "#5E4648", marginBottom: 24, lineHeight: 1.5 }}>{confirmDialog.message}</div>
                <div style={{ display: "flex", gap: 10 }}>
                  <button onClick={() => setConfirmDialog(null)} style={{ flex: 1, padding: "12px", borderRadius: 10, background: "#10171110", border: "none", color: "#101711", fontWeight: 600, cursor: "pointer" }}>Batal</button>
                  <button onClick={confirmDialog.onConfirm} style={{ flex: 1, padding: "12px", borderRadius: 10, background: "#FFE9EC", border: "1px solid #E6394645", color: "#C1121F", fontWeight: 600, cursor: "pointer" }}>Hapus</button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    // ===== GIST MODAL =====
    function GistModal({ token, setToken, gistId, setGistId, onSave, onRestore, onClose }) {
      const [localToken, setLocalToken] = React.useState(token);
      const [localGistId, setLocalGistId] = React.useState(gistId);
      const [showToken, setShowToken] = React.useState(false);
      return (
        <div style={{ position: "fixed", inset: 0, background: "#000000dd", zIndex: 1500, display: "flex", alignItems: "flex-end", justifyContent: "center" }} onClick={onClose}>
          <div style={{ background: "#FFFFFF", borderRadius: "28px 28px 0 0", padding: 20, width: "100%", maxWidth: 430, border: "2px solid #1D3557", maxHeight: "90vh", overflowY: "auto" }} onClick={e => e.stopPropagation()}>
            <div style={{ fontSize: 15, fontWeight: 700, marginBottom: 4 }}>☁️ GitHub Gist Backup</div>
            <div style={{ fontSize: 12, color: "#70839C", marginBottom: 16, lineHeight: 1.5 }}>
              Simpan & pulihkan data ke GitHub Gist. Data tersimpan di akun GitHub kamu — aman & privat.
              <br/><a href="https://github.com/settings/tokens/new?scopes=gist" target="_blank" style={{ color: "#C1121F" }}>Buat token di sini (centang "gist")</a>
            </div>
            <div style={{ fontSize: 12, color: "#5E4648", marginBottom: 4, fontWeight: 600 }}>GitHub Token</div>
            <div style={{ display: "flex", gap: 6, marginBottom: 12 }}>
              <input type={showToken ? "text" : "password"} value={localToken} onChange={e => setLocalToken(e.target.value)} placeholder="ghp_xxxxxxxxxxxx"
                style={{ flex: 1, background: "#F1FAEE", border: "1px solid #10171120", borderRadius: 14, padding: "11px 14px", color: "#101711", fontSize: 12, outline: "none" }} />
              <button onClick={() => setShowToken(p => !p)} style={{ background: "#10171110", border: "none", borderRadius: 8, padding: "0 12px", color: "#5E4648", cursor: "pointer", fontSize: 13 }}>{showToken ? "🙈" : "👁"}</button>
            </div>
            <div style={{ fontSize: 12, color: "#5E4648", marginBottom: 4, fontWeight: 600 }}>Gist ID <span style={{ color: "#8798AE", fontWeight: 400 }}>(kosongkan untuk buat baru)</span></div>
            <input value={localGistId} onChange={e => setLocalGistId(e.target.value)} placeholder="xxxxxxxxxxxxxxxx"
              style={{ width: "100%", background: "#F1FAEE", border: "1px solid #10171120", borderRadius: 14, padding: "11px 14px", color: "#101711", fontSize: 12, outline: "none", marginBottom: 16 }} />
            <div style={{ display: "flex", gap: 8 }}>
              <button onClick={() => { setToken(localToken); setGistId(localGistId); onRestore(localToken, localGistId); }} style={{ flex: 1, padding: "11px", background: "#FFFFFF", border: "2px solid #1D3557", borderRadius: 14, color: "#5A3A3D", fontWeight: 600, cursor: "pointer", fontSize: 13 }}>⬇ Restore</button>
              <button onClick={() => { setToken(localToken); setGistId(localGistId); onSave(localToken, localGistId); onClose(); }} style={{ flex: 1, padding: "11px", background: "#E63946", border: "none", borderRadius: 16, color: "#fff", fontWeight: 700, cursor: "pointer", fontSize: 13 }}>⬆ Simpan ke Gist</button>
            </div>
            {localGistId && <div style={{ marginTop: 10, fontSize: 11, color: "#70839C", textAlign: "center" }}>Gist ID: <a href={`https://gist.github.com/${localGistId}`} target="_blank" style={{ color: "#C1121F" }}>{localGistId}</a></div>}
          </div>
        </div>
      );
    }

    // ===== HANDOVER MODAL =====
    function HandoverModal({ onHandover, onClose, workspaceName, matchCount, playerCount }) {
      return (
        <div style={{ position: "fixed", inset: 0, background: "#000000dd", zIndex: 1500, display: "flex", alignItems: "flex-end", justifyContent: "center" }} onClick={onClose}>
          <div style={{ background: "#FFFFFF", borderRadius: "28px 28px 0 0", padding: 20, width: "100%", maxWidth: 430, border: "2px solid #FFB703" }} onClick={e => e.stopPropagation()}>
            <div style={{ fontSize: 15, fontWeight: 700, marginBottom: 4, color: "#B07D00" }}>🤝 Handover ke Operator Berikutnya</div>
            <div style={{ fontSize: 12, color: "#5E4648", marginBottom: 20, lineHeight: 1.6 }}>
              Kirimkan link ini ke operator berikutnya via WA.<br/>
              Mereka tinggal buka link → data otomatis masuk sebagai Arena baru.
            </div>
            <div style={{ background: "#F1FAEE", border: "2px solid #FFB703", borderRadius: 22, padding: 16, boxShadow: "5px 5px 0 #1D3557", marginBottom: 20 }}>
              <div style={{ fontSize: 13, color: "#B07D00", fontWeight: 700, marginBottom: 8 }}>📦 Yang akan dikirim:</div>
              <div style={{ fontSize: 12, color: "#5E4648", lineHeight: 1.8 }}>
                ✅ Arena: <strong style={{ color: "#101711" }}>{workspaceName}</strong><br/>
                ✅ {playerCount} pemain & tier mereka<br/>
                ✅ {matchCount} match + skor + riwayat tier<br/>
                ✅ Sesi, klasemen harian & All Time<br/>
                ✅ Riwayat head-to-head
              </div>
            </div>
            <button onClick={onHandover} style={{ width: "100%", padding: "14px", background: "#FFB703", border: "none", borderRadius: 12, color: "#000", fontWeight: 800, fontSize: 14, cursor: "pointer" }}>
              📤 Kirim via WA sekarang
            </button>
          </div>
        </div>
      );
    }

    const root = createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
