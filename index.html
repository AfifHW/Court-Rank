            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 4 }}>
              <span style={{ fontWeight: 700, fontSize: 16 }}>Manual Match</span>
              <button onClick={onClose} style={{
                background: "#ffffff12", border: "none", color: "#9ca3af",
                borderRadius: 8, width: 32, height: 32, cursor: "pointer", fontSize: 16,
              }}>×</button>
            </div>
            <div style={{ fontSize: 12, color: "#6b7280", marginBottom: 14, lineHeight: "1.5" }}>
              Pilih <strong>2 pemain (Single)</strong> atau <strong>4 pemain (Double)</strong>.
              <br/><span style={{fontSize: 10, opacity: 0.8}}>Single: Pemain (1) vs (2). Double: (1)&(2) vs (3)&(4).</span>
            </div>

            <div style={{ marginBottom: 14 }}>
              <div style={{ fontSize: 11, color: "#6b7280", fontWeight: 600, marginBottom: 6, letterSpacing: "0.05em", textTransform: "uppercase" }}>Pilih Match (Lapangan)</div>
              <div style={{ display: "flex", gap: 8 }}>
                {courts.map(c => (
                  <button key={c} onClick={() => setCourt(c)} style={{
                    flex: 1, padding: "8px 0",
                    background: court === c ? "linear-gradient(135deg, #6366f1, #8b5cf6)" : "#0d0d1a",
                    border: "1px solid #ffffff14", borderRadius: 8, cursor: "pointer",
                    color: court === c ? "#fff" : "#9ca3af", fontSize: 13, fontWeight: 600,
                  }}>M. {c}</button>
                ))}
              </div>
            </div>

            <div style={{ display: "flex", flexDirection: "column", gap: 6, marginBottom: 14 }}>
              {players.map(p => {
                const sel = selected.includes(p.id);
                const label = teamLabel(p.id);
                return (
                  <button key={p.id} onClick={() => toggle(p.id)} style={{
                    display: "flex", alignItems: "center", gap: 10,
                    background: sel ? "#1a1a2e" : "#0d0d1a",
                    border: `1px solid ${sel ? "#6366f150" : "#ffffff0a"}`,
                    borderRadius: 10, padding: "10px 12px", cursor: "pointer",
                    textAlign: "left",
                  }}>
                    {label && (
                      <span style={{
                        width: 28, height: 22, borderRadius: 5, fontSize: 11, fontWeight: 700,
                        background: (label === 1 || label === 2) ? "#6366f130" : "#8b5cf630",
                        color: (label === 1 || label === 2) ? "#818cf8" : "#a78bfa",
                        display: "flex", alignItems: "center", justifyContent: "center",
                        flexShrink: 0,
                      }}>{label}</span>
                    )}
                    {!label && <div style={{ width: 28, height: 22 }} />}
                    <TierBadge tier={p.tier} small />
                    <span style={{ fontSize: 13, fontWeight: 500, color: sel ? "#e8e8f0" : "#9ca3af" }}>{p.name}</span>
                    <span style={{ marginLeft: "auto", fontSize: 11, color: "#4b5563" }}>{TIER_WEIGHT[p.tier]}</span>
                  </button>
                );
              })}
            </div>

            <button
              onClick={onSubmit}
              disabled={selected.length !== 2 && selected.length !== 4}
              style={{
                width: "100%", padding: "14px 0",
                background: (selected.length === 2 || selected.length === 4)
                  ? "linear-gradient(135deg, #6366f1, #8b5cf6)" : "#1e1e2e",
                border: "none", borderRadius: 10, cursor: (selected.length === 2 || selected.length === 4) ? "pointer" : "default",
                color: (selected.length === 2 || selected.length === 4) ? "#fff" : "#374151",
                fontWeight: 700, fontSize: 15, transition: "all 0.15s",
              }}
            >
              {(selected.length === 2 || selected.length === 4) ? "Mulai Match" : `Single butuh 2 pemain, Double 4 pemain`}
            </button>
          </div>
        </div>
      );
    }

    function EditPlayerModal({ player, onClose, onSave }) {
      const [name, setName] = useState(player.name);
      const [tier, setTier] = useState(player.tier);

      const handleSubmit = (e) => {
        e.preventDefault();
        if (!name.trim()) return;
        onSave(player.id, name.trim(), tier);
      };

      return (
        <div style={{
          position: "fixed", inset: 0, background: "#000000cc",
          zIndex: 200, display: "flex", alignItems: "flex-end",
        }} onClick={onClose}>
          <div style={{
            background: "#13131f", borderRadius: "18px 18px 0 0",
            padding: "20px 20px 36px", width: "100%",
            border: "1px solid #ffffff14",
          }} onClick={e => e.stopPropagation()}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
              <span style={{ fontWeight: 700, fontSize: 16 }}>Edit Pemain</span>
              <button onClick={onClose} style={{
                background: "#ffffff12", border: "none", color: "#9ca3af",
                borderRadius: 8, width: 32, height: 32, cursor: "pointer", fontSize: 16,
              }}>×</button>
            </div>

            <form onSubmit={handleSubmit} style={{ display: "flex", flexDirection: "column", gap: 12 }}>
              <div>
                <label style={{ fontSize: 11, color: "#9ca3af", marginBottom: 4, display: "block" }}>Nama Pemain</label>
                <input
                  type="text" value={name} onChange={e => setName(e.target.value)}
                  style={{
                    width: "100%", background: "#0a0a0f", border: "1px solid #ffffff20",
                    padding: "12px", borderRadius: 8, color: "#fff", fontSize: 14, outline: "none",
                    fontFamily: "'DM Sans', sans-serif"
                  }}
                />
              </div>
              <div>
                <label style={{ fontSize: 11, color: "#9ca3af", marginBottom: 4, display: "block" }}>Tier</label>
                <select
                  value={tier} onChange={e => setTier(e.target.value)}
                  style={{
                    width: "100%", background: "#0a0a0f", border: "1px solid #ffffff20",
                    padding: "12px", borderRadius: 8, color: "#fff", fontSize: 14, outline: "none",
                    fontFamily: "'DM Sans', sans-serif"
                  }}
                >
                  {Object.keys(TIER_WEIGHT).map(t => (
                    <option key={t} value={t}>Tier {t} ({TIER_WEIGHT[t]} pts)</option>
                  ))}
                </select>
              </div>
              <button type="submit" style={{
                width: "100%", padding: "14px 0", marginTop: 8,
                background: "linear-gradient(135deg, #6366f1, #8b5cf6)",
                border: "none", borderRadius: 10, cursor: "pointer",
                color: "#fff", fontWeight: 700, fontSize: 15,
                fontFamily: "'DM Sans', sans-serif"
              }}>Simpan Perubahan</button>
            </form>
          </div>
        </div>
      );
    }

    // Initialize the app
    const root = createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
