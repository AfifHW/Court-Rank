          sessions: [{ id: "s1", label: "Sesi 1", date: new Date().toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long' }), createdAt: Date.now() }],
          currentSessionId: "s1", githubGistId: "",
        };
        localStorage.setItem(`courtRank_ws_${newId}`, JSON.stringify(initData));
        const updated = [...workspaces, newWs];
        setWorkspaces(updated);
        localStorage.setItem(WORKSPACES_KEY, JSON.stringify(updated));
        setPlayers([]); setMatches([]); setCheckedInBySession({ s1: [] }); setNumCourts(3);
        setSessions(initData.sessions); setCurrentSessionId("s1"); setGithubGistId("");
        setWorkspaceId(newId);
        setScreen("session");
      };

      const handleDeleteWorkspace = (wsId) => {
        setConfirmDialog({
          title: "Hapus Arena",
          message: "Yakin ingin menghapus arena ini? Semua data akan hilang permanen.",
          isDanger: true,
          onConfirm: () => {
            localStorage.removeItem(`courtRank_ws_${wsId}`);
            const updated = workspaces.filter(w => w.id !== wsId);
            setWorkspaces(updated);
            localStorage.setItem(WORKSPACES_KEY, JSON.stringify(updated));
            setConfirmDialog(null);
          }
        });
      };

      const handleResetWorkspace = (wsId) => {
        const ws = workspaces.find(w => w.id === wsId);
        if (ws?.readOnly) return showNotify("Arena lihat saja tidak bisa di-reset.", "error");
        setConfirmDialog({
          title: "Reset Arena Ini",
          message: `Yakin ingin mereset ${ws?.name || "Arena ini"}? Semua pemain, sesi, match, daftar hadir, dan klasemen di Arena ini akan dikosongkan. Nama Arena tetap dipertahankan.`,
          isDanger: true,
          onConfirm: () => {
            const freshSession = { id: "s1", label: "Sesi 1", date: new Date().toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long' }), createdAt: Date.now() };
            const freshData = {
              players: [], matches: [], checkedIn: [], checkedInBySession: { s1: [] }, numCourts: 3,
              sessions: [freshSession], currentSessionId: "s1", githubGistId: "", readOnly: false,
            };
            localStorage.setItem(`courtRank_ws_${wsId}`, JSON.stringify(freshData));
            const updated = workspaces.map(w => w.id === wsId ? { ...w, updatedAt: Date.now() } : w);
            setWorkspaces(updated);
            localStorage.setItem(WORKSPACES_KEY, JSON.stringify(updated));
            if (workspaceId === wsId) {
              setPlayers([]); setMatches([]); setCheckedInBySession({ s1: [] }); setNumCourts(3);
              setSessions([freshSession]); setCurrentSessionId("s1"); setGithubGistId(""); setReadOnly(false);
            }
            showNotify(`${ws?.name || "Arena"} berhasil di-reset.`, "success");
            setConfirmDialog(null);
          }
        });
      };

      const handleRenameWorkspace = (wsId, newName) => {
        const ws = workspaces.find(w => w.id === wsId);
        if (ws?.readOnly) return showNotify("Arena lihat saja tidak bisa di-rename.", "error");
        const cleanName = newName.trim();
        if (!cleanName) return;
        const updated = workspaces.map(w => w.id === wsId ? { ...w, name: cleanName, updatedAt: Date.now() } : w);
        setWorkspaces(updated);
        localStorage.setItem(WORKSPACES_KEY, JSON.stringify(updated));
        showNotify("Nama Arena berhasil diganti!", "success");
      };

      const buildWorkspaceBackupPayload = (ws) => {
        if (!ws) throw new Error("Arena tidak ditemukan");
        const raw = localStorage.getItem(`courtRank_ws_${ws.id}`);
        if (!raw) throw new Error("Data Arena tidak ditemukan");
        const wsFixed = repairWorkspace(ws);
        const backup = {
          app: "CourtRank",
          version: 1,
          exportedAt: new Date().toISOString(),
          arena: wsFixed,
          data: JSON.parse(raw),
        };
        const safeName = (wsFixed.name || "Arena").replace(/[^a-z0-9]+/gi, "-").replace(/^-|-$/g, "") || "Arena";
        const filename = `CourtRank-Backup-${safeName}-${new Date().toISOString().slice(0, 10)}.json`;
        const blob = new Blob([JSON.stringify(backup, null, 2)], { type: "application/json" });
        const file = typeof File !== "undefined" ? new File([blob], filename, { type: "application/json" }) : null;
        return { backup, blob, file, filename, wsFixed };
      };

      const downloadBackupBlob = (blob, filename) => {
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        setTimeout(() => {
          document.body.removeChild(a);
          URL.revokeObjectURL(url);
        }, 1000);
      };

      const handleDownloadWorkspaceBackup = (ws) => {
        try {
          const { blob, filename } = buildWorkspaceBackupPayload(ws);
          downloadBackupBlob(blob, filename);
          showNotify("Backup Arena berhasil dibuat!", "success");
        } catch (e) {
          console.error(e);
          showNotify(e.message || "Gagal membuat file backup", "error");
        }
      };

      const handleShareWorkspaceBackup = async (ws) => {
        showNotify("Menyiapkan Backup JSON...", "success");
        try {
          const { blob, file, filename, wsFixed } = buildWorkspaceBackupPayload(ws);
          const title = `Backup CourtRank ${wsFixed.name}`;
          const text = `File backup Arena ${wsFixed.name}.\n\nCara load backup:\n1. Buka CourtRank di HP penerima.\n2. Di kartu Arena, tekan Load.\n3. Pilih file JSON ini.\n4. Data Arena akan masuk lengkap.`;
          const canShareFile = !!(file && navigator.share && navigator.canShare && navigator.canShare({ files: [file] }));

          if (canShareFile) {
            showNotify("Pilih WhatsApp untuk kirim file JSON.", "success");
            await navigator.share({ title, text, files: [file] });
            showNotify("Backup JSON siap dikirim via WA.", "success");
            return;
          }

          downloadBackupBlob(blob, filename);
          const waText = `${text}\n\nCatatan: browser ini belum bisa melampirkan file JSON otomatis. Lampirkan file ${filename} dari folder Download.`;
          const waUrl = `https://wa.me/?text=${encodeURIComponent(waText)}`;
          setConfirmDialog({
            title: "Backup JSON Diunduh",
            message: `Browser ini belum bisa attach file JSON otomatis ke WhatsApp. File ${filename} sudah diunduh. Tekan Buka WA, lalu lampirkan file JSON dari folder Download secara manual.`,
            isDanger: false,
            confirmText: "Buka WA",
            cancelText: "Tutup",
            onConfirm: () => {
              setConfirmDialog(null);
              window.open(waUrl, "_blank");
            }
          });
          showNotify("Backup JSON diunduh. Lampirkan manual ke WA.", "success");
        } catch (e) {
          if (e?.name === "AbortError") return;
          console.error(e);
          const errMsg = e.message || "Gagal membuat Backup JSON";
          showNotify(errMsg, "error");
          window.alert(errMsg);
        }
      };      const handleRestoreWorkspaceBackup = (ws) => {
        if (ws?.readOnly) return showNotify("Arena lihat saja tidak bisa di-load backup.", "error");
        const input = document.createElement("input");
        input.type = "file";
        input.accept = ".json,application/json";
        input.onchange = () => {
          const file = input.files?.[0];
          if (!file) return;
          const reader = new FileReader();
          reader.onload = () => {
            try {
              const parsed = JSON.parse(reader.result);
              const data = parsed.data || parsed;
              if (!data.players || !data.matches || !data.sessions) throw new Error("Format backup tidak valid");
              setConfirmDialog({
                title: "Load Data",
                message: `Load file backup ke ${ws.name}? Data Arena saat ini akan diganti oleh isi backup.`,
                isDanger: true,
                onConfirm: () => {
                  const cleaned = {
                    players: (data.players || []).map(p => ({ ...p, name: repairStoredText(p.name) || p.name })),
                    matches: data.matches || [],
                    checkedIn: data.checkedIn || [],
                    checkedInBySession: buildCheckedInBySession(data),
                    numCourts: data.numCourts || 3,
                    sessions: data.sessions || [{ id: "s1", label: "Sesi 1", date: "", createdAt: Date.now() }],
                    currentSessionId: data.currentSessionId || data.sessions?.[0]?.id || "s1",
                    githubGistId: "",
                    readOnly: false,
                  };
                  localStorage.setItem(`courtRank_ws_${ws.id}`, JSON.stringify(cleaned));
                  const updated = workspaces.map(w => w.id === ws.id ? { ...w, updatedAt: Date.now() } : w);
                  setWorkspaces(updated);
                  localStorage.setItem(WORKSPACES_KEY, JSON.stringify(updated));
                  if (workspaceId === ws.id) loadWorkspaceData(ws.id, JSON.stringify(cleaned));
                  showNotify("Data berhasil di-load!", "success");
                  setConfirmDialog(null);
                }
              });
            } catch (e) {
              console.error(e);
              showNotify("File data tidak bisa dibaca", "error");
            }
          };
          reader.readAsText(file);
        };
        input.click();
      };

      const handleDeleteSession = (sessionId) => {
        if (readOnly) return showNotify("Mode lihat saja: data tidak bisa diedit.", "error");
        if (sessions.length <= 1) {
          showNotify("Minimal harus ada 1 sesi.", "error");
          return;
        }
        const sess = sessions.find(s => s.id === sessionId);
        const firstSessionId = sessions[0]?.id || "s1";
        const sessIndex = sessions.findIndex(s => s.id === sessionId);
        const remainingSessions = sessions.filter(s => s.id !== sessionId);
        const fallbackSession = remainingSessions[Math.max(0, Math.min(sessIndex, remainingSessions.length - 1))] || remainingSessions[0];
        setConfirmDialog({
          title: "Hapus Sesi",
          message: `Yakin ingin menghapus ${sess?.label || "sesi ini"}? Semua match dan daftar hadir di sesi ini ikut dihapus.`,
          isDanger: true,
          onConfirm: () => {
            setMatches(prev => prev.filter(m => {
              const belongsToSession = m.sessionId === sessionId || (!m.sessionId && sessionId === firstSessionId);
              return !belongsToSession;
            }));
            setSessions(remainingSessions);
            setCheckedInBySession(prev => {
              const next = { ...prev };
              delete next[sessionId];
              return next;
            });
            if (currentSessionId === sessionId) setCurrentSessionId(fallbackSession?.id || remainingSessions[0]?.id || "s1");
            showNotify(`${sess?.label || "Sesi"} berhasil dihapus.`, "success");
            setConfirmDialog(null);
          }
        });
      };

      const handleShareWorkspace = (ws) => {
        if (!window.LZString) { showNotify("Sedang menyiapkan data...", "error"); return; }
        const raw = localStorage.getItem(`courtRank_ws_${ws.id}`);
        if (!raw) { showNotify("Data Arena tidak ditemukan", "error"); return; }
        try {
          const data = JSON.parse(raw);
          const safePlayers = (data.players || []).map(p => ({ ...p, name: repairStoredText(p.name) || p.name }));
          const safeMatches = data.matches || [];
          const safeSessions = data.sessions || [{ id: "s1", label: "Sesi 1", date: "", createdAt: Date.now() }];
          const wsFixed = repairWorkspace(ws);
          const minified = {
            p: safePlayers.map(p => [p.id, p.name, p.tier]),
            m: safeMatches.map(m => [m.id, m.courtId, m.status === 'ongoing' ? 0 : 1, m.team1, m.team2, (m.games || []).map(g => [g.t1, g.t2]), m.tierSnapshot || {}, m.sessionId || "s1"]),
            c: data.checkedIn || [], cbs: data.checkedInBySession || buildCheckedInBySession(data),
            n: data.numCourts || 3,
            sessions: safeSessions,
            currentSessionId: data.currentSessionId || safeSessions[0]?.id || "s1",
            wsName: wsFixed.name,
            wsEmoji: wsFixed.emoji,
            viewOnly: false,
          };
          const compressed = window.LZString.compressToEncodedURIComponent(JSON.stringify(minified));
          const baseUrl = window.location.href.split('?')[0].split('#')[0];
          const link = `${baseUrl}?d=${encodeURIComponent(compressed)}`;
          const doneMatches = safeMatches.filter(m => m.status === "done").length;
          const title = `Bagikan ${wsFixed.name}`;
          const msg = `🎾 *BAGIKAN ARENA COURTRANK — ${wsFixed.name.toUpperCase()}*\n\nData Arena lengkap:\n👥 ${safePlayers.length} pemain\n📅 ${safeSessions.length} sesi\n✅ ${doneMatches} match selesai\n\nBuka link ini untuk melihat data lengkap atau lanjut input sebagai operator.`;
          if (navigator.share) {
            showNotify("Pilih aplikasi untuk membagikan link Arena.", "success");
            navigator.share({ title, text: msg, url: link }).then(() => showNotify("Link Bagikan siap dikirim!", "success")).catch(err => {
              if (err.name !== "AbortError") {
                fallbackCopy(`${msg}\nLink: ${link}`);
                showNotify("Link Bagikan disalin.", "success");
              }
            });
          } else if (navigator.clipboard && window.isSecureContext) {
            navigator.clipboard.writeText(`${msg}\nLink: ${link}`).then(() => showNotify("Link Bagikan disalin!", "success")).catch(() => fallbackCopy(`${msg}\nLink: ${link}`));
          } else {
            fallbackCopy(`${msg}\nLink: ${link}`);
            showNotify("Link Bagikan disalin!", "success");
          }
        } catch (e) {
          console.error(e);
          showNotify("Gagal membuat link Bagikan", "error");
        }
      };

      if (screen === "workspace") {
        return <WorkspaceScreen
          workspaces={workspaces}
          onOpen={handleOpenWorkspace}
          onCreate={handleCreateWorkspace}
          onRename={handleRenameWorkspace}
          onReset={handleResetWorkspace}
          onDelete={handleDeleteWorkspace}
          onShare={handleShareWorkspace}
          onBackup={handleDownloadWorkspaceBackup}
          onShareBackup={handleShareWorkspaceBackup}
          onRestore={handleRestoreWorkspaceBackup}
          confirmDialog={confirmDialog}
          setConfirmDialog={setConfirmDialog}
        />;
      }

      const statsPlayer = statsPlayerId ? players.find(p => p.id === statsPlayerId) : null;

      if (screen === "stats" && statsPlayer) {
        return <><PlayerStatsScreen
          player={statsPlayer}
          players={players}
          matches={matches}
          sessions={sessions}
          currentSessionId={currentSessionId}
          initialMode={statsFrom === "app" ? "session" : "alltime"}
          showModeSwitch={false}
          onBack={() => goBackInApp(() => setScreen(statsFrom))}
        />
        {editingPlayer && (
          <EditPlayerModal
            player={editingPlayer}
            currentSessionId={currentSessionId}
            currentSessionLabel={sessions.find(s=>s.id===currentSessionId)?.label||"Sesi ini"}
            onClose={() => setEditingPlayer(null)}
            onSave={(id, newName, newTier, changeType) => {
              if (readOnly) {
                showNotify("Mode lihat saja: data tidak bisa diedit.", "error");
                setEditingPlayer(null);
                return;
              }
              const player = players.find(p => p.id === id);
              const tierChanged = player && newTier !== player.tier;
              setPlayers(prev => prev.map(p => {
                if (p.id !== id) return p;
                const updated = { ...p, name: newName, tier: newTier };
                if (tierChanged) {
                  const histEntry = { from: p.tier, to: newTier, sessionId: currentSessionId, sessionLabel: sessions.find(s=>s.id===currentSessionId)?.label||"Sesi ini", date: new Date().toLocaleDateString('id-ID',{day:'numeric',month:'short',year:'numeric'}), type: changeType };
                  updated.tierHistory = [...(p.tierHistory||[]), histEntry];
                }
                return updated;
              }));
              if (tierChanged && changeType === "koreksi") {
                setMatches(prev => prev.map(m => {
                  const firstSessionId = sessions[0]?.id || "s1";
                  const isCurrentSessionMatch = m.sessionId === currentSessionId || (!m.sessionId && currentSessionId === firstSessionId);
                  if (!isCurrentSessionMatch) return m;
                  if (![...m.team1,...m.team2].includes(id)) return m;
                  return { ...m, tierSnapshot: { ...(m.tierSnapshot||{}), [id]: newTier } };
                }));
              }
              setEditingPlayer(null);
            }}
          />
        )}
        </>;
      }

      if (screen === "session") {
        const wsName = workspaces.find(w => w.id === workspaceId)?.name || "Arena";
        const wsEmoji = workspaces.find(w => w.id === workspaceId)?.emoji || "🏸";
        return <><SessionScreen
          sessions={sessions}
          matches={matches}
          players={players}
          checkedIn={checkedIn}
          checkedInBySession={checkedInBySession}
          currentSessionId={currentSessionId}
          wsName={wsName}
          wsEmoji={wsEmoji}
          onSelectSession={(sId) => { setCurrentSessionId(sId); setScreen("app"); }}
          onDeleteSession={handleDeleteSession}
          onNewSession={() => {
            if (readOnly) return showNotify("Mode lihat saja: data tidak bisa diedit.", "error");
            const sessionNum = sessions.length + 1;
            const newSession = {
              id: `s${Date.now()}`,
              label: `Sesi ${sessionNum}`,
              date: new Date().toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long' }),
              createdAt: Date.now(),
            };
            setSessions(prev => [...prev, newSession]);
            setCurrentSessionId(newSession.id);
            setCheckedInBySession(prev => ({ ...prev, [newSession.id]: [] }));
            setScreen("app");
            showNotify(`${newSession.label} dimulai!`, "success");
          }}
          onBack={() => goBackInApp(() => setScreen("workspace"))}
          onBackup={() => handleDownloadWorkspaceBackup(workspaces.find(w => w.id === workspaceId))}
          onRestore={() => handleRestoreWorkspaceBackup(workspaces.find(w => w.id === workspaceId))}
          onViewStats={(p) => { setStatsPlayerId(p.id); setStatsFrom("session"); setScreen("stats"); }}
          onEditPlayer={(p) => { setEditingPlayer(p); }}
          onAddPlayer={handleAddPlayer}
          onDeletePlayer={handleDeletePlayer}
          newPlayerName={newPlayerName}
          setNewPlayerName={setNewPlayerName}
          newPlayerTier={newPlayerTier}
          setNewPlayerTier={setNewPlayerTier}
        />
        {editingPlayer && (
          <EditPlayerModal
            player={editingPlayer}
            currentSessionId={currentSessionId}
            currentSessionLabel={sessions.find(s=>s.id===currentSessionId)?.label||"Sesi ini"}
            onClose={() => setEditingPlayer(null)}
            onSave={(id, newName, newTier, changeType) => {
              const player = players.find(p => p.id === id);
              const tierChanged = player && newTier !== player.tier;
              setPlayers(prev => prev.map(p => {
                if (p.id !== id) return p;
                const updated = { ...p, name: newName, tier: newTier };
                if (tierChanged) {
                  const histEntry = {
                    from: p.tier, to: newTier,
                    sessionId: currentSessionId,
                    sessionLabel: sessions.find(s=>s.id===currentSessionId)?.label||"Sesi ini",
                    date: new Date().toLocaleDateString('id-ID',{day:'numeric',month:'short',year:'numeric'}),
                    type: changeType,
                  };
                  updated.tierHistory = [...(p.tierHistory||[]), histEntry];
                }
                return updated;
              }));
              if (tierChanged && changeType === "koreksi") {
                setMatches(prev => prev.map(m => {
                  const firstSessionId = sessions[0]?.id || "s1";
                  const isCurrentSessionMatch = m.sessionId === currentSessionId || (!m.sessionId && currentSessionId === firstSessionId);
                  if (!isCurrentSessionMatch) return m;
                  if (![...m.team1, ...m.team2].includes(id)) return m;
                  return { ...m, tierSnapshot: { ...(m.tierSnapshot||{}), [id]: newTier } };
                }));
              }
              setEditingPlayer(null);
            }}
          />
        )}
        {confirmDialog && (
          <div style={{ position: "fixed", inset: 0, background: "#000000cc", zIndex: 1500, display: "flex", alignItems: "flex-end", justifyContent: "center", padding: "20px 16px calc(20px + var(--cr-safe-bottom))" }} onClick={() => setConfirmDialog(null)}>
            <div style={{ background: "var(--cr-surface)", borderRadius: "24px 24px 18px 18px", padding: 20, width: "100%", maxWidth: 390, border: "2px solid var(--cr-line)", textAlign: "center", boxShadow: "var(--cr-shadow-hard)" }} onClick={e => e.stopPropagation()}>
              <div style={{ fontSize: 16, fontWeight: 700, marginBottom: 12, color: confirmDialog.isDanger ? "#E4574F" : "#16232E" }}>{confirmDialog.title}</div>
              <div style={{ fontSize: 13, color: "#44515E", marginBottom: 24, lineHeight: 1.5 }}>{confirmDialog.message}</div>
              <div style={{ display: "flex", gap: 10 }}>
                <button onClick={() => setConfirmDialog(null)} style={{ flex: 1, padding: "12px", borderRadius: 14, background: "#16232E10", border: "1px solid #16232E12", color: "var(--cr-ink)", fontWeight: 700, cursor: "pointer" }}>Batal</button>
                <button onClick={confirmDialog.onConfirm} style={{ flex: 1, padding: "12px", borderRadius: 14, background: confirmDialog.isDanger ? "var(--cr-danger-soft)" : "var(--cr-primary)", border: confirmDialog.isDanger ? "2px solid #E4574F45" : "2px solid var(--cr-primary)", color: confirmDialog.isDanger ? "var(--cr-primary-strong)" : "#FFFFFF", fontWeight: 800, cursor: "pointer" }}>{confirmDialog.isDanger ? "Hapus" : "OK"}</button>
              </div>
            </div>
          </div>
        )}
        </>;
      }

      if (!isLoaded) {
        return (
          <div style={{ minHeight: "100dvh", display: "flex", alignItems: "center", justifyContent: "center", background: "var(--cr-bg)", color: "var(--cr-primary)", padding: "24px 20px calc(24px + var(--cr-safe-bottom))" }}>
            <div style={{ width: "100%", maxWidth: 360, display: "flex", flexDirection: "column", gap: 14 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 4 }}>
                <div style={{ width: 48, height: 48, borderRadius: 16, background: "var(--cr-primary)", color: "#fff", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 24, animation: "bounce 1s infinite" }}>🎾</div>
                <div>
                  <div style={{ fontFamily: "'Space Grotesk', sans-serif", fontSize: 26, fontWeight: 800, color: "var(--cr-primary-strong)", fontStyle: "italic", letterSpacing: "0.01em" }}>COURTRANK</div>
                  <div style={{ fontSize: 13, fontWeight: 650, color: "var(--cr-muted)" }}>Menyiapkan data arena...</div>
                </div>
              </div>
              <div className="cr-skeleton" style={{ height: 82, borderRadius: 20, border: "2px solid rgba(22, 35, 46,0.18)" }} />
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
                <div className="cr-skeleton" style={{ height: 64, borderRadius: 16 }} />
                <div className="cr-skeleton" style={{ height: 64, borderRadius: 16 }} />
              </div>
            </div>
          </div>
        );
      }

      return (
        <div style={{
          minHeight: "100dvh", background: "var(--cr-bg)",
          color: "var(--cr-ink)", maxWidth: 430, margin: "0 auto",
          position: "relative", overflowX: "hidden",
        }}>
          {/* Header */}
          <div style={{
            background: "rgba(250,247,242,0.96)", backdropFilter: "blur(12px)",
            borderBottom: "2px solid var(--cr-line)", padding: "calc(12px + var(--cr-safe-top)) 16px 0",
            position: "sticky", top: 0, zIndex: 100,
          }}>
            <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 12 }}>
              <button aria-label="Kembali" onClick={() => goBackInApp(() => setScreen("session"))} style={{ width: 44, height: 44, background: "#16232E10", border: "1px solid #16232E12", borderRadius: 16, padding: 0, color: "#44515E", fontSize: 18, cursor: "pointer", flex: "0 0 auto" }}>←</button>
              <div style={{
                width: 40, height: 40, borderRadius: 14,
                background: "var(--cr-primary)", boxShadow: "0 8px 18px rgba(228, 87, 79,0.22)",
                display: "flex", alignItems: "center", justifyContent: "center",
                fontSize: 18,
              }}>🎾</div>
              <div style={{ flex: 1 }}>
                <div style={{ fontFamily: "'Space Grotesk', sans-serif", fontStyle: "normal", fontWeight: 700, fontSize: 20, color: "var(--cr-primary-strong)", textTransform: "uppercase", lineHeight: 1.1, letterSpacing: "0" }}>
                  {workspaces.find(w => w.id === workspaceId)?.emoji || "🎾"} {workspaces.find(w => w.id === workspaceId)?.name || "CourtRank"}
                </div>
                <div style={{ fontSize: 12, color: "var(--cr-muted)", marginTop: 2, fontWeight: 500 }}>
                  {checkedIn.size} hadir · {ongoingMatches.length} match berlangsung
                </div>
              </div>
              <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
                {gistStatus === "saving" && <span style={{ fontSize: 10, color: "#9A6A00" }}>💾 Menyimpan...</span>}
                {gistStatus === "saved" && <span style={{ fontSize: 10, color: "#16232E" }}>✅ Tersimpan</span>}
                {gistStatus === "error" && <span style={{ fontSize: 10, color: "#E4574F" }}>❌ Gagal</span>}
              </div>
            </div>
            <div style={{ display: "flex", gap: 0, borderTop: "2px solid var(--cr-line)" }}>
              {[
                { key: "courts", icon: "🏸", text: "Match" },
                { key: "standings", icon: "📋", text: "Klasemen" },
                { key: "stats", icon: "📊", text: "Statistik" },
                { key: "settings", icon: "⚙️", text: "Atur" },
              ].map(t => (
                <button key={t.key} onClick={() => setTab(t.key)} style={{
                  flex: 1, minWidth: 0, height: 48, background: "none", border: "none", cursor: "pointer",
                  padding: "0 2px", fontSize: 12, fontWeight: tab === t.key ? 800 : 600,
                  color: tab === t.key ? "#E4574F" : "#617181",
                  borderBottom: tab === t.key ? "3px solid #E4574F" : "3px solid transparent",
                  transition: "color 0.15s, border-color 0.15s",
                }}>
                  <span style={{ display: "inline-flex", alignItems: "center", justifyContent: "center", gap: 4, width: "100%", whiteSpace: "nowrap", lineHeight: 1 }}>
                    <span style={{ flex: "0 0 auto", fontSize: 12 }}>{t.icon}</span>
                    <span style={{ minWidth: 0, overflow: "hidden", textOverflow: "ellipsis" }}>{t.text}</span>
                  </span>
                </button>
              ))}
            </div>
          </div>

          <div style={{ padding: "16px 16px calc(112px + var(--cr-safe-bottom))" }}>

            {/* === COURTS / MATCH TAB === */}
            {tab === "courts" && (
              <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
                {readOnly ? (
                  <div style={{ background: "#16232E12", border: "2px solid #16232E", borderRadius: 16, padding: "12px 14px", color: "#16232E", fontSize: 12, fontWeight: 750, textAlign: "center" }}>Mode lihat saja · input dan edit data dinonaktifkan</div>
                ) : (
                  <div style={{ display: "grid", gridTemplateColumns: "1.15fr 0.85fr", gap: 10 }}>
                    <button onClick={handleSmartMatch} style={{
                      minHeight: 52, padding: "14px 12px", background: "var(--cr-primary)",
                      border: "2px solid var(--cr-primary)", borderRadius: 18, color: "#fff", fontWeight: 850, cursor: "pointer", fontSize: 14, boxShadow: "0 12px 24px rgba(228, 87, 79,0.20)",
                    }}>⚡ Smart Match</button>
                    <button onClick={() => {
                      setManualCourt(courts.find(c => !occupiedCourts.has(c)) || 1);
                      setManualModal(true);
                    }} style={{
                      minHeight: 52, padding: "14px 12px", background: "var(--cr-surface)", border: "2px solid var(--cr-line)",
                      borderRadius: 18, color: "var(--cr-ink)", fontWeight: 750, cursor: "pointer", fontSize: 14,
                    }}>🎯 Manual</button>
                  </div>
                )}

                <div style={{ fontSize: 12, color: "#617181", fontWeight: 700, letterSpacing: "0.06em", textTransform: "uppercase" }}>
                  Lapangan Aktif
                </div>

                {courts.map(courtId => {
                  const activeMatch = ongoingMatches.find(m => m.courtId === courtId);
                  return (
                    <div key={courtId} style={{
                      background: "#FFFFFF", border: `2px solid ${activeMatch ? "#E4574F" : "#16232E"}`,
                      borderRadius: 22, padding: 16, boxShadow: "3px 3px 0 #16232E",
                    }}>
                      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: activeMatch ? 10 : 0 }}>
                        <div style={{ fontSize: 14, fontWeight: 800, color: "#16232E" }}>Lapangan {courtId}</div>
                        <div style={{
                          fontSize: 11, color: activeMatch ? "#16232E" : "#617181",
                          background: activeMatch ? "#16232E18" : "#16232E08",
                          border: `1px solid ${activeMatch ? "#16232E35" : "#16232E10"}`,
                          borderRadius: 16, padding: "3px 9px", fontWeight: 700,
                        }}>{activeMatch ? "Berlangsung" : "Kosong"}</div>
                      </div>

                      {activeMatch ? (
                        <MatchCard
                          match={activeMatch}
                          players={players}
                          onScore={readOnly ? null : handleUpdateOngoingScore}
                        />
                      ) : (
                        <div style={{ fontSize: 12, color: "#617181", lineHeight: 1.5 }}>
                          Belum ada match di lapangan ini.
                        </div>
                      )}
                    </div>
                  );
                })}

                <div style={{ marginTop: 4 }}>
                  <div style={{ fontSize: 12, color: "#617181", fontWeight: 700, letterSpacing: "0.06em", textTransform: "uppercase", marginBottom: 10 }}>
                    Match Selesai Sesi Ini
                  </div>
                  {currentSessionMatches.filter(m => m.status === "done").length === 0 && (
                    <div style={{
                      textAlign: "center", padding: "24px 16px", background: "#FFFFFF",
                      borderRadius: 22, border: "2px solid #16232E", color: "#617181", fontSize: 13, boxShadow: "3px 3px 0 #16232E",
                    }}>
                      Belum ada match selesai di sesi ini.
                    </div>
                  )}
                  {currentSessionMatches.filter(m => m.status === "done").slice().reverse().map(match => (
                    <DoneMatchCard
                      key={match.id}
                      match={match}
                      players={players}
                      onEdit={readOnly ? null : () => setScoreModal(match)}
                    />
                  ))}
                </div>
              </div>
            )}

            {/* === STANDINGS TAB === */}
            {tab === "standings" && (
              <div>
                {/* KLASEMEN HARIAN */}
                <div id="standings-board" style={{ width: "100%", maxWidth: "100%", padding: "12px 0", background: "#FAF7F2", borderRadius: 14, marginBottom: "16px", overflow: "hidden" }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 20 }}>
                    <div>
                      <div style={{ fontFamily: "'Space Grotesk', sans-serif", fontSize: 28, fontWeight: 700, color: "#16232E", textTransform: "uppercase", letterSpacing: "-0.02em" }}>KLASEMEN HARIAN</div>
                      <div style={{ fontSize: 12, color: "#44515E", marginTop: 4 }}>
                        {new Date().toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' })}
                      </div>
                      <div style={{ fontSize: 11, color: "#E4574F", marginTop: 4, fontWeight: 600 }}>
                        {sessions.find(s => s.id === currentSessionId)?.label} · {sessions.find(s => s.id === currentSessionId)?.date}
                      </div>
                    </div>

                  </div>

                  {standingsHarian.length === 0 && (
                    <div style={{ textAlign: "center", padding: "24px 16px", background: "#FFFFFF", borderRadius: 12, border: "2px solid #16232E", marginBottom: 16 }}>
                      <div style={{ fontSize: 24, marginBottom: 8 }}>🏸</div>
                      <div style={{ fontSize: 14, fontWeight: 600, color: "#617181" }}>Belum ada match hari ini</div>
                      <div style={{ fontSize: 12, color: "#778899", marginTop: 4 }}>Mulai Smart Match atau Manual untuk mulai sesi ini</div>
                    </div>
                  )}

                  {standingsHarian.length > 0 && (
                    <div>
                      {/* WOW / SOS / MBG / AFK */}
                      {standingsHarian.length >= 2 && (() => {
                        const wow = standingsHarian[0];
                        const sos = standingsHarian[standingsHarian.length - 1];
                        return (
                          <div style={{ marginBottom: 16, display: "flex", flexDirection: "column", gap: 6 }}>
                            <div style={{ background: "linear-gradient(135deg, #9A6A0015, #F0B42915)", border: "1px solid #9A6A0030", borderRadius: 16, padding: "8px 12px" }}>
                              <strong style={{ color: "#9A6A00", fontSize: "14px", display: "block", marginBottom: "2px" }}>🏆 WOW HARI INI: {wow.name}</strong>
                              <span style={{ fontSize: "11px", color: "#44515E" }}>(Winner Over Winners) · {wow.P} pts · {wow.W}W {wow.L}L · Diff {wow.diff >= 0 ? "+" : ""}{wow.diff}</span>
                            </div>
                            <div style={{ display: "flex", gap: 6 }}>
                              <div style={{ flex: 1, background: "#E4574F15", border: "1px solid #E4574F30", borderRadius: 16, padding: "8px 12px" }}>
                                <strong style={{ color: "#E4574F", fontSize: "13px", display: "block", marginBottom: "2px" }}>🤡 SOS HARI INI: {sos.name}</strong>
                                <span style={{ fontSize: "11px", color: "#44515E" }}>(Score Optimization Needed) · {sos.P} pts</span>
                              </div>
                              {mbgPlayer && (
                                <div style={{ flex: 1, background: "var(--cr-accent-blue-soft)", border: "1px solid var(--cr-accent-blue-line)", borderRadius: 16, padding: "8px 12px" }}>
                                  <strong style={{ color: "var(--cr-accent-blue)", fontSize: "13px", display: "block", marginBottom: "2px" }}>📈 MBG HARI INI: {mbgPlayer.name}</strong>
                                  <span style={{ fontSize: "11px", color: "#44515E" }}>(Making Big Gains) · +{mbgPlayer.totalR}R</span>
                                </div>
                              )}
                            </div>
                            {afkPlayer && (
                              <div style={{ background: "#44515E15", border: "1px solid #44515E30", borderRadius: 16, padding: "8px 12px" }}>
                                <strong style={{ color: "#44515E", fontSize: "13px", display: "block", marginBottom: "2px" }}>😴 AFK HARI INI: {afkPlayer.name}</strong>
                                <span style={{ fontSize: "11px", color: "#617181" }}>(Attendance Frequency Kurang) · {afkPlayer.matchesPlayed} match · {afkPlayer.M} pts kompensasi</span>
                              </div>
                            )}
                          </div>
                        );
                      })()}

                      {/* TABLE */}
                      <div style={{ width: "100%", maxWidth: "100%", overflowX: "auto", overflowY: "hidden" }}>
                        <table style={{ width: "100%", minWidth: 398, borderCollapse: "collapse", fontSize: 12, tableLayout: "auto" }}>
                          <thead>
                            <tr style={{ borderBottom: "1px solid #16232E14" }}>
                              {["#", "Pemain", "Tier", "P", "M", "W-D-L", "TS", "Diff", "+M", "R"].map((h, i) => (
                                <th key={i} style={{ padding: "6px 6px", color: "#617181", fontWeight: 600, textAlign: i === 1 ? "left" : "center", whiteSpace: "nowrap" }}>{h}</th>
                              ))}
                            </tr>
                          </thead>
                          <tbody>
                            {standingsHarian.map((p, idx) => {
                              const medal = ["🥇","🥈","🥉"][idx] || "";
                              const isTop = idx === 0;
                              const isBot = idx === standingsHarian.length - 1;
                              return (
                                <tr key={p.id} style={{ borderBottom: "1px solid #16232E06", background: isTop ? "#9A6A0008" : isBot ? "#E4574F08" : "none" }}>
                                  <td style={{ padding: "10px 6px", textAlign: "center" }}>{medal || <span style={{ color: "#617181", fontSize: 11 }}>{idx + 1}</span>}</td>
                                  <td style={{ padding: "10px 8px", fontSize: 13, fontWeight: 500, whiteSpace: "nowrap", cursor: "pointer" }}
                                    onClick={() => { setStatsPlayerId(p.id); setStatsFrom("app"); setScreen("stats"); }}>
                                    <span style={{ borderBottom: "1px dashed #E4574F60", paddingBottom: 1 }}>{p.name}</span> <span style={{ fontSize: 10, color: "#E4574F80" }}>📊</span>
                                  </td>
                                  <td style={{ padding: "10px 6px", textAlign: "center" }}><TierBadge tier={p.tier} small /></td>
                                  <td style={{ padding: "10px 6px", textAlign: "center", fontWeight: 900, color: "#E4574F", fontFamily: "'DM Mono', monospace", fontSize: 13 }}>{p.P}</td>
                                  <td style={{ padding: "10px 6px", textAlign: "center", color: "#44515E" }}>{p.matchesPlayed}</td>
                                  <td style={{ padding: "10px 6px", textAlign: "center", fontFamily: "'DM Mono', monospace", fontWeight: 400 }}><span style={{ color: "#16232E" }}>{p.W}</span><span style={{ color: "#617181" }}>-</span><span style={{ color: "#9A6A00" }}>{p.D}</span><span style={{ color: "#617181" }}>-</span><span style={{ color: "#E4574F" }}>{p.L}</span></td>
                                  <td style={{ padding: "10px 6px", textAlign: "center", fontWeight: 400, color: "#44515E", fontFamily: "'DM Mono', monospace" }}>{p.totalFor}</td>
                                  <td style={{ padding: "10px 6px", textAlign: "center", fontWeight: 400, color: p.diff >= 0 ? "#16232E" : "#E4574F", fontFamily: "'DM Mono', monospace" }}>{p.diff >= 0 ? "+" : ""}{p.diff}</td>
                                  <td style={{ padding: "10px 6px", textAlign: "center", fontWeight: 400, color: "#9A6A00", fontFamily: "'DM Mono', monospace" }}>{p.M > 0 ? `+${p.M}` : "—"}</td>
                                  <td style={{ padding: "10px 6px", textAlign: "center", fontWeight: 400, color: "#16232E", fontFamily: "'DM Mono', monospace" }}>{p.totalR > 0 ? `+${p.totalR}` : "—"}</td>
                                </tr>
                              );
                            })}
                          </tbody>
                        </table>
                      </div>
                      <StandingsLegend showMPlus />
                    </div>
                  )}
                </div>

                {/* Share */}
                {standingsHarian.length > 0 && (
                  <div style={{ display: "flex", gap: 8, marginTop: 8, paddingBottom: 16 }}>
                    <button onClick={handleDownloadImage} disabled={isProcessing !== null} style={{
                      flex: 1, background: "#FFFFFF", border: "2px solid #16232E", borderRadius: 18, padding: "13px 10px",
                      cursor: isProcessing !== null ? "default" : "pointer", color: "#44515E", fontWeight: 800, fontSize: 13,
                    }}>{isProcessing === "download" ? "⏳" : "💾"} Simpan Gambar</button>
                    <button onClick={handleShareWA} disabled={isProcessing !== null} style={{
                      flex: 1, background: isProcessing === "share" ? "#778899" : "linear-gradient(135deg, #16232E, #2D4F80)",
                      border: "none", borderRadius: 12, padding: "13px 10px", cursor: isProcessing !== null ? "default" : "pointer",
                      color: "#fff", fontWeight: 700, fontSize: 13,
                    }}>{isProcessing === "share" ? "⏳" : "💬"} Kirim WA</button>
                  </div>
                )}
              </div>
            )}

            {/* === STATISTIK SESI TAB === */}
            {tab === "stats" && (() => {
              const sessionPlayers = players.filter(p => checkedIn.has(p.id));
              const sessionDone = currentSessionMatches.filter(m => m.status === "done");
              return (
                <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
                  <div style={{ background: "#FFFFFF", border: "2px solid #16232E", borderRadius: 18, padding: "14px 16px", boxShadow: "3px 3px 0 #16232E" }}>
                    <div style={{ fontFamily: "'Space Grotesk', sans-serif", fontSize: 26, fontWeight: 700, color: "#16232E", textTransform: "uppercase" }}>Statistik Arena</div>
                    <div style={{ fontSize: 12, color: "#44515E", marginTop: 4 }}>All Time · {sessions.length} sesi · {matches.filter(m => m.status === "done").length} match selesai</div>
                  </div>
                    <div style={{ fontSize: 12, color: "#617181", fontWeight: 700, letterSpacing: "0.06em", textTransform: "uppercase" }}>Pemain Hadir Sesi Ini</div>
                  {sessionPlayers.length === 0 && (
                    <div style={{ textAlign: "center", padding: "28px 16px", background: "#FFFFFF", borderRadius: 18, border: "2px solid #16232E", color: "#617181", fontSize: 13 }}>Belum ada pemain check-in di sesi ini.</div>
                  )}
                  {sessionPlayers.map(p => {
                    const myMatches = sessionDone.filter(m => [...m.team1, ...m.team2].includes(p.id));
                    let wins = 0, draws = 0, losses = 0, totalFor = 0, totalAgainst = 0, totalPts = 0;
                    myMatches.forEach(m => {
                      const onT1 = m.team1.includes(p.id);
                      const res = calcMatchResult(m, players);
                      const won = onT1 ? res.t1Win : res.t2Win;
                      const lost = onT1 ? res.t2Win : res.t1Win;
                      if (won) wins++; else if (lost) losses++; else draws++;
                      const myScore = onT1 ? res.t1Score : res.t2Score;
                      const oppScore = onT1 ? res.t2Score : res.t1Score;
                      totalFor += myScore;
                      totalAgainst += oppScore;
                      totalPts += myScore + (onT1 ? res.t1S : res.t2S) + (onT1 ? res.t1R : res.t2R);
                    });
                    const winRate = myMatches.length > 0 ? Math.round((wins / myMatches.length) * 100) : 0;
                    const diff = totalFor - totalAgainst;
                    return (
                      <div key={p.id} onClick={() => { setStatsPlayerId(p.id); setStatsFrom("app"); setScreen("stats"); }} style={{ display: "flex", alignItems: "center", gap: 12, padding: "12px 14px", background: "#FFFFFF", border: "2px solid #16232E", borderRadius: 16, boxShadow: "3px 3px 0 #16232E", cursor: "pointer" }}>
                        <div style={{ width: 38, height: 38, borderRadius: 12, background: "#E4574F20", border: "2px solid #E4574F", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 13, fontWeight: 900, color: "#E4574F" }}>{p.name.slice(0,2).toUpperCase()}</div>
                        <div style={{ flex: 1, minWidth: 0 }}>
                          <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                            <div style={{ fontSize: 13, fontWeight: 800, color: "#16232E", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{p.name}</div>
                            <TierBadge tier={p.tier} small />
                          </div>
                          <div style={{ fontSize: 11, color: "#617181", marginTop: 2 }}>{myMatches.length} match · {wins}W {draws}D {losses}L · Diff {diff >= 0 ? "+" : ""}{diff}</div>
                        </div>
                        <div style={{ textAlign: "right", minWidth: 54 }}>
                          <div style={{ fontSize: 15, fontWeight: 900, color: "#E4574F", fontFamily: "'DM Mono', monospace" }}>{totalPts}</div>
                          <div style={{ fontSize: 9, color: "#778899" }}>pts</div>
                        </div>
                        <div style={{ textAlign: "right", minWidth: 42 }}>
                          <div style={{ fontSize: 13, fontWeight: 800, color: winRate >= 50 ? "#16232E" : "#E4574F", fontFamily: "'DM Mono', monospace" }}>{winRate}%</div>
                          <div style={{ fontSize: 9, color: "#778899" }}>win</div>
                        </div>
                      </div>
                    );
                  })}
                </div>
              );
            })()}

            {/* === SETTINGS TAB === */}
            {!readOnly && tab === "settings" && (
              <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>

                {/* Info Sesi Aktif */}
                <div style={{ background: "#FFFFFF", border: "1px solid #16232E30", borderRadius: 14, padding: "9px 12px", display: "flex", alignItems: "center", justifyContent: "space-between", gap: 10 }}>
                  <div style={{ minWidth: 0 }}>
                    <div style={{ fontSize: 10, fontWeight: 800, color: "#617181", letterSpacing: "0.08em", textTransform: "uppercase", marginBottom: 2 }}>Sesi Aktif</div>
                    <div style={{ fontSize: 12, color: "#16232E", fontWeight: 700, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>
                      {sessions.find(s => s.id === currentSessionId)?.label} · {sessions.find(s => s.id === currentSessionId)?.date}
                    </div>
                  </div>
                  <div style={{ flex: "0 0 auto", fontSize: 11, color: "#16232E", fontWeight: 800, background: "#16232E12", border: "1px solid #16232E30", borderRadius: 999, padding: "4px 8px" }}>
                    {sessions.findIndex(s => s.id === currentSessionId) + 1}/{sessions.length}
                  </div>
                </div>

                {/* Jumlah Lapangan */}
                <div style={{ background: "#FFFFFF", borderRadius: 22, padding: 16, border: "2px solid #16232E", boxShadow: "3px 3px 0 #16232E" }}>
                  <div style={{ fontSize: 12, fontWeight: 700, color: "#617181", letterSpacing: "0.06em", textTransform: "uppercase", marginBottom: 12 }}>🏟 Lapangan</div>
                  <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                    <button onClick={handleReduceCourt} style={{ width: 36, height: 36, borderRadius: 9, background: "#16232E10", border: "1px solid #16232E20", color: "#16232E", fontSize: 20, cursor: "pointer", fontWeight: 700 }}>−</button>
                    <div style={{ flex: 1, textAlign: "center" }}>
                      <div style={{ fontSize: 28, fontWeight: 800, color: "#16232E", fontFamily: "'DM Mono', monospace" }}>{numCourts}</div>
                      <div style={{ fontSize: 11, color: "#617181" }}>lapangan aktif</div>
                    </div>
                    <button onClick={() => setNumCourts(n => n + 1)} style={{ width: 36, height: 36, borderRadius: 9, background: "#16232E10", border: "1px solid #16232E20", color: "#16232E", fontSize: 20, cursor: "pointer", fontWeight: 700 }}>+</button>
                  </div>
                </div>

                {/* Check-in cepat */}
                <div style={{ background: "#FFFFFF", borderRadius: 22, padding: 16, border: "2px solid #16232E", boxShadow: "3px 3px 0 #16232E" }}>
                  <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 12 }}>
                    <div style={{ fontSize: 12, fontWeight: 700, color: "#617181", letterSpacing: "0.06em", textTransform: "uppercase" }}>👥 Check-in</div>
                    <div style={{ display: "flex", gap: 6 }}>
                      <button onClick={() => setCheckedIn(new Set(players.map(p => p.id)))} style={{ background: "#E4574F20", border: "2px solid #E4574F", borderRadius: 7, padding: "4px 10px", color: "#E4574F", fontSize: 11, fontWeight: 700, cursor: "pointer" }}>Semua Hadir</button>
                      <button onClick={() => setCheckedIn(new Set())} style={{ background: "#16232E08", border: "1px solid #16232E15", borderRadius: 7, padding: "4px 10px", color: "#617181", fontSize: 11, cursor: "pointer" }}>Kosongkan</button>
                    </div>
                  </div>
                  <div style={{ fontSize: 12, color: "#617181", marginBottom: 10 }}>{checkedIn.size} dari {players.length} hadir</div>
                  <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
                    {players.map(p => {
                      const isIn = checkedIn.has(p.id);
                      const isPlaying = activePlayers.has(p.id);
                      return (
                        <div key={p.id} onClick={() => !isPlaying && toggleCheckIn(p.id)} style={{
                          display: "flex", alignItems: "center", gap: 6, padding: "6px 10px",
                          background: isIn ? "#E4574F20" : "#16232E08",
                          border: `1px solid ${isIn ? "#E4574F50" : "#16232E0a"}`,
                          borderRadius: 8, cursor: isPlaying ? "default" : "pointer",
                          opacity: isPlaying ? 0.6 : 1,
                        }}>
                          <span style={{ fontSize: 12, color: isIn ? "#16232E" : "#617181", fontWeight: isIn ? 600 : 400 }}>{p.name}</span>
                          {isIn && <span style={{ fontSize: 10, color: "#16232E" }}>✓</span>}
                          {isPlaying && <span style={{ fontSize: 9, color: "#16232E" }}>●</span>}
                        </div>
                      );
                    })}
                  </div>
                </div>

                {/* Reset Danger Zone */}
                <div style={{ marginTop: 8, paddingTop: 16, borderTop: "1px dashed #16232E15", display: "flex", flexDirection: "column", gap: 10 }}>
                  <div style={{ fontSize: 12, fontWeight: 700, color: "#617181", letterSpacing: "0.06em", textTransform: "uppercase" }}>Zona Reset</div>
                  <div style={{ background: "#F0B42910", border: "1px solid #F0B42935", borderRadius: 12, padding: 12 }}>
                    <button onClick={handleResetCurrentSession} style={{ width: "100%", background: "#F0B42920", border: "2px solid #F0B429", color: "#9A6A00", padding: "11px", borderRadius: 10, fontSize: 12, fontWeight: 700, cursor: "pointer" }}>
                      ↺ Reset Sesi Ini
                    </button>
                    <div style={{ fontSize: 11, color: "#44515E", lineHeight: 1.45, marginTop: 8 }}>
                      Menghapus match dan daftar hadir sesi aktif. Pemain, tier, dan sesi lain tetap aman.

          {/* H2H MODAL */}
          {h2hPlayer && (() => {

                  {/* Win rate per tier */}

                          const total = ts.w + ts.l;
                          const pct = total > 0 ? Math.round((ts.w / total) * 100) : 0;
                          const c = TIER_COLORS[tier];
                          return (
                            <div key={tier} style={{ display: "flex", alignItems: "center", gap: 8 }}>
