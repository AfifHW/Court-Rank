        showNotify(`Match dibuat di Lapangan ${freeCourt}!`);
      };

      const handleManualMatch = () => {
        if (manualSelected.length !== 2 && manualSelected.length !== 4) {
          showNotify("Pilih 2 pemain (Single) atau 4 pemain (Double)!", "error"); return;
        }
        if (occupiedCourts.has(manualCourt)) {
          showNotify(`Match ${manualCourt} sudah terpakai!`, "error"); return;
        }

        let t1, t2;
        if (manualSelected.length === 2) {
          t1 = [manualSelected[0]];
          t2 = [manualSelected[1]];
        } else {
          t1 = [manualSelected[0], manualSelected[1]];
          t2 = [manualSelected[2], manualSelected[3]];
        }

        const tierSnapshotM = {};
        players.forEach(p => { tierSnapshotM[p.id] = p.tier; });
        const newMatch = {
          id: `m${Date.now()}`, courtId: manualCourt, status: "ongoing",
          team1: t1, team2: t2,
          games: [{ t1: 0, t2: 0 }],
          sessionId: currentSessionId,
          tierSnapshot: tierSnapshotM,
        };
        setMatches(prev => [...prev, newMatch]);
        setManualModal(false);
        setManualSelected([]);
        const t1n = t1.map(id => players.find(p => p.id === id)?.name || "?");
        const t2n = t2.map(id => players.find(p => p.id === id)?.name || "?");
        setTurnBanner({ team1: t1n, team2: t2n, court: manualCourt });
        setTimeout(() => setTurnBanner(null), 5000);
        showNotify(`Match manual di Lapangan ${manualCourt} dimulai!`);
      };

      const handleSubmitScore = (matchId, games, newTeam1, newTeam2, finishMatch) => {
        const cleanGames = games.map(g => ({ t1: Number(g?.t1) || 0, t2: Number(g?.t2) || 0 }));
        const hasAnyScore = cleanGames.some(g => g.t1 > 0 || g.t2 > 0);
        if (finishMatch && !hasAnyScore) {
          showNotify("Isi skor dulu sebelum menyelesaikan match.", "error");
          return;
        }
        setMatches(prev => prev.map(m =>
          m.id === matchId ? {
            ...m,
            games: cleanGames,
            team1: newTeam1,
            team2: newTeam2,
            status: finishMatch ? "done" : m.status
          } : m
        ));
        setScoreModal(null);
        showNotify("Data pertandingan berhasil diperbarui!");
      };

      const handleDeleteMatch = (matchId) => {
        setConfirmDialog({
          title: "Hapus Match",
          message: "Yakin ingin menghapus pertandingan ini? Skor dan data terkait akan dihapus secara permanen.",
          isDanger: true,
          onConfirm: () => {
            setMatches(prev => prev.filter(m => m.id !== matchId));
            setScoreModal(null);
            showNotify("Pertandingan berhasil dihapus.");
            setConfirmDialog(null);
          }
        });
      };

      // ---- Workspace screen handlers ----
      const handleOpenWorkspace = (ws) => {
        setWorkspaceId(ws.id);
        loadWorkspaceData(ws.id);
        setScreen("session");
        setIsLoaded(true);
      };

      const handleCreateWorkspace = (name, emoji) => {
        const newId = `ws_${Date.now()}`;
        const newWs = { id: newId, name, emoji, updatedAt: Date.now() };
        const initData = {
          players: [], matches: [], checkedIn: [], checkedInBySession: { s1: [] }, numCourts: 3,
          sessions: [{ id: "s1", label: "Sesi 1", date: new Date().toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long' }), createdAt: Date.now() }],
          currentSessionId: "s1", githubGistId: "",
        };
        localStorage.setItem(`courtRank_ws_${newId}`, JSON.stringify(initData));
        const updated = [...workspaces, newWs];
        setWorkspaces(updated);
        localStorage.setItem(WORKSPACES_KEY, JSON.stringify(updated));
        setPlayers([]); setMatches([]); setCheckedInBySession({ s1: [] }); setNumCourts(3);
        setSessions(initData.sessions); setCurrentSessionId("s1"); setGithubGistId("");
        setWorkspaceId(newId);
        setScreen("session");
      };

      const handleDeleteWorkspace = (wsId) => {
        setConfirmDialog({
          title: "Hapus Arena",
          message: "Yakin ingin menghapus arena ini? Semua data akan hilang permanen.",
          isDanger: true,
          onConfirm: () => {
            localStorage.removeItem(`courtRank_ws_${wsId}`);
            const updated = workspaces.filter(w => w.id !== wsId);
            setWorkspaces(updated);
            localStorage.setItem(WORKSPACES_KEY, JSON.stringify(updated));
            setConfirmDialog(null);
          }
        });
      };

      const handleResetWorkspace = (wsId) => {
        const ws = workspaces.find(w => w.id === wsId);
        setConfirmDialog({
          title: "Reset Arena Ini",
          message: `Yakin ingin mereset ${ws?.name || "Arena ini"}? Semua pemain, sesi, match, daftar hadir, dan klasemen di Arena ini akan dikosongkan. Nama Arena tetap dipertahankan.`,
          isDanger: true,
          onConfirm: () => {
            const freshSession = { id: "s1", label: "Sesi 1", date: new Date().toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long' }), createdAt: Date.now() };
            const freshData = {
              players: [], matches: [], checkedIn: [], checkedInBySession: { s1: [] }, numCourts: 3,
              sessions: [freshSession], currentSessionId: "s1", githubGistId: "",
            };
            localStorage.setItem(`courtRank_ws_${wsId}`, JSON.stringify(freshData));
            const updated = workspaces.map(w => w.id === wsId ? { ...w, updatedAt: Date.now() } : w);
            setWorkspaces(updated);
            localStorage.setItem(WORKSPACES_KEY, JSON.stringify(updated));
            if (workspaceId === wsId) {
              setPlayers([]); setMatches([]); setCheckedInBySession({ s1: [] }); setNumCourts(3);
              setSessions([freshSession]); setCurrentSessionId("s1"); setGithubGistId("");
            }
            showNotify(`${ws?.name || "Arena"} berhasil di-reset.`, "success");
            setConfirmDialog(null);
          }
        });
      };

      const handleRenameWorkspace = (wsId, newName) => {
        const cleanName = newName.trim();
        if (!cleanName) return;
        const updated = workspaces.map(w => w.id === wsId ? { ...w, name: cleanName, updatedAt: Date.now() } : w);
        setWorkspaces(updated);
        localStorage.setItem(WORKSPACES_KEY, JSON.stringify(updated));
        showNotify("Nama Arena berhasil diganti!", "success");
      };

      const handleDeleteSession = (sessionId) => {
        if (sessions.length <= 1) {
          showNotify("Minimal harus ada 1 sesi.", "error");
          return;
        }
        const sess = sessions.find(s => s.id === sessionId);
        const firstSessionId = sessions[0]?.id || "s1";
        const sessIndex = sessions.findIndex(s => s.id === sessionId);
        const remainingSessions = sessions.filter(s => s.id !== sessionId);
        const fallbackSession = remainingSessions[Math.max(0, Math.min(sessIndex, remainingSessions.length - 1))] || remainingSessions[0];
        setConfirmDialog({
          title: "Hapus Sesi",
          message: `Yakin ingin menghapus ${sess?.label || "sesi ini"}? Semua match dan daftar hadir di sesi ini ikut dihapus.`,
          isDanger: true,
          onConfirm: () => {
            setMatches(prev => prev.filter(m => {
              const belongsToSession = m.sessionId === sessionId || (!m.sessionId && sessionId === firstSessionId);
              return !belongsToSession;
            }));
            setSessions(remainingSessions);
            setCheckedInBySession(prev => {
              const next = { ...prev };
              delete next[sessionId];
              return next;
            });
            if (currentSessionId === sessionId) setCurrentSessionId(fallbackSession?.id || remainingSessions[0]?.id || "s1");
            showNotify(`${sess?.label || "Sesi"} berhasil dihapus.`, "success");
            setConfirmDialog(null);
          }
        });
      };

      const handleWorkspaceHandover = (ws) => {
        if (!window.LZString) { showNotify("Sedang menyiapkan data...", "error"); return; }
        const raw = localStorage.getItem(`courtRank_ws_${ws.id}`);
        if (!raw) { showNotify("Data Arena tidak ditemukan", "error"); return; }
        try {
          const data = JSON.parse(raw);
          const safePlayers = (data.players || []).map(p => ({ ...p, name: repairStoredText(p.name) || p.name }));
          const safeMatches = data.matches || [];
          const safeSessions = data.sessions || [{ id: "s1", label: "Sesi 1", date: "", createdAt: Date.now() }];
          const wsFixed = repairWorkspace(ws);
          const minified = {
            p: safePlayers.map(p => [p.id, p.name, p.tier]),
            m: safeMatches.map(m => [m.id, m.courtId, m.status === 'ongoing' ? 0 : 1, m.team1, m.team2, (m.games || []).map(g => [g.t1, g.t2]), m.tierSnapshot || {}, m.sessionId || "s1"]),
            c: data.checkedIn || [], cbs: data.checkedInBySession || buildCheckedInBySession(data),
            n: data.numCourts || 3,
            sessions: safeSessions,
            currentSessionId: data.currentSessionId || safeSessions[0]?.id || "s1",
            wsName: wsFixed.name,
            wsEmoji: wsFixed.emoji,
            gistId: data.githubGistId || "",
          };
          const compressed = window.LZString.compressToEncodedURIComponent(JSON.stringify(minified));
          const baseUrl = window.location.href.split('?')[0].split('#')[0];
          const link = `${baseUrl}?d=${compressed}`;
          const doneMatches = safeMatches.filter(m => m.status === "done").length;
          const msg = `🎾 *HANDOVER ARENA COURTRANK — ${wsFixed.name.toUpperCase()}*\n\nData Arena lengkap:\n👥 ${safePlayers.length} pemain\n📅 ${safeSessions.length} sesi\n✅ ${doneMatches} match selesai\n\nBuka link ini untuk lanjut input skor dan lihat klasemen harian & All Time:\n🔗 ${link}`;
          if (navigator.share) {
            navigator.share({ title: `Handover ${wsFixed.name}`, text: msg }).catch(err => {
              if (err.name !== "AbortError") fallbackCopy(msg);
            });
          } else if (navigator.clipboard && window.isSecureContext) {
            navigator.clipboard.writeText(msg).then(() => showNotify("Link handover Arena disalin!", "success")).catch(() => fallbackCopy(msg));
          } else {
            fallbackCopy(msg);
            showNotify("Link handover Arena disalin!", "success");
          }
        } catch (e) {
          console.error(e);
          showNotify("Gagal membuat handover Arena", "error");
        }
      };

      if (screen === "workspace") {
        return <WorkspaceScreen
          workspaces={workspaces}
          onOpen={handleOpenWorkspace}
          onCreate={handleCreateWorkspace}
          onRename={handleRenameWorkspace}
          onReset={handleResetWorkspace}
          onDelete={handleDeleteWorkspace}
          confirmDialog={confirmDialog}
          setConfirmDialog={setConfirmDialog}
        />;
      }

      const statsPlayer = statsPlayerId ? players.find(p => p.id === statsPlayerId) : null;

      if (screen === "stats" && statsPlayer) {
        return <><PlayerStatsScreen
          player={statsPlayer}
          players={players}
          matches={matches}
          sessions={sessions}
          currentSessionId={currentSessionId}
          initialMode={statsFrom === "app" ? "session" : "alltime"}
          showModeSwitch={false}
          onBack={() => setScreen(statsFrom)}
        />
        {editingPlayer && (
          <EditPlayerModal
            player={editingPlayer}
            currentSessionId={currentSessionId}
            currentSessionLabel={sessions.find(s=>s.id===currentSessionId)?.label||"Sesi ini"}
            onClose={() => setEditingPlayer(null)}
            onSave={(id, newName, newTier, changeType) => {
              const player = players.find(p => p.id === id);
              const tierChanged = player && newTier !== player.tier;
              setPlayers(prev => prev.map(p => {
                if (p.id !== id) return p;
                const updated = { ...p, name: newName, tier: newTier };
                if (tierChanged) {
                  const histEntry = { from: p.tier, to: newTier, sessionId: currentSessionId, sessionLabel: sessions.find(s=>s.id===currentSessionId)?.label||"Sesi ini", date: new Date().toLocaleDateString('id-ID',{day:'numeric',month:'short',year:'numeric'}), type: changeType };
                  updated.tierHistory = [...(p.tierHistory||[]), histEntry];
                }
                return updated;
              }));
              if (tierChanged && changeType === "koreksi") {
                setMatches(prev => prev.map(m => {
                  const firstSessionId = sessions[0]?.id || "s1";
                  const isCurrentSessionMatch = m.sessionId === currentSessionId || (!m.sessionId && currentSessionId === firstSessionId);
                  if (!isCurrentSessionMatch) return m;
                  if (![...m.team1,...m.team2].includes(id)) return m;
                  return { ...m, tierSnapshot: { ...(m.tierSnapshot||{}), [id]: newTier } };
                }));
              }
              setEditingPlayer(null);
            }}
          />
        )}
        </>;
      }

      if (screen === "session") {
        const wsName = workspaces.find(w => w.id === workspaceId)?.name || "Arena";
        const wsEmoji = workspaces.find(w => w.id === workspaceId)?.emoji || "🏸";
        return <><SessionScreen
          sessions={sessions}
          matches={matches}
          players={players}
          checkedIn={checkedIn}
          checkedInBySession={checkedInBySession}
          currentSessionId={currentSessionId}
          wsName={wsName}
          wsEmoji={wsEmoji}
          onSelectSession={(sId) => { setCurrentSessionId(sId); setScreen("app"); }}
          onHandover={() => handleWorkspaceHandover(workspaces.find(w => w.id === workspaceId))}
          onDeleteSession={handleDeleteSession}
          onNewSession={() => {
            const sessionNum = sessions.length + 1;
            const newSession = {
              id: `s${Date.now()}`,
              label: `Sesi ${sessionNum}`,
              date: new Date().toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long' }),
              createdAt: Date.now(),
            };
            setSessions(prev => [...prev, newSession]);
            setCurrentSessionId(newSession.id);
            setCheckedInBySession(prev => ({ ...prev, [newSession.id]: [] }));
            setScreen("app");
            showNotify(`${newSession.label} dimulai!`, "success");
          }}
          onBack={() => setScreen("workspace")}
          onViewStats={(p) => { setStatsPlayerId(p.id); setStatsFrom("session"); setScreen("stats"); }}
          onEditPlayer={(p) => { setEditingPlayer(p); }}
          onAddPlayer={handleAddPlayer}
          onDeletePlayer={(id, name) => handleDeletePlayer(id, name, null)}
          newPlayerName={newPlayerName}
          setNewPlayerName={setNewPlayerName}
          newPlayerTier={newPlayerTier}
          setNewPlayerTier={setNewPlayerTier}
        />
        {editingPlayer && (
          <EditPlayerModal
            player={editingPlayer}
            currentSessionId={currentSessionId}
            currentSessionLabel={sessions.find(s=>s.id===currentSessionId)?.label||"Sesi ini"}
            onClose={() => setEditingPlayer(null)}
            onSave={(id, newName, newTier, changeType) => {
              const player = players.find(p => p.id === id);
              const tierChanged = player && newTier !== player.tier;
              setPlayers(prev => prev.map(p => {
                if (p.id !== id) return p;
                const updated = { ...p, name: newName, tier: newTier };
                if (tierChanged) {
                  const histEntry = {
                    from: p.tier, to: newTier,
                    sessionId: currentSessionId,
                    sessionLabel: sessions.find(s=>s.id===currentSessionId)?.label||"Sesi ini",
                    date: new Date().toLocaleDateString('id-ID',{day:'numeric',month:'short',year:'numeric'}),
                    type: changeType,
                  };
                  updated.tierHistory = [...(p.tierHistory||[]), histEntry];
                }
                return updated;
              }));
              if (tierChanged && changeType === "koreksi") {
                setMatches(prev => prev.map(m => {
                  const firstSessionId = sessions[0]?.id || "s1";
                  const isCurrentSessionMatch = m.sessionId === currentSessionId || (!m.sessionId && currentSessionId === firstSessionId);
                  if (!isCurrentSessionMatch) return m;
                  if (![...m.team1, ...m.team2].includes(id)) return m;
                  return { ...m, tierSnapshot: { ...(m.tierSnapshot||{}), [id]: newTier } };
                }));
              }
              setEditingPlayer(null);
            }}
          />
        )}
        </>;
      }

      if (!isLoaded) {
        return (
          <div style={{ minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", background: "#F1FAEE", color: "#E63946" }}>
            <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 12 }}>
              <div style={{ fontSize: 32, animation: "bounce 1s infinite" }}>🎾</div>
              <div style={{ fontWeight: 600 }}>Memuat Data...</div>
            </div>
          </div>
        );
      }

      return (
        <div style={{
          minHeight: "100vh", background: "#F1FAEE",
          color: "#101711", maxWidth: 430, margin: "0 auto",
          position: "relative",
        }}>
          {/* Header */}
          <div style={{
            background: "#F1FAEE",
            borderBottom: "2px solid #1D3557", padding: "18px 20px 0",
            position: "sticky", top: 0, zIndex: 100,
          }}>
            <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 14 }}>
              <button onClick={() => setScreen("session")} style={{ background: "#10171110", border: "none", borderRadius: 16, padding: "8px 12px", color: "#5E4648", fontSize: 13, cursor: "pointer" }}>←</button>
              <div style={{
                width: 32, height: 32, borderRadius: 8,
                background: "#E63946",
                display: "flex", alignItems: "center", justifyContent: "center",
                fontSize: 16,
              }}>🎾</div>
              <div style={{ flex: 1 }}>
                <div style={{ fontFamily: "'Archivo Narrow', sans-serif", fontStyle: "italic", fontWeight: 700, fontSize: 22, color: "#C1121F", textTransform: "uppercase" }}>
                  {workspaces.find(w => w.id === workspaceId)?.emoji || "🎾"} {workspaces.find(w => w.id === workspaceId)?.name || "CourtRank"}
                </div>
                <div style={{ fontSize: 11, color: "#5E4648", marginTop: -1 }}>
                  {checkedIn.size} hadir · {ongoingMatches.length} match berlangsung
                </div>
              </div>
              <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
                {gistStatus === "saving" && <span style={{ fontSize: 10, color: "#B07D00" }}>💾 Menyimpan...</span>}
                {gistStatus === "saved" && <span style={{ fontSize: 10, color: "#1D3557" }}>✅ Tersimpan</span>}
                {gistStatus === "error" && <span style={{ fontSize: 10, color: "#E63946" }}>❌ Gagal</span>}
              </div>
            </div>
            <div style={{ display: "flex", gap: 0, borderTop: "2px solid #1D3557" }}>
              {[
                { key: "courts", label: "🏸 Match" },
                { key: "standings", label: "📋 Klasemen" },
                { key: "stats", label: "📊 Statistik" },
                { key: "settings", label: "⚙️ Atur" },
              ].map(t => (
                <button key={t.key} onClick={() => setTab(t.key)} style={{
                  flex: 1, background: "none", border: "none", cursor: "pointer",
                  padding: "10px 0", fontSize: 13, fontWeight: tab === t.key ? 600 : 400,
                  color: tab === t.key ? "#C1121F" : "#70839C",
                  borderBottom: tab === t.key ? "3px solid #C1121F" : "3px solid transparent",
                  transition: "all 0.15s",
                }}>{t.label}</button>
              ))}
            </div>
          </div>

          <div style={{ padding: "16px 16px 100px" }}>

            {/* === COURTS / MATCH TAB === */}
            {tab === "courts" && (
              <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
                <div style={{ display: "flex", gap: 8 }}>
                  <button onClick={handleSmartMatch} style={{
                    flex: 1, padding: "13px 10px", background: "#E63946",
                    border: "none", borderRadius: 16, color: "#fff", fontWeight: 800, cursor: "pointer", fontSize: 13,
                  }}>⚡ Smart Match</button>
                  <button onClick={() => {
                    setManualCourt(courts.find(c => !occupiedCourts.has(c)) || 1);
                    setManualModal(true);
                  }} style={{
                    flex: 1, padding: "13px 10px", background: "#FFFFFF", border: "2px solid #1D3557",
                    borderRadius: 12, color: "#101711", fontWeight: 700, cursor: "pointer", fontSize: 13,
                  }}>🎯 Manual</button>
                </div>

                <div style={{ fontSize: 12, color: "#70839C", fontWeight: 700, letterSpacing: "0.06em", textTransform: "uppercase" }}>
                  Lapangan Aktif
                </div>

                {courts.map(courtId => {
                  const activeMatch = ongoingMatches.find(m => m.courtId === courtId);
                  return (
                    <div key={courtId} style={{
                      background: "#FFFFFF", border: `2px solid ${activeMatch ? "#E63946" : "#1D3557"}`,
                      borderRadius: 22, padding: 16, boxShadow: "5px 5px 0 #1D3557",
                    }}>
                      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: activeMatch ? 10 : 0 }}>
                        <div style={{ fontSize: 14, fontWeight: 800, color: "#101711" }}>Lapangan {courtId}</div>
                        <div style={{
                          fontSize: 11, color: activeMatch ? "#1D3557" : "#70839C",
                          background: activeMatch ? "#1D355718" : "#10171108",
                          border: `1px solid ${activeMatch ? "#1D355735" : "#10171110"}`,
                          borderRadius: 16, padding: "3px 9px", fontWeight: 700,
                        }}>{activeMatch ? "Berlangsung" : "Kosong"}</div>
                      </div>

                      {activeMatch ? (
                        <MatchCard
                          match={activeMatch}
                          players={players}
                          onScore={() => setScoreModal(activeMatch)}
                        />
                      ) : (
                        <div style={{ fontSize: 12, color: "#70839C", lineHeight: 1.5 }}>
                          Belum ada match di lapangan ini.
                        </div>
                      )}
                    </div>
                  );
                })}

                <div style={{ marginTop: 4 }}>
                  <div style={{ fontSize: 12, color: "#70839C", fontWeight: 700, letterSpacing: "0.06em", textTransform: "uppercase", marginBottom: 10 }}>
                    Match Selesai Sesi Ini
                  </div>
                  {currentSessionMatches.filter(m => m.status === "done").length === 0 && (
                    <div style={{
                      textAlign: "center", padding: "24px 16px", background: "#FFFFFF",
                      borderRadius: 22, border: "2px solid #1D3557", color: "#70839C", fontSize: 13, boxShadow: "5px 5px 0 #1D3557",
                    }}>
                      Belum ada match selesai di sesi ini.
                    </div>
                  )}
                  {currentSessionMatches.filter(m => m.status === "done").slice().reverse().map(match => (
                    <DoneMatchCard
                      key={match.id}
                      match={match}
                      players={players}
                      onEdit={() => setScoreModal(match)}
                    />
                  ))}
                </div>
              </div>
            )}

            {/* === STANDINGS TAB === */}
            {tab === "standings" && (
              <div>
                {/* KLASEMEN HARIAN */}
                <div id="standings-board" style={{ padding: "12px", background: "#F1FAEE", borderRadius: 14, margin: "-12px", marginBottom: "16px" }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 20 }}>
                    <div>
                      <div style={{ fontFamily: "'Archivo Narrow', sans-serif", fontSize: 28, fontWeight: 700, color: "#1D3557", textTransform: "uppercase", letterSpacing: "-0.02em" }}>KLASEMEN HARIAN</div>
                      <div style={{ fontSize: 12, color: "#5E4648", marginTop: 4 }}>
                        {new Date().toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' })}
                      </div>
                      <div style={{ fontSize: 11, color: "#E63946", marginTop: 4, fontWeight: 600 }}>
                        {sessions.find(s => s.id === currentSessionId)?.label} · {sessions.find(s => s.id === currentSessionId)?.date}
                      </div>
                    </div>

                  </div>

                  {standingsHarian.length === 0 && (
                    <div style={{ textAlign: "center", padding: "24px 16px", background: "#FFFFFF", borderRadius: 12, border: "2px solid #1D3557", marginBottom: 16 }}>
                      <div style={{ fontSize: 24, marginBottom: 8 }}>🏸</div>
                      <div style={{ fontSize: 14, fontWeight: 600, color: "#70839C" }}>Belum ada match hari ini</div>
                      <div style={{ fontSize: 12, color: "#8798AE", marginTop: 4 }}>Mulai Smart Match atau Manual untuk mulai sesi ini</div>
                    </div>
                  )}

                  {standingsHarian.length > 0 && (
                    <div>
                      {/* WOW / SOS / MBG / AFK */}
                      {standingsHarian.length >= 2 && (() => {
                        const wow = standingsHarian[0];
                        const sos = standingsHarian[standingsHarian.length - 1];
                        return (
                          <div style={{ marginBottom: 16, display: "flex", flexDirection: "column", gap: 6 }}>
                            <div style={{ background: "linear-gradient(135deg, #B07D0015, #FFB70315)", border: "1px solid #B07D0030", borderRadius: 16, padding: "8px 12px" }}>
                              <strong style={{ color: "#B07D00", fontSize: "14px", display: "block", marginBottom: "2px" }}>🏆 WOW HARI INI: {wow.name}</strong>
                              <span style={{ fontSize: "11px", color: "#5E4648" }}>(Winner Over Winners) · {wow.P} pts · {wow.W}W {wow.L}L · Diff {wow.diff >= 0 ? "+" : ""}{wow.diff}</span>
                            </div>
                            <div style={{ display: "flex", gap: 6 }}>
                              <div style={{ flex: 1, background: "#E6394615", border: "1px solid #E6394630", borderRadius: 16, padding: "8px 12px" }}>
                                <strong style={{ color: "#E63946", fontSize: "13px", display: "block", marginBottom: "2px" }}>🤡 SOS HARI INI: {sos.name}</strong>
                                <span style={{ fontSize: "11px", color: "#5E4648" }}>(Score Optimization Needed) · {sos.P} pts</span>
                              </div>
                              {mbgPlayer && (
                                <div style={{ flex: 1, background: "#1D355715", border: "1px solid #1D355730", borderRadius: 16, padding: "8px 12px" }}>
                                  <strong style={{ color: "#1D3557", fontSize: "13px", display: "block", marginBottom: "2px" }}>📈 MBG HARI INI: {mbgPlayer.name}</strong>
                                  <span style={{ fontSize: "11px", color: "#5E4648" }}>(Making Big Gains) · +{mbgPlayer.totalR}R</span>
                                </div>
                              )}
                            </div>
                            {afkPlayer && (
                              <div style={{ background: "#5E464815", border: "1px solid #5E464830", borderRadius: 16, padding: "8px 12px" }}>
                                <strong style={{ color: "#5E4648", fontSize: "13px", display: "block", marginBottom: "2px" }}>😴 AFK HARI INI: {afkPlayer.name}</strong>
                                <span style={{ fontSize: "11px", color: "#70839C" }}>(Attendance Frequency Kurang) · {afkPlayer.matchesPlayed} match · {afkPlayer.M} pts kompensasi</span>
                              </div>
                            )}
                          </div>
                        );
                      })()}

                      {/* TABLE */}
                      <div style={{ overflowX: "auto" }}>
                        <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12 }}>
                          <thead>
                            <tr style={{ borderBottom: "1px solid #10171114" }}>
                              {["#", "Pemain", "Tier", "P", "M", "W-D-L", "TS", "Diff", "+M", "R"].map((h, i) => (
                                <th key={i} style={{ padding: "6px 6px", color: "#70839C", fontWeight: 600, textAlign: i === 1 ? "left" : "center", whiteSpace: "nowrap" }}>{h}</th>
                              ))}
                            </tr>
                          </thead>
                          <tbody>
                            {standingsHarian.map((p, idx) => {
                              const medal = ["🥇","🥈","🥉"][idx] || "";
                              const isTop = idx === 0;
                              const isBot = idx === standingsHarian.length - 1;
                              return (
                                <tr key={p.id} style={{ borderBottom: "1px solid #10171106", background: isTop ? "#B07D0008" : isBot ? "#E6394608" : "none" }}>
                                  <td style={{ padding: "10px 6px", textAlign: "center" }}>{medal || <span style={{ color: "#70839C", fontSize: 11 }}>{idx + 1}</span>}</td>
                                  <td style={{ padding: "10px 8px", fontSize: 13, fontWeight: 500, whiteSpace: "nowrap", cursor: "pointer" }}
                                    onClick={() => { setStatsPlayerId(p.id); setStatsFrom("app"); setScreen("stats"); }}>
                                    <span style={{ borderBottom: "1px dashed #E6394660", paddingBottom: 1 }}>{p.name}</span> <span style={{ fontSize: 10, color: "#E6394680" }}>📊</span>
                                  </td>
                                  <td style={{ padding: "10px 6px", textAlign: "center" }}><TierBadge tier={p.tier} small /></td>
                                  <td style={{ padding: "10px 6px", textAlign: "center", fontWeight: 900, color: "#C1121F", fontFamily: "'DM Mono', monospace", fontSize: 13 }}>{p.P}</td>
                                  <td style={{ padding: "10px 6px", textAlign: "center", color: "#5E4648" }}>{p.matchesPlayed}</td>
                                  <td style={{ padding: "10px 6px", textAlign: "center", fontFamily: "'DM Mono', monospace", fontWeight: 400 }}><span style={{ color: "#1D3557" }}>{p.W}</span><span style={{ color: "#70839C" }}>-</span><span style={{ color: "#B07D00" }}>{p.D}</span><span style={{ color: "#70839C" }}>-</span><span style={{ color: "#E63946" }}>{p.L}</span></td>
                                  <td style={{ padding: "10px 6px", textAlign: "center", fontWeight: 400, color: "#5A3A3D", fontFamily: "'DM Mono', monospace" }}>{p.totalFor}</td>
                                  <td style={{ padding: "10px 6px", textAlign: "center", fontWeight: 400, color: p.diff >= 0 ? "#1D3557" : "#E63946", fontFamily: "'DM Mono', monospace" }}>{p.diff >= 0 ? "+" : ""}{p.diff}</td>
                                  <td style={{ padding: "10px 6px", textAlign: "center", fontWeight: 400, color: "#B07D00", fontFamily: "'DM Mono', monospace" }}>{p.M > 0 ? `+${p.M}` : "—"}</td>
                                  <td style={{ padding: "10px 6px", textAlign: "center", fontWeight: 400, color: "#1D3557", fontFamily: "'DM Mono', monospace" }}>{p.totalR > 0 ? `+${p.totalR}` : "—"}</td>
                                </tr>
                              );
                            })}
                          </tbody>
                        </table>
                      </div>
                      <StandingsLegend showMPlus />
                    </div>
                  )}
                </div>

                {/* Share */}
                {standingsHarian.length > 0 && (
                  <div style={{ display: "flex", gap: 8, marginTop: 8, paddingBottom: 16 }}>
                    <button onClick={handleDownloadImage} disabled={isProcessing !== null} style={{
                      flex: 1, background: "#FFFFFF", border: "2px solid #1D3557", borderRadius: 18, padding: "13px 10px",
                      cursor: isProcessing !== null ? "default" : "pointer", color: "#5A3A3D", fontWeight: 800, fontSize: 13,
                    }}>{isProcessing === "download" ? "⏳" : "💾"} Simpan Gambar</button>
                    <button onClick={handleShareWA} disabled={isProcessing !== null} style={{
                      flex: 1, background: isProcessing === "share" ? "#8798AE" : "linear-gradient(135deg, #1D3557, #2D4F80)",
                      border: "none", borderRadius: 12, padding: "13px 10px", cursor: isProcessing !== null ? "default" : "pointer",
                      color: "#fff", fontWeight: 700, fontSize: 13,
                    }}>{isProcessing === "share" ? "⏳" : "💬"} Kirim WA</button>
                  </div>
                )}
              </div>
            )}

            {/* === STATISTIK SESI TAB === */}
            {tab === "stats" && (() => {
              const sessionPlayers = players.filter(p => checkedIn.has(p.id));
              const sessionDone = currentSessionMatches.filter(m => m.status === "done");
              return (
                <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
                  <div style={{ background: "#FFFFFF", border: "2px solid #1D3557", borderRadius: 18, padding: "14px 16px", boxShadow: "5px 5px 0 #1D3557" }}>
                    <div style={{ fontFamily: "'Archivo Narrow', sans-serif", fontSize: 26, fontWeight: 700, color: "#1D3557", textTransform: "uppercase" }}>Statistik Sesi</div>
                    <div style={{ fontSize: 12, color: "#5E4648", marginTop: 4 }}>{sessions.find(s => s.id === currentSessionId)?.label} · {checkedIn.size} hadir · {sessionDone.length} match selesai</div>
                  </div>
                  <div style={{ fontSize: 12, color: "#70839C", fontWeight: 700, letterSpacing: "0.06em", textTransform: "uppercase" }}>Pemain Hadir</div>
                  {sessionPlayers.length === 0 && (
                    <div style={{ textAlign: "center", padding: "28px 16px", background: "#FFFFFF", borderRadius: 18, border: "2px solid #1D3557", color: "#70839C", fontSize: 13 }}>Belum ada pemain check-in di sesi ini.</div>
                  )}
                  {sessionPlayers.map(p => {
                    const myMatches = sessionDone.filter(m => [...m.team1, ...m.team2].includes(p.id));
                    let wins = 0, draws = 0, losses = 0, totalFor = 0, totalAgainst = 0, totalPts = 0;
                    myMatches.forEach(m => {
                      const onT1 = m.team1.includes(p.id);
                      const res = calcMatchResult(m, players);
                      const won = onT1 ? res.t1Win : res.t2Win;
                      const lost = onT1 ? res.t2Win : res.t1Win;
                      if (won) wins++; else if (lost) losses++; else draws++;
                      const myScore = onT1 ? res.t1Score : res.t2Score;
                      const oppScore = onT1 ? res.t2Score : res.t1Score;
                      totalFor += myScore;
                      totalAgainst += oppScore;
                      totalPts += myScore + (onT1 ? res.t1S : res.t2S) + (onT1 ? res.t1R : res.t2R);
                    });
                    const winRate = myMatches.length > 0 ? Math.round((wins / myMatches.length) * 100) : 0;
                    const diff = totalFor - totalAgainst;
                    return (
                      <div key={p.id} onClick={() => { setStatsPlayerId(p.id); setStatsFrom("app"); setScreen("stats"); }} style={{ display: "flex", alignItems: "center", gap: 12, padding: "12px 14px", background: "#FFFFFF", border: "2px solid #1D3557", borderRadius: 16, boxShadow: "4px 4px 0 #1D3557", cursor: "pointer" }}>
                        <div style={{ width: 38, height: 38, borderRadius: 12, background: "#E6394620", border: "2px solid #E63946", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 13, fontWeight: 900, color: "#C1121F" }}>{p.name.slice(0,2).toUpperCase()}</div>
                        <div style={{ flex: 1, minWidth: 0 }}>
                          <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                            <div style={{ fontSize: 13, fontWeight: 800, color: "#101711", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{p.name}</div>
                            <TierBadge tier={p.tier} small />
                          </div>
                          <div style={{ fontSize: 11, color: "#70839C", marginTop: 2 }}>{myMatches.length} match · {wins}W {draws}D {losses}L · Diff {diff >= 0 ? "+" : ""}{diff}</div>
                        </div>
                        <div style={{ textAlign: "right", minWidth: 54 }}>
                          <div style={{ fontSize: 15, fontWeight: 900, color: "#C1121F", fontFamily: "'DM Mono', monospace" }}>{totalPts}</div>
                          <div style={{ fontSize: 9, color: "#8798AE" }}>pts</div>
                        </div>
                        <div style={{ textAlign: "right", minWidth: 42 }}>
                          <div style={{ fontSize: 13, fontWeight: 800, color: winRate >= 50 ? "#1D3557" : "#E63946", fontFamily: "'DM Mono', monospace" }}>{winRate}%</div>
                          <div style={{ fontSize: 9, color: "#8798AE" }}>win</div>
                        </div>
                      </div>
                    );
                  })}
                </div>
              );
            })()}

            {/* === SETTINGS TAB === */}
            {tab === "settings" && (
              <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>

                {/* Jumlah Lapangan */}
                <div style={{ background: "#FFFFFF", borderRadius: 22, padding: 16, border: "2px solid #1D3557", boxShadow: "5px 5px 0 #1D3557" }}>
                  <div style={{ fontSize: 12, fontWeight: 700, color: "#70839C", letterSpacing: "0.06em", textTransform: "uppercase", marginBottom: 12 }}>🏟 Lapangan</div>
                  <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                    <button onClick={handleReduceCourt} style={{ width: 36, height: 36, borderRadius: 9, background: "#10171110", border: "1px solid #10171120", color: "#101711", fontSize: 20, cursor: "pointer", fontWeight: 700 }}>−</button>
                    <div style={{ flex: 1, textAlign: "center" }}>
                      <div style={{ fontSize: 28, fontWeight: 800, color: "#101711", fontFamily: "'DM Mono', monospace" }}>{numCourts}</div>
                      <div style={{ fontSize: 11, color: "#70839C" }}>lapangan aktif</div>
                    </div>
                    <button onClick={() => setNumCourts(n => n + 1)} style={{ width: 36, height: 36, borderRadius: 9, background: "#10171110", border: "1px solid #10171120", color: "#101711", fontSize: 20, cursor: "pointer", fontWeight: 700 }}>+</button>
                  </div>
                </div>

                {/* Check-in cepat */}
                <div style={{ background: "#FFFFFF", borderRadius: 22, padding: 16, border: "2px solid #1D3557", boxShadow: "5px 5px 0 #1D3557" }}>
                  <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 12 }}>
                    <div style={{ fontSize: 12, fontWeight: 700, color: "#70839C", letterSpacing: "0.06em", textTransform: "uppercase" }}>👥 Check-in</div>
                    <div style={{ display: "flex", gap: 6 }}>
                      <button onClick={() => setCheckedIn(new Set(players.map(p => p.id)))} style={{ background: "#E6394620", border: "2px solid #E63946", borderRadius: 7, padding: "4px 10px", color: "#C1121F", fontSize: 11, fontWeight: 700, cursor: "pointer" }}>Semua Hadir</button>
                      <button onClick={() => setCheckedIn(new Set())} style={{ background: "#10171108", border: "1px solid #10171115", borderRadius: 7, padding: "4px 10px", color: "#70839C", fontSize: 11, cursor: "pointer" }}>Kosongkan</button>
                    </div>
                  </div>
                  <div style={{ fontSize: 12, color: "#70839C", marginBottom: 10 }}>{checkedIn.size} dari {players.length} hadir</div>
                  <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
                    {players.map(p => {
                      const isIn = checkedIn.has(p.id);
                      const isPlaying = activePlayers.has(p.id);
                      return (
                        <div key={p.id} onClick={() => !isPlaying && toggleCheckIn(p.id)} style={{
                          display: "flex", alignItems: "center", gap: 6, padding: "6px 10px",
                          background: isIn ? "#E6394620" : "#10171108",
                          border: `1px solid ${isIn ? "#E6394650" : "#1017110a"}`,
                          borderRadius: 8, cursor: isPlaying ? "default" : "pointer",
                          opacity: isPlaying ? 0.6 : 1,
                        }}>
                          <span style={{ fontSize: 12, color: isIn ? "#101711" : "#70839C", fontWeight: isIn ? 600 : 400 }}>{p.name}</span>
                          {isIn && <span style={{ fontSize: 10, color: "#1D3557" }}>✓</span>}
                          {isPlaying && <span style={{ fontSize: 9, color: "#1D3557" }}>●</span>}
                        </div>
                      );
                    })}
                  </div>
                </div>

                {/* Sesi */}
                <div style={{ background: "#FFFFFF", borderRadius: 22, padding: 16, border: "2px solid #1D3557", boxShadow: "5px 5px 0 #1D3557" }}>
                  <div style={{ fontSize: 12, fontWeight: 700, color: "#70839C", letterSpacing: "0.06em", textTransform: "uppercase", marginBottom: 12 }}>📅 Sesi</div>
                  <div style={{ fontSize: 13, color: "#101711", fontWeight: 600, marginBottom: 4 }}>
                    {sessions.find(s => s.id === currentSessionId)?.label} — {sessions.find(s => s.id === currentSessionId)?.date}
                  </div>
                  <div style={{ fontSize: 12, color: "#70839C", marginBottom: 12 }}>Sesi ke-{sessions.findIndex(s => s.id === currentSessionId) + 1} dari {sessions.length} total sesi</div>
                  <button onClick={() => setScreen("session")} style={{ width: "100%", padding: "11px", background: "#10171108", border: "2px solid #1D3557", borderRadius: 10, color: "#101711", fontWeight: 600, cursor: "pointer", fontSize: 13 }}>📋 Lihat All Time</button>
                </div>

                {/* Backup Data */}
                <div style={{ background: "#FFFFFF", borderRadius: 22, padding: 16, border: "2px solid #1D3557", boxShadow: "5px 5px 0 #1D3557" }}>
                  <div style={{ fontSize: 12, fontWeight: 700, color: "#70839C", letterSpacing: "0.06em", textTransform: "uppercase", marginBottom: 12 }}>☁️ Backup Data</div>
                  <button onClick={() => setShowGistModal(true)} style={{ width: "100%", padding: "11px", background: "#FFFFFF", border: "2px solid #E63946", color: "#C1121F", borderRadius: 10, cursor: "pointer", fontWeight: 700, fontSize: 12 }}>{gistStatus === "saving" ? "⏳" : "☁️"} Backup Gist</button>
                </div>

                {/* Reset Danger Zone */}
                <div style={{ marginTop: 8, paddingTop: 16, borderTop: "1px dashed #10171115", display: "flex", flexDirection: "column", gap: 10 }}>
                  <div style={{ fontSize: 12, fontWeight: 700, color: "#70839C", letterSpacing: "0.06em", textTransform: "uppercase" }}>Zona Reset</div>
                  <div style={{ background: "#FFB70310", border: "1px solid #FFB70335", borderRadius: 12, padding: 12 }}>
                    <button onClick={handleResetCurrentSession} style={{ width: "100%", background: "#FFB70320", border: "2px solid #FFB703", color: "#B07D00", padding: "11px", borderRadius: 10, fontSize: 12, fontWeight: 700, cursor: "pointer" }}>
                      ↺ Reset Sesi Ini
                    </button>
                    <div style={{ fontSize: 11, color: "#5E4648", lineHeight: 1.45, marginTop: 8 }}>
                      Menghapus match dan daftar hadir sesi aktif. Pemain, tier, dan sesi lain tetap aman.
                    </div>
                  </div>

                </div>

              </div>
            )}
          </div>

          {/* TURN BANNER */}
          {turnBanner && (
            <div style={{
              position: "fixed", top: 0, left: 0, right: 0, zIndex: 2000,
              background: "#E63946",
              padding: "14px 20px", textAlign: "center",
              boxShadow: "0 4px 32px #E6394680",
              animation: "slideDown 0.4s ease",
              cursor: "pointer",
            }} onClick={() => setTurnBanner(null)}>
              <div style={{ fontSize: 11, color: "#C1121F", fontWeight: 600, letterSpacing: "0.1em", marginBottom: 4 }}>⚡ GILIRAN BERMAIN — LAPANGAN {turnBanner.court}</div>
              <div style={{ fontSize: 16, fontWeight: 800, color: "#fff" }}>
                {turnBanner.team1.join(" & ")} <span style={{ color: "#C1121F", fontWeight: 400 }}>vs</span> {turnBanner.team2.join(" & ")}
              </div>
              <div style={{ fontSize: 11, color: "#C1121F", marginTop: 4 }}>Tap di mana saja untuk tutup</div>
            </div>
          )}

          {/* H2H MODAL */}
          {h2hPlayer && (() => {
            const h2h = buildH2H(h2hPlayer.id);
            const getPlayer = id => players.find(p => p.id === id);
            return (
              <div style={{ position: "fixed", inset: 0, background: "#000000dd", zIndex: 1500, display: "flex", alignItems: "flex-end", justifyContent: "center" }} onClick={() => setH2hPlayer(null)}>
                <div style={{ background: "#FFFFFF", borderRadius: "28px 28px 0 0", padding: 20, width: "100%", maxWidth: 430, border: "2px solid #1D3557", maxHeight: "85vh", overflowY: "auto" }} onClick={e => e.stopPropagation()}>
                  <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 16 }}>
                    <div style={{ width: 40, height: 40, borderRadius: 10, background: "linear-gradient(135deg, #E6394630, #E6394630)", border: "2px solid #E63946", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 14, fontWeight: 700, color: "#C1121F" }}>{h2hPlayer.name.slice(0, 2).toUpperCase()}</div>
                    <div>
                      <div style={{ fontSize: 15, fontWeight: 700, color: "#101711" }}>{h2hPlayer.name}</div>
                      <div style={{ fontSize: 12, color: "#5E4648" }}><TierBadge tier={h2hPlayer.tier} small /> · {h2h.doneMatches.length} match dimainkan</div>
                    </div>
                  </div>

                  {/* Streak badge */}
                  {h2h.streak > 0 && h2h.streakType && (
                    <div style={{ background: h2h.streakType === "W" ? "#1D355715" : "#E6394615", border: `1px solid ${h2h.streakType === "W" ? "#1D355730" : "#E6394630"}`, borderRadius: 18, padding: "10px 14px", marginBottom: 10, display: "flex", alignItems: "center", gap: 10 }}>
                      <span style={{ fontSize: 22 }}>{h2h.streakType === "W" ? "🔥" : "🧊"}</span>
                      <div>
                        <div style={{ fontSize: 12, fontWeight: 700, color: h2h.streakType === "W" ? "#1D3557" : "#E63946" }}>
                          {h2h.streakType === "W" ? `${h2h.streak} Menang Beruntun!` : `${h2h.streak} Kalah Beruntun`}
                        </div>
                        <div style={{ fontSize: 11, color: "#70839C" }}>Best streak: 🏆{h2h.maxWinStreak}W · 😢{h2h.maxLoseStreak}L</div>
                      </div>
                    </div>
                  )}

                  {h2h.bestPartner && (
                    <div style={{ background: "#1D355715", border: "1px solid #1D355730", borderRadius: 18, padding: "10px 14px", marginBottom: 10 }}>
                      <div style={{ fontSize: 11, color: "#1D3557", fontWeight: 700, letterSpacing: "0.06em", marginBottom: 4 }}>🤝 PARTNER TERBAIK</div>
                      <div style={{ fontSize: 14, fontWeight: 600, color: "#101711" }}>{getPlayer(parseInt(h2h.bestPartner[0]))?.name || "?"}</div>
                      <div style={{ fontSize: 12, color: "#70839C" }}>{h2h.bestPartner[1].w}W · {h2h.bestPartner[1].l}L bersama</div>
                    </div>
                  )}

                  {h2h.nemesis && h2h.nemesis[1].l > 0 && (
                    <div style={{ background: "#ef444415", border: "1px solid #ef444430", borderRadius: 18, padding: "10px 14px", marginBottom: 10 }}>
                      <div style={{ fontSize: 11, color: "#E63946", fontWeight: 700, letterSpacing: "0.06em", marginBottom: 4 }}>😤 MUSUH BEBUYUTAN</div>
                      <div style={{ fontSize: 14, fontWeight: 600, color: "#101711" }}>{getPlayer(parseInt(h2h.nemesis[0]))?.name || "?"}</div>
                      <div style={{ fontSize: 12, color: "#70839C" }}>Kalah {h2h.nemesis[1].l}x · Menang {h2h.nemesis[1].w}x</div>
                    </div>
                  )}

                  {h2h.favorite && h2h.favorite[1].w > 0 && (
                    <div style={{ background: "#FFB70315", border: "2px solid #FFB703", borderRadius: 18, padding: "10px 14px", marginBottom: 14 }}>
                      <div style={{ fontSize: 11, color: "#B07D00", fontWeight: 700, letterSpacing: "0.06em", marginBottom: 4 }}>🎯 MANGSA EMPUK</div>
                      <div style={{ fontSize: 14, fontWeight: 600, color: "#101711" }}>{getPlayer(parseInt(h2h.favorite[0]))?.name || "?"}</div>
                      <div style={{ fontSize: 12, color: "#70839C" }}>Menang {h2h.favorite[1].w}x · Kalah {h2h.favorite[1].l}x</div>
                    </div>
                  )}

                  {/* Win rate per tier */}
                  {Object.keys(h2h.tierStats).length > 0 && (
                    <div style={{ background: "#FFFFFF", border: "2px solid #1D3557", borderRadius: 18, padding: "10px 14px", marginBottom: 10 }}>
                      <div style={{ fontSize: 11, color: "#5E4648", fontWeight: 700, letterSpacing: "0.06em", marginBottom: 8 }}>📊 WIN RATE VS TIER</div>
                      <div style={{ display: "flex", flexDirection: "column", gap: 5 }}>
                        {Object.entries(TIER_WEIGHT).filter(([t]) => h2h.tierStats[t]).map(([tier]) => {
                          const ts = h2h.tierStats[tier];
                          const total = ts.w + ts.l;
                          const pct = total > 0 ? Math.round((ts.w / total) * 100) : 0;
                          const c = TIER_COLORS[tier];
                          return (
                            <div key={tier} style={{ display: "flex", alignItems: "center", gap: 8 }}>
                              <span style={{ fontSize: 11, background: c.bg, color: c.text, border: `1px solid ${c.border}`, borderRadius: 4, padding: "1px 6px", minWidth: 28, textAlign: "center" }}>Tier {tier}</span>
                              <div style={{ flex: 1, height: 6, background: "#F1FAEE", borderRadius: 99, overflow: "hidden" }}>
                                <div style={{ height: "100%", width: `${pct}%`, background: pct >= 50 ? "#1D3557" : "#E63946", borderRadius: 99, transition: "width 0.4s" }} />
                              </div>
                              <span style={{ fontSize: 11, color: pct >= 50 ? "#1D3557" : "#E63946", fontWeight: 700, minWidth: 36 }}>{pct}%</span>
                              <span style={{ fontSize: 10, color: "#8798AE", minWidth: 40 }}>{ts.w}W {ts.l}L</span>
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  )}

                  {/* Session trend */}
                  {h2h.sessTrend.length > 1 && (
                    <div style={{ background: "#FFFFFF", border: "2px solid #1D3557", borderRadius: 18, padding: "10px 14px", marginBottom: 10 }}>
                      <div style={{ fontSize: 11, color: "#5E4648", fontWeight: 700, letterSpacing: "0.06em", marginBottom: 8 }}>📈 TREN POIN PER SESI</div>
                      <div style={{ display: "flex", gap: 4, alignItems: "flex-end", height: 40 }}>
                        {(() => {
                          const maxPts = Math.max(...h2h.sessTrend.map(s => s.pts), 1);
                          return h2h.sessTrend.map((s, i) => (
                            <div key={i} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: 2 }}>
                              <div style={{ width: "100%", height: `${Math.max(4, (s.pts / maxPts) * 32)}px`, background: i === h2h.sessTrend.length - 1 ? "linear-gradient(180deg, #E63946,#C1121F)" : "#10171120", borderRadius: "3px 3px 0 0", transition: "height 0.4s" }} />
                              <div style={{ fontSize: 8, color: "#8798AE", textAlign: "center", lineHeight: 1 }}>{s.label.replace("Sesi ", "S")}</div>
                            </div>
                          ));
                        })()}
                      </div>
                    </div>
                  )}

                  <div style={{ fontSize: 12, fontWeight: 700, color: "#70839C", marginBottom: 8, letterSpacing: "0.06em" }}>REKOR LAWAN</div>
                  {Object.entries(h2h.opponentStats).length === 0 && (
                    <div style={{ fontSize: 12, color: "#8798AE", textAlign: "center", padding: 16 }}>Belum ada data head-to-head</div>
                  )}
                  {Object.entries(h2h.opponentStats).map(([oid, stat]) => {
                    const opp = getPlayer(parseInt(oid));
                    if (!opp) return null;
                    const total = stat.w + stat.l + stat.d;
                    const winPct = total > 0 ? Math.round((stat.w / total) * 100) : 0;
                    return (
                      <div key={oid} style={{ display: "flex", alignItems: "center", gap: 10, padding: "8px 12px", background: "#F1FAEE", borderRadius: 8, marginBottom: 6 }}>
                        <TierBadge tier={opp.tier} small />
                        <span style={{ flex: 1, fontSize: 13, color: "#101711" }}>{opp.name}</span>
                        <span style={{ fontSize: 12, color: "#1D3557", fontFamily: "'DM Mono', monospace" }}>{stat.w}W</span>
                        {stat.d > 0 && <span style={{ fontSize: 12, color: "#B07D00", fontFamily: "'DM Mono', monospace" }}>{stat.d}D</span>}
                        <span style={{ fontSize: 12, color: "#E63946", fontFamily: "'DM Mono', monospace" }}>{stat.l}L</span>
                        <span style={{ fontSize: 11, color: winPct >= 50 ? "#1D3557" : "#E63946", fontWeight: 700, minWidth: 36, textAlign: "right" }}>{winPct}%</span>
                      </div>
                    );
                  })}
                  <button onClick={() => setH2hPlayer(null)} style={{ width: "100%", marginTop: 12, padding: "12px", background: "#10171110", border: "none", borderRadius: 10, color: "#101711", fontWeight: 600, cursor: "pointer" }}>Tutup</button>
                </div>
              </div>
            );
          })()}

          {smartPreview && (
            <SmartPreviewModal
              preview={smartPreview}
              players={players}
              onShuffle={handleShuffleSmartMatch}
              onConfirm={handleConfirmSmartMatch}
              onManual={(t1, t2) => handleConfirmSmartMatch(t1, t2)}
              onClose={() => setSmartPreview(null)}
            />
          )}

          {showGistModal && (
            <GistModal
              token={githubToken} setToken={setGithubToken}
              gistId={githubGistId} setGistId={setGithubGistId}
              onSave={handleSaveToGist}
              onRestore={handleRestoreFromGist}
              onClose={() => setShowGistModal(false)}
            />
          )}

          {showHandoverModal && (
            <HandoverModal
              onHandover={handleHandoverWA}
              onClose={() => setShowHandoverModal(false)}
              workspaceName={workspaces.find(w => w.id === workspaceId)?.name || "Arena"}
              matchCount={matches.filter(m => m.status === "done").length}
              playerCount={players.length}
            />
          )}

          {scoreModal && (
            <ScoreModal
              match={scoreModal} players={players}
              onClose={() => setScoreModal(null)}
              onSubmit={(games, t1, t2, finish) => handleSubmitScore(scoreModal.id, games, t1, t2, finish)}
              onDelete={() => handleDeleteMatch(scoreModal.id)}
            />
          )}

          {manualModal && (
            <ManualModal
              players={availablePlayers}
              courts={courts.filter(c => !occupiedCourts.has(c))}
              selected={manualSelected} setSelected={setManualSelected}
              court={manualCourt} setCourt={setManualCourt}
              onClose={() => { setManualModal(false); setManualSelected([]); }}
              onSubmit={handleManualMatch}
            />
          )}

          {editingPlayer && (
            <EditPlayerModal
              player={editingPlayer}
              currentSessionId={currentSessionId}
              currentSessionLabel={sessions.find(s=>s.id===currentSessionId)?.label||"Sesi ini"}
              onClose={() => setEditingPlayer(null)}
              onSave={(id, newName, newTier, changeType) => {
                const player = players.find(p => p.id === id);
                const tierChanged = player && newTier !== player.tier;
                setPlayers(prev => prev.map(p => {
                  if (p.id !== id) return p;
                  const updated = { ...p, name: newName, tier: newTier };
                  if (tierChanged) {
                    const histEntry = {
                      from: p.tier, to: newTier,
                      sessionId: currentSessionId,
                      sessionLabel: sessions.find(s=>s.id===currentSessionId)?.label||"Sesi ini",
                      date: new Date().toLocaleDateString('id-ID',{day:'numeric',month:'short',year:'numeric'}),
                      type: changeType, // "koreksi" | "resmi"
                    };
                    updated.tierHistory = [...(p.tierHistory||[]), histEntry];
                  }
                  return updated;
                }));
                // If koreksi: patch tierSnapshot on all matches this session
                if (tierChanged && changeType === "koreksi") {
                  setMatches(prev => prev.map(m => {
                      const firstSessionId = sessions[0]?.id || "s1";
                    const isCurrentSessionMatch = m.sessionId === currentSessionId || (!m.sessionId && currentSessionId === firstSessionId);
                    if (!isCurrentSessionMatch) return m;
                    if (![...m.team1, ...m.team2].includes(id)) return m;
                    return { ...m, tierSnapshot: { ...(m.tierSnapshot||{}), [id]: newTier } };
                  }));
                  showNotify(`Koreksi tier ${player.tier}→${newTier} diterapkan ke semua match sesi ini`);
                } else if (tierChanged) {
                  showNotify(`${newName} resmi berubah tier ${player.tier}→${newTier} mulai match berikutnya`);
                } else {
                  showNotify("Data pemain berhasil diperbarui!");
                }
                setEditingPlayer(null);
              }}
            />
          )}

          {notify && (
            <div style={{
              position: "fixed", bottom: 80, left: "50%", transform: "translateX(-50%)",
              background: notify.type === "error" ? "#FFE9EC" : "#14532d",
              border: `1px solid ${notify.type === "error" ? "#E63946" : "#166534"}`,
              color: notify.type === "error" ? "#C1121F" : "#86efac",
              padding: "10px 20px", borderRadius: 10, fontSize: 13, fontWeight: 500,
              zIndex: 1000, whiteSpace: "nowrap", boxShadow: "0 4px 24px #00000060",
            }}>{notify.msg}</div>
          )}

          {confirmDialog && (
            <div style={{
              position: "fixed", inset: 0, background: "#000000cc",
              zIndex: 1500, display: "flex", alignItems: "center", justifyContent: "center",
              padding: 20
            }} onClick={() => setConfirmDialog(null)}>
              <div style={{
                background: "#FFFFFF", borderRadius: 16, padding: 24, width: "100%", maxWidth: 320,
                border: "2px solid #1D3557", textAlign: "center",
                boxShadow: "0 10px 40px #00000080"
              }} onClick={e => e.stopPropagation()}>
                <div style={{ fontSize: 16, fontWeight: 700, marginBottom: 12, color: confirmDialog.isDanger ? "#C1121F" : "#101711" }}>
                  {confirmDialog.title}
                </div>
                <div style={{ fontSize: 13, color: "#5E4648", marginBottom: 24, lineHeight: 1.5 }}>
                  {confirmDialog.message}
                </div>
                <div style={{ display: "flex", gap: 10 }}>
                  <button onClick={() => setConfirmDialog(null)} style={{
                    flex: 1, padding: "12px", borderRadius: 10, background: "#10171110",
                    border: "none", color: "#101711", fontWeight: 600, cursor: "pointer", fontFamily: "'Lexend', sans-serif"
                  }}>Batal</button>
                  <button onClick={confirmDialog.onConfirm} style={{
                    flex: 1, padding: "12px", borderRadius: 10,
                    background: confirmDialog.isDanger ? "#FFE9EC" : "linear-gradient(135deg, #E63946, #C1121F)",
                    border: "none", color: "#fff", fontWeight: 600, cursor: "pointer", fontFamily: "'Lexend', sans-serif"
                  }}>Yakin</button>
                </div>
              </div>
            </div>
          )}
        </div>
      );    }

    // ===== MATCH CARD COMPONENTS =====
    function MatchCard({ match, players, onScore }) {
      const getPlayer = id => players.find(p => p.id === id);
      const teamNames = (ids) => ids.map(id => getPlayer(id)?.name || "?").join(" & ");
      return (
        <div onClick={onScore} style={{ cursor: "pointer" }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
            <div style={{ textAlign: "center", flex: 1 }}>
              <div style={{ fontSize: 13, fontWeight: 600, color: "#101711", marginBottom: 2 }}>{teamNames(match.team1)}</div>
              <div style={{ display: "flex", gap: 4, justifyContent: "center" }}>
                {match.team1.map(id => getPlayer(id)?.tier).filter(Boolean).map((t, i) => <TierBadge key={i} tier={t} small />)}
              </div>
            </div>
            <div style={{ fontSize: 12, fontWeight: 700, color: "#70839C", padding: "0 10px" }}>VS</div>
            <div style={{ textAlign: "center", flex: 1 }}>
              <div style={{ fontSize: 13, fontWeight: 600, color: "#101711", marginBottom: 2 }}>{teamNames(match.team2)}</div>
              <div style={{ display: "flex", gap: 4, justifyContent: "center" }}>
                {match.team2.map(id => getPlayer(id)?.tier).filter(Boolean).map((t, i) => <TierBadge key={i} tier={t} small />)}
              </div>
            </div>
          </div>
          <div style={{ display: "flex", justifyContent: "center", gap: 6, marginBottom: 12 }}>
            {match.games.map((g, i) => (
              <div key={i} style={{ background: "#10171108", borderRadius: 6, padding: "4px 10px", fontSize: 12, fontFamily: "'DM Mono', monospace", color: "#5E4648" }}>
                {g.t1}-{g.t2}
              </div>
            ))}
          </div>
          <button onClick={(e) => { e.stopPropagation(); onScore(); }} style={{
            width: "100%", padding: "10px", background: "#E63946",
            border: "none", borderRadius: 8, color: "#fff", fontWeight: 600, fontSize: 13, cursor: "pointer",
          }}>📝 Input Skor</button>
        </div>
      );
    }

    function DoneMatchCard({ match, players, onEdit }) {
      const getPlayer = id => players.find(p => p.id === id);
      const snap = match.tierSnapshot || {};
      const teamNames = (ids) => ids.map(id => {
        const p = getPlayer(id);
        if (!p) return "?";
        const snapTier = snap[id];
        const tierChanged = snapTier && snapTier !== p.tier;
        return tierChanged ? `${p.name} (${snapTier}→${p.tier})` : p.name;
      }).join(" & ");
      const res = calcMatchResult(match, players);
      const t1Won = res.t1Win, t2Won = res.t2Win;
      const hasSnapshot = Object.keys(snap).length > 0;
      return (
        <div onClick={onEdit} style={{
          background: "#FFFFFF", border: "2px solid #1D3557",
          borderRadius: 10, padding: "10px 12px", marginBottom: 8, cursor: "pointer",
        }}>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", gap: 6 }}>
            <div style={{ flex: 1 }}>
              <div style={{ fontSize: 12, fontWeight: t1Won ? 700 : 400, color: t1Won ? "#101711" : "#70839C" }}>{teamNames(match.team1)}</div>
            </div>
            <div style={{ fontSize: 11, fontFamily: "'DM Mono', monospace", color: "#5E4648", textAlign: "center", minWidth: 60 }}>
              {match.games.map((g, i) => <span key={i} style={{ display: "block" }}>{g.t1}-{g.t2}</span>)}
            </div>
            <div style={{ flex: 1, textAlign: "right" }}>
              <div style={{ fontSize: 12, fontWeight: t2Won ? 700 : 400, color: t2Won ? "#101711" : "#70839C" }}>{teamNames(match.team2)}</div>
            </div>
          </div>
          {!hasSnapshot && (
            <div style={{ fontSize: 10, color: "#8798AE", marginTop: 3 }}>ℹ️ Tier mengikuti saat match dimainkan</div>
          )}
        </div>
      );
    }

    // ===== SCORE MODAL =====
    function ScoreModal({ match, players, onClose, onSubmit, onDelete }) {
      const [games, setGames] = React.useState(match.games.length > 0 ? match.games : [{ t1: 0, t2: 0 }]);
      const [team1, setTeam1] = React.useState([...match.team1]);
      const [team2, setTeam2] = React.useState([...match.team2]);
      const playerName = (id) => players.find(p => p.id === id)?.name || "?";
      const teamNames = (ids) => ids.map(playerName);

      const updateScore = (gi, team, val) => {
        const clean = val === "" ? "" : Math.max(0, parseInt(val, 10) || 0);
        setGames(prev => prev.map((g, i) => i === gi ? { ...g, [team]: clean } : g));
      };
      const normalizeGames = () => games.map(g => ({ t1: parseInt(g.t1, 10) || 0, t2: parseInt(g.t2, 10) || 0 }));
      const addGame = () => setGames(prev => [...prev, { t1: 0, t2: 0 }]);
      const removeGame = (gi) => setGames(prev => prev.filter((_, i) => i !== gi));

      return (
        <div style={{ position: "fixed", inset: 0, background: "#000000cc", zIndex: 1500, display: "flex", alignItems: "flex-end", justifyContent: "center" }} onClick={onClose}>
          <div style={{ background: "#FFFFFF", borderRadius: "28px 28px 0 0", padding: 20, width: "100%", maxWidth: 430, border: "2px solid #1D3557", maxHeight: "90vh", overflowY: "auto" }} onClick={e => e.stopPropagation()}>
            <div style={{ fontSize: 15, fontWeight: 700, marginBottom: 12, color: "#101711", textAlign: "center" }}>Input Skor Match</div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 34px 1fr", alignItems: "stretch", gap: 10, background: "#F1FAEE", border: "2px solid #1D3557", borderRadius: 16, padding: "10px 12px", marginBottom: 14 }}>
              <div style={{ minWidth: 0 }}>
                <div style={{ fontSize: 10, color: "#70839C", fontWeight: 800, letterSpacing: "0.08em", marginBottom: 4 }}>TIM A</div>
                <div style={{ display: "flex", flexDirection: "column", gap: 2 }}>
                  {teamNames(team1).map((name, idx) => <div key={idx} style={{ fontSize: 13, color: "#101711", fontWeight: 800, lineHeight: 1.2, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{name}</div>)}
                </div>
              </div>
              <div style={{ display: "flex", alignItems: "center", justifyContent: "center", color: "#1D3557", fontWeight: 900, fontSize: 12 }}>VS</div>
              <div style={{ minWidth: 0, textAlign: "right" }}>
                <div style={{ fontSize: 10, color: "#70839C", fontWeight: 800, letterSpacing: "0.08em", marginBottom: 4 }}>TIM B</div>
                <div style={{ display: "flex", flexDirection: "column", gap: 2, alignItems: "flex-end" }}>
                  {teamNames(team2).map((name, idx) => <div key={idx} style={{ fontSize: 13, color: "#101711", fontWeight: 800, lineHeight: 1.2, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis", maxWidth: "100%" }}>{name}</div>)}
                </div>
              </div>
            </div>
            {games.map((g, i) => (
              <div key={i} style={{ display: "grid", gridTemplateColumns: "48px 78px 18px 78px 24px", alignItems: "center", justifyContent: "center", gap: 8, marginBottom: 10 }}>
                <span style={{ fontSize: 12, color: "#70839C", textAlign: "left" }}>Set {i + 1}</span>
                <input type="number" inputMode="numeric" value={g.t1} onFocus={e => { if (e.target.value === "0") updateScore(i, "t1", ""); }} onBlur={e => { if (e.target.value === "") updateScore(i, "t1", "0"); }} onChange={e => updateScore(i, "t1", e.target.value)} style={{ width: 78, background: "#F1FAEE", border: "2px solid #1D3557", borderRadius: 14, padding: "10px 8px", color: "#101711", fontSize: 18, fontWeight: 800, textAlign: "center", outline: "none", fontFamily: "'DM Mono', monospace" }} />
                <span style={{ color: "#1D3557", fontWeight: 800, textAlign: "center" }}>-</span>
                <input type="number" inputMode="numeric" value={g.t2} onFocus={e => { if (e.target.value === "0") updateScore(i, "t2", ""); }} onBlur={e => { if (e.target.value === "") updateScore(i, "t2", "0"); }} onChange={e => updateScore(i, "t2", e.target.value)} style={{ width: 78, background: "#F1FAEE", border: "2px solid #1D3557", borderRadius: 14, padding: "10px 8px", color: "#101711", fontSize: 18, fontWeight: 800, textAlign: "center", outline: "none", fontFamily: "'DM Mono', monospace" }} />
                <div style={{ width: 24, textAlign: "center" }}>{games.length > 1 && <button onClick={() => removeGame(i)} style={{ background: "none", border: "none", color: "#E63946", cursor: "pointer", fontSize: 16, padding: 0 }}>✕</button>}</div>
              </div>
            ))}
            {games.length < 3 && (
              <button onClick={addGame} style={{ width: "100%", padding: "8px", background: "#10171108", border: "1px dashed #10171120", borderRadius: 8, color: "#5E4648", cursor: "pointer", marginBottom: 12, fontSize: 12 }}>+ Tambah Set</button>
            )}
            <div style={{ display: "flex", gap: 8, marginTop: 8 }}>
              <button onClick={() => onSubmit(normalizeGames(), team1, team2, false)} style={{ flex: 1, padding: "11px", background: "#FFFFFF", border: "2px solid #1D3557", borderRadius: 14, color: "#5A3A3D", fontWeight: 600, cursor: "pointer", fontSize: 13 }}>💾 Simpan</button>
              <button onClick={() => onSubmit(normalizeGames(), team1, team2, true)} style={{ flex: 1, padding: "11px", background: "#E63946", border: "none", borderRadius: 16, color: "#fff", fontWeight: 700, cursor: "pointer", fontSize: 13 }}>✅ Selesai</button>
            </div>
            <button onClick={onDelete} style={{ width: "100%", marginTop: 8, padding: "10px", background: "#FFE9EC20", border: "2px solid #E63946", borderRadius: 10, color: "#C1121F", fontWeight: 600, cursor: "pointer", fontSize: 12 }}>🗑️ Hapus Match Ini</button>
          </div>
        </div>
      );
    }

    // ===== MANUAL MODAL =====
    function ManualModal({ players, courts, selected, setSelected, court, setCourt, onClose, onSubmit }) {
      const toggle = (id) => {
        if (selected.includes(id)) setSelected(selected.filter(x => x !== id));
        else if (selected.length < 4) setSelected([...selected, id]);
      };
      const selectedPlayers = selected.map(id => players.find(p => p.id === id)).filter(Boolean);
      const canPreviewTier = selectedPlayers.length === 2 || selectedPlayers.length === 4;
      const previewT1 = selectedPlayers.length === 2 ? selectedPlayers.slice(0, 1) : selectedPlayers.slice(0, 2);
      const previewT2 = selectedPlayers.length === 2 ? selectedPlayers.slice(1, 2) : selectedPlayers.slice(2, 4);
      const previewW1 = previewT1.reduce((s, p) => s + TIER_WEIGHT[p?.tier || "E"], 0);
      const previewW2 = previewT2.reduce((s, p) => s + TIER_WEIGHT[p?.tier || "E"], 0);
      const previewDiff = Math.abs(previewW1 - previewW2);
      const previewRole = (w, other) => previewDiff === 0 ? "Seimbang" : (w > other ? "Jagoan" : "Underdog");
      const previewRoleColor = (role) => role === "Jagoan" ? "#C1121F" : role === "Underdog" ? "#B07D00" : "#1D3557";
      return (
        <div style={{ position: "fixed", inset: 0, background: "#000000cc", zIndex: 1500, display: "flex", alignItems: "flex-end", justifyContent: "center" }} onClick={onClose}>
          <div style={{ background: "#FFFFFF", borderRadius: "28px 28px 0 0", padding: 20, width: "100%", maxWidth: 430, border: "2px solid #1D3557", maxHeight: "85vh", overflowY: "auto" }} onClick={e => e.stopPropagation()}>
            <div style={{ fontSize: 15, fontWeight: 700, marginBottom: 4, color: "#101711" }}>Buat Match Manual</div>
            <div style={{ fontSize: 12, color: "#70839C", marginBottom: 14 }}>Pilih 2 (single) atau 4 (double) pemain</div>
            <div style={{ display: "flex", gap: 6, marginBottom: 14, flexWrap: "wrap" }}>
              {courts.map(c => (
                <button key={c} onClick={() => setCourt(c)} style={{ padding: "6px 14px", background: court === c ? "#E63946" : "#10171110", border: "none", borderRadius: 8, color: court === c ? "#fff" : "#5E4648", cursor: "pointer", fontWeight: 600, fontSize: 12 }}>Match {c}</button>
              ))}
            </div>
            {players.map(p => (
              <div key={p.id} onClick={() => toggle(p.id)} style={{ display: "flex", alignItems: "center", gap: 10, padding: "10px 12px", background: selected.includes(p.id) ? "#E6394620" : "#10171108", border: `1px solid ${selected.includes(p.id) ? "#E6394660" : "#1017110a"}`, borderRadius: 10, marginBottom: 6, cursor: "pointer" }}>
                <div style={{ width: 20, height: 20, borderRadius: 5, background: selected.includes(p.id) ? "#E63946" : "#10171110", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 11, color: "#fff", fontWeight: 700 }}>
                  {selected.includes(p.id) ? selected.indexOf(p.id) + 1 : ""}
                </div>
                <span style={{ fontSize: 13, color: "#101711", flex: 1 }}>{p.name}</span>
                <TierBadge tier={p.tier} small />
              </div>
            ))}
            {canPreviewTier && (
              <div style={{ background: "#F1FAEE", border: "2px solid #1D3557", borderRadius: 12, padding: "10px 12px", marginTop: 10 }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
                  <div style={{ fontSize: 11, color: "#5E4648", fontWeight: 800, letterSpacing: "0.06em" }}>PREVIEW TIER</div>
                  <div style={{ fontSize: 11, color: previewDiff === 0 ? "#1D3557" : "#B07D00", fontWeight: 800 }}>{previewDiff === 0 ? "⚖ Seimbang" : `${previewDiff} pts tier`}</div>
                </div>
                <div style={{ display: "flex", gap: 8, alignItems: "stretch" }}>
                  <div style={{ flex: 1, background: "#FFFFFF", borderRadius: 10, padding: 10 }}>
                    <div style={{ fontSize: 10, color: "#70839C", fontWeight: 800, marginBottom: 4 }}>TIM A</div>
                    <div style={{ fontSize: 12, color: previewRoleColor(previewRole(previewW1, previewW2)), fontWeight: 800 }}>{previewW1} pts · {previewRole(previewW1, previewW2)}</div>
                    <div style={{ fontSize: 11, color: "#5E4648", marginTop: 5 }}>{previewT1.map(p => p.name).join(" & ")}</div>
                  </div>

                    <div style={{ fontSize: 11, color: "#5E4648", marginTop: 5 }}>{previewT2.map(p => p.name).join(" & ")}</div>

    // ===== SMART PREVIEW MODAL =====
    function SmartPreviewModal({ preview, players, onShuffle, onConfirm, onClose }) {
      const getPlayer = id => players.find(p => p.id === id);
      const [team1, setTeam1] = React.useState([...preview.team1]);
      const [team2, setTeam2] = React.useState([...preview.team2]);
      const [swapping, setSwapping] = React.useState(null); // id being swapped
      const t1Weight = team1.reduce((s, id) => s + TIER_WEIGHT[getPlayer(id)?.tier || "E"], 0);
      const t2Weight = team2.reduce((s, id) => s + TIER_WEIGHT[getPlayer(id)?.tier || "E"], 0);
