                  borderBottom: sessionTab === t.key ? "2px solid #E4574F" : "2px solid transparent",
                }}>
                  <span style={{ display: "inline-flex", alignItems: "center", justifyContent: "center", gap: 3, width: "100%", whiteSpace: "nowrap", lineHeight: 1 }}>
                    <span style={{ flex: "0 0 auto", fontSize: 11 }}>{t.icon}</span>
                    <span style={{ minWidth: 0, overflow: "hidden", textOverflow: "ellipsis" }}>{t.text}</span>
                  </span>
                </button>
              ))}
            </div>
          </div>

          <div style={{ padding: "16px 16px 40px" }}>

            {/* === KLASEMEN ALL TIME TAB === */}
            {sessionTab === "alltime" && (() => {
              const allDoneMatches = matches.filter(m => m.status === "done");
              const allTimeStandings = buildStandings(players, allDoneMatches, new Set(players.map(p => p.id)), false);
              const wow = allTimeStandings[0];
              const sos = allTimeStandings[allTimeStandings.length - 1];
              let mbgAt = null, maxR = 0;
              allTimeStandings.forEach(p => { if (p.totalR > maxR) { maxR = p.totalR; mbgAt = p; } });
              return (
                <div>
                  <div id="alltime-standings-board" style={{ width: "100%", maxWidth: "100%", padding: "12px 0", background: "#FAF7F2", borderRadius: 14, marginBottom: 16, overflow: "hidden" }}>
                  <div style={{ fontFamily: "'Space Grotesk', sans-serif", fontSize: 28, fontWeight: 700, color: "#16232E", textTransform: "uppercase", letterSpacing: "-0.02em", marginBottom: 4 }}>KLASEMEN ALL TIME</div>
                  <div style={{ fontSize: 12, color: "#617181", marginBottom: 16 }}>{sessions.length} sesi · {allDoneMatches.length} total match</div>

                  {allTimeStandings.length === 0 && (
                    <div style={{ textAlign: "center", padding: "32px 16px", color: "#617181", fontSize: 13 }}>
                      <div style={{ fontSize: 32, marginBottom: 8 }}>🏸</div>Belum ada match selesai
                    </div>
                  )}

                  {allTimeStandings.length >= 2 && (
                    <div style={{ marginBottom: 16, display: "flex", flexDirection: "column", gap: 6 }}>
                      <div style={{ background: "linear-gradient(135deg, #9A6A0015, #F0B42915)", border: "1px solid #9A6A0030", borderRadius: 18, padding: "10px 14px" }}>
                        <strong style={{ color: "#9A6A00", fontSize: 14, display: "block", marginBottom: 2 }}>🏆 WOW ALL TIME: {wow?.name}</strong>
                        <span style={{ fontSize: 11, color: "#44515E" }}>(Winner Over Winners) · {wow?.P} pts · {wow?.W}W {wow?.L}L</span>
                      </div>
                      <div style={{ display: "flex", gap: 6 }}>
                        <div style={{ flex: 1, background: "#E4574F15", border: "1px solid #E4574F30", borderRadius: 18, padding: "10px 14px" }}>
                          <strong style={{ color: "#E4574F", fontSize: 13, display: "block", marginBottom: 2 }}>🤡 SOS ALL TIME: {sos?.name}</strong>
                          <span style={{ fontSize: 11, color: "#44515E" }}>(Score Optimization Needed) · {sos?.P} pts</span>
                        </div>
                        {mbgAt && (
                          <div style={{ flex: 1, background: "var(--cr-accent-blue-soft)", border: "1px solid var(--cr-accent-blue-line)", borderRadius: 18, padding: "10px 14px" }}>
                            <strong style={{ color: "#16232E", fontSize: 13, display: "block", marginBottom: 2 }}>📈 MBG ALL TIME: {mbgAt.name}</strong>
                            <span style={{ fontSize: 11, color: "#44515E" }}>(Making Big Gains) · +{mbgAt.totalR}R</span>
                          </div>
                        )}
                      </div>
                    </div>
                  )}

                  {allTimeStandings.length > 0 && (
                    <div style={{ width: "100%", maxWidth: "100%", overflowX: "auto", overflowY: "hidden" }}>
                      <table style={{ width: "100%", minWidth: 398, borderCollapse: "collapse", fontSize: 12, tableLayout: "auto" }}>
                        <thead>
                          <tr style={{ borderBottom: "1px solid #16232E14" }}>
                            {["#", "Pemain", "Tier", "P", "M", "W-D-L", "TS", "Diff", "R"].map((h, i) => (
                              <th key={i} style={{ padding: "6px 6px", color: "#617181", fontWeight: 600, textAlign: i === 1 ? "left" : "center", whiteSpace: "nowrap" }}>{h}</th>
                            ))}
                          </tr>
                        </thead>
                        <tbody>
                          {allTimeStandings.map((p, idx) => {
                            const medal = ["🥇","🥈","🥉"][idx] || "";
                            return (
                              <tr key={p.id} style={{ borderBottom: "1px solid #16232E06", background: idx===0?"#9A6A0008":idx===allTimeStandings.length-1?"#E4574F08":"none" }}>
                                <td style={{ padding: "10px 6px", textAlign: "center" }}>{medal || <span style={{ color: "#617181", fontSize: 11 }}>{idx+1}</span>}</td>
                                <td style={{ padding: "10px 8px", fontSize: 13, fontWeight: 500, whiteSpace: "nowrap", cursor: "pointer" }}
                                  onClick={() => onViewStats && onViewStats(p)}>
                                  <span style={{ borderBottom: "1px dashed #E4574F60" }}>{p.name}</span> <span style={{ fontSize: 10, color: "#E4574F80" }}>📊</span>
                                </td>
                                <td style={{ padding: "10px 6px", textAlign: "center" }}><TierBadge tier={p.tier} small /></td>
                                <td style={{ padding: "10px 6px", textAlign: "center", fontWeight: 900, color: "#E4574F", fontFamily: "'DM Mono', monospace", fontSize: 13 }}>{p.P}</td>
                                <td style={{ padding: "10px 6px", textAlign: "center", color: "#44515E" }}>{p.matchesPlayed}</td>
                                <td style={{ padding: "10px 6px", textAlign: "center", fontFamily: "'DM Mono', monospace", fontWeight: 400 }}><span style={{ color: "#16232E" }}>{p.W}</span><span style={{ color: "#617181" }}>-</span><span style={{ color: "#9A6A00" }}>{p.D}</span><span style={{ color: "#617181" }}>-</span><span style={{ color: "#E4574F" }}>{p.L}</span></td>
                                <td style={{ padding: "10px 6px", textAlign: "center", fontWeight: 400, color: "#44515E", fontFamily: "'DM Mono', monospace" }}>{p.totalFor}</td>
                                <td style={{ padding: "10px 6px", textAlign: "center", fontWeight: 400, color: p.diff>=0?"#16232E":"#E4574F", fontFamily: "'DM Mono', monospace" }}>{p.diff>=0?"+":""}{p.diff}</td>
                                <td style={{ padding: "10px 6px", textAlign: "center", fontWeight: 400, color: "#16232E", fontFamily: "'DM Mono', monospace" }}>{p.totalR > 0 ? `+${p.totalR}` : "—"}</td>
                              </tr>
                            );
                          })}
                        </tbody>
                      </table>
                      <StandingsLegend />
                    </div>
                  )}
                  </div>
                  {allTimeStandings.length > 0 && (
                    <div style={{ display: "flex", gap: 8, marginTop: 8, paddingBottom: 16 }}>
                      <button onClick={handleDownloadAllTimeImage} disabled={allTimeShareBusy !== null} style={{ flex: 1, background: "#FFFFFF", border: "2px solid #16232E", borderRadius: 18, padding: "13px 10px", cursor: allTimeShareBusy !== null ? "default" : "pointer", color: "#44515E", fontWeight: 800, fontSize: 13 }}>{allTimeShareBusy === "download" ? "⏳" : "💾"} Simpan Gambar</button>
                      <button onClick={() => handleShareAllTimeWA(allTimeStandings, allDoneMatches)} disabled={allTimeShareBusy !== null} style={{ flex: 1, background: allTimeShareBusy === "share" ? "#778899" : "linear-gradient(135deg, #16232E, #2D4F80)", border: "none", borderRadius: 12, padding: "13px 10px", cursor: allTimeShareBusy !== null ? "default" : "pointer", color: "#fff", fontWeight: 700, fontSize: 13 }}>{allTimeShareBusy === "share" ? "⏳" : "💬"} Kirim WA</button>
                    </div>
                  )}
                </div>
              );
            })()}

            {/* === STATISTIK TAB === */}
            {sessionTab === "stats" && (
              <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
                <RankingTrendChart players={players} matches={matches} sessions={sessions} />
                <div style={{ fontSize: 13, color: "#617181" }}>Tap nama pemain untuk melihat statistik lengkap</div>
                <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                  {players.map(p => {
                    const allDone = matches.filter(m => m.status === "done" && [...m.team1,...m.team2].includes(p.id));
                    const wins = allDone.filter(m => {
                      const onT1 = m.team1.includes(p.id);
                      const res = calcMatchResult(m, players);
                      return onT1 ? res.t1Win : res.t2Win;
                    }).length;
                    const winRate = allDone.length > 0 ? Math.round((wins/allDone.length)*100) : 0;
                    return (
                      <div key={p.id} onClick={() => onViewStats && onViewStats(p)} style={{
                        display: "flex", alignItems: "center", gap: 12, padding: "12px 14px",
                        background: "#FFFFFF", border: "2px solid #16232E", borderRadius: 12, cursor: "pointer",
                      }}>
                        <div style={{ width: 38, height: 38, borderRadius: 10, background: "linear-gradient(135deg,#E4574F30,#E4574F30)", border: "2px solid #E4574F", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 13, fontWeight: 800, color: "#E4574F" }}>{p.name.slice(0,2).toUpperCase()}</div>
                        <div style={{ flex: 1 }}>
                          <div style={{ fontSize: 13, fontWeight: 600, color: "#16232E" }}>{p.name}</div>
                          <div style={{ fontSize: 11, color: "#617181", marginTop: 1 }}>{allDone.length} match · {wins}W · {winRate}% win rate</div>
                        </div>
                        <TierBadge tier={p.tier} small />
                        <div style={{ textAlign: "right" }}>
                          <div style={{ fontSize: 14, fontWeight: 800, color: winRate >= 50 ? "#16232E" : "#E4574F", fontFamily: "'DM Mono', monospace" }}>{winRate}%</div>
                          <div style={{ fontSize: 9, color: "#778899" }}>win rate</div>
                        </div>
                        <span style={{ color: "#E4574F80", fontSize: 14 }}>›</span>
                      </div>
                    );
                  })}
                  {players.length === 0 && (
                    <div style={{ textAlign: "center", padding: "32px 16px", color: "#617181", fontSize: 13 }}>Belum ada pemain</div>
                  )}
                </div>
              </div>
            )}

            {/* === PLAYERS TAB === */}
            {sessionTab === "players" && (
              <div>
                {!readOnly && <div style={{ background: "#FFFFFF", borderRadius: 22, padding: 16, border: "2px solid #16232E", boxShadow: "3px 3px 0 #16232E", marginBottom: 16 }}>
                  <div style={{ fontSize: 13, fontWeight: 600, color: "#16232E", marginBottom: 12 }}>+ Tambah Pemain</div>
                  <input type="text" placeholder="Nama Pemain..." value={newPlayerName} onChange={e => setNewPlayerName(e.target.value)}
                    onKeyDown={e => e.key === "Enter" && onAddPlayer()}
                    style={{ width: "100%", background: "#FAF7F2", border: "1px solid #16232E20", padding: "12px 14px", borderRadius: 14, color: "#16232E", fontSize: 13, outline: "none", marginBottom: 8 }} />
                  <div style={{ display: "grid", gridTemplateColumns: "1.15fr 0.85fr", gap: 10 }}>
                    <select value={newPlayerTier} onChange={e => setNewPlayerTier(e.target.value)}
                      style={{ flex: 1, background: "#FAF7F2", border: "1px solid #16232E20", padding: "12px", borderRadius: 14, color: "#16232E", fontSize: 13, outline: "none" }}>
                      {Object.keys(TIER_WEIGHT).map(t => <option key={t} value={t}>Tier {t} — {TIER_WEIGHT[t]} pts</option>)}
                    </select>
                    <button onClick={onAddPlayer} style={{ background: "#E4574F", border: "none", borderRadius: 8, padding: "0 20px", color: "#fff", fontWeight: 700, cursor: "pointer" }}>Tambah</button>
                  </div>
                </div>

                }{Object.keys(TIER_WEIGHT).map(tier => {
                  const tp = players.filter(p => p.tier === tier);
                  if (!tp.length) return null;
                  const c = TIER_COLORS[tier];
                  return (
                    <div key={tier} style={{ marginBottom: 14 }}>
                      <div style={{ fontSize: 11, fontWeight: 600, color: c.text, background: c.bg, display: "inline-block", padding: "2px 10px", borderRadius: 6, marginBottom: 8, border: `1px solid ${c.border}` }}>
                        Tier {tier} · {TIER_WEIGHT[tier]} pts · {tp.length} pemain
                      </div>
                      <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
                        {tp.map(p => {
                          const history = (p.tierHistory||[]).filter(h=>h.type!=="init");
                          return (
                            <div key={p.id} style={{ background: "#FFFFFF", border: "2px solid #16232E", borderRadius: 18, padding: "10px 14px" }}>
                              <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                                <div style={{ width: 32, height: 32, borderRadius: 8, background: "#16232E08", border: "1px solid #16232E15", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 11, fontWeight: 700, color: "#617181" }}>{p.name.slice(0,2).toUpperCase()}</div>
                                <div style={{ flex: 1 }}>
                                  <div onClick={() => onViewStats && onViewStats(p)} style={{ fontSize: 13, fontWeight: 600, color: "#16232E", cursor: "pointer", borderBottom: "1px dashed #E4574F40", display: "inline-block" }}>{p.name} <span style={{ fontSize: 10, color: "#E4574F80" }}>📊</span></div>
                                  {history.length > 0 && (
                                    <div style={{ fontSize: 10, color: "#617181", marginTop: 1 }}>
                                      {(history[history.length-1].type === "naik" || history[history.length-1].type === "resmi") ? "🚀" : "🔧"} Tier terakhir diubah di {history[history.length-1].sessionLabel}
                                    </div>
                                  )}
                                </div>
                                <TierBadge tier={p.tier} small />
                                {!readOnly && <button onClick={() => onEditPlayer(p)} style={{ background: "#FFFFFF", border: "2px solid #16232E", color: "#44515E", borderRadius: 6, padding: "4px 10px", fontSize: 11, cursor: "pointer" }}>Edit</button>}
                                {!readOnly && <button onClick={(e) => onDeletePlayer(p.id, p.name, e)} style={{ background: "#FFE9EC30", border: "1px solid #E4574F50", color: "#E4574F", borderRadius: 6, padding: "4px 8px", fontSize: 11, cursor: "pointer" }}>✕</button>}
                              </div>
                              {history.length > 0 && (
                                <div style={{ marginTop: 8, paddingTop: 8, borderTop: "1px solid #16232E08" }}>
                                  <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                                    {history.map((h,i) => (
                                      <span key={i} style={{ fontSize: 10, background: (h.type==="naik"||h.type==="resmi")?"#E4574F15":"#F0B42915", border: `1px solid ${(h.type==="naik"||h.type==="resmi")?"#E4574F30":"#F0B42930"}`, color: (h.type==="naik"||h.type==="resmi")?"#E4574F":"#9A6A00", borderRadius: 6, padding: "2px 7px" }}>
                                        {(h.type==="naik"||h.type==="resmi")?"🚀":"🔧"} {h.from}→{h.to} · {h.sessionLabel}
                                      </span>
                                    ))}
                                  </div>
                                </div>
                              )}
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  );
                })}
                {players.length === 0 && (
                  <div style={{ textAlign: "center", padding: "32px 16px", color: "#617181", fontSize: 13 }}>Belum ada pemain. Tambah pemain di atas!</div>
                )}
              </div>
            )}

            {/* === RULES TAB === */}
            {sessionTab === "rules" && (
              <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
                <div style={{ background: "#FFFFFF", border: "2px solid #E4574F", borderRadius: 16, padding: 16, textAlign: "center", boxShadow: "3px 3px 0 #16232E" }}>
                  <div style={{ fontSize: 12, color: "#E4574F", fontWeight: 850, letterSpacing: "0.06em", marginBottom: 6 }}>RUMUS UTAMA KLASEMEN</div>
                  <div style={{ fontFamily: "'DM Mono', monospace", fontSize: 24, fontWeight: 800, color: "#16232E", lineHeight: 1.15 }}>P = TS + S + R + M</div>
                  <div style={{ fontSize: 12, color: "#334155", marginTop: 8, fontWeight: 650 }}>M hanya berlaku di Klasemen Harian, tidak masuk All Time</div>
                </div>
                {[
                  { code: "TS", color: "#16232E", text: "#FFFFFF", border: "#16232E", label: "Total Poin (Poin Murni)", points: ["Angka murni yang dicetak pemain.", "Diambil dari total poin semua set/game."] },
                  { code: "S", color: "#16232E", text: "#FFFFFF", border: "#16232E", label: "Status Match", points: ["Menang = +3", "Seri/Draw = +1", "Kalah = 0", "Jika jumlah set imbang, total poin lebih besar tetap dihitung menang."] },
                  { code: "R", color: "#FFE1A3", text: "#5A3A00", border: "#9A6A00", label: "Subsidi Tier (Underdog)", points: ["Selisih tier >=200: menang +4, draw/kalah +2", "Selisih tier >=50: menang +2, draw/kalah +1", "Hanya diberikan ke tim underdog."] },
                  { code: "M", color: "#D9E8FF", text: "#123A6B", border: "#16232E", label: "Kompensasi Absen (Harian)", points: ["+10 per match terlewat vs pemain yang paling banyak main.", "Hanya untuk pemain yang check-in di sesi itu.", "Tidak berlaku di Klasemen All Time."] },
                ].map(item => (
                  <div key={item.code} style={{ background: "#FFFFFF", borderRadius: 22, padding: 16, boxShadow: "3px 3px 0 #16232E", border: "2px solid #16232E" }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 10 }}>
                      <span style={{ background: item.color, color: item.text, border: `2px solid ${item.border}`, padding: "4px 9px", borderRadius: 8, fontSize: 12, fontWeight: 900, fontFamily: "'DM Mono', monospace", minWidth: 34, textAlign: "center" }}>{item.code}</span>
                      <span style={{ fontWeight: 800, fontSize: 14, color: "#16232E" }}>{item.label}</span>
                    </div>
                    <div style={{ display: "flex", flexDirection: "column", gap: 7 }}>
                      {item.points.map((point, idx) => (
                        <div key={idx} style={{ display: "grid", gridTemplateColumns: "22px 1fr", gap: 8, alignItems: "start", fontSize: 13, color: "#334155", lineHeight: 1.4 }}>
                          <span style={{ width: 22, height: 22, borderRadius: 999, background: item.color, color: item.text, border: `2px solid ${item.border}`, display: "inline-flex", alignItems: "center", justifyContent: "center", fontSize: 11, fontWeight: 900, fontFamily: "'DM Mono', monospace" }}>{idx + 1}</span>
                          <span>{point}</span>
                        </div>
                      ))}
                    </div>
                  </div>
                ))}
                <div style={{ background: "#FFFFFF", borderRadius: 22, padding: 16, boxShadow: "3px 3px 0 #16232E", border: "2px solid #16232E" }}>
                  <div style={{ fontSize: 12, color: "#16232E", fontWeight: 850, marginBottom: 8, letterSpacing: "0.04em" }}>TIE-BREAKER</div>
                  <div style={{ fontSize: 13, color: "#334155", lineHeight: 1.6 }}>1. DIFF — selisih poin dibuat vs poin lawan<br/>2. W — jumlah kemenangan terbanyak</div>
                </div>
              </div>
            )}

            {/* === SESSIONS TAB === */}
            {sessionTab === "sessions" && <div>
            {/* Sessions list */}
            <div style={{ fontSize: 12, fontWeight: 700, color: "#617181", letterSpacing: "0.06em", textTransform: "uppercase", marginBottom: 10 }}>Riwayat Sesi</div>

            {sessions.length === 0 && (
              <div style={{ textAlign: "center", padding: "32px 16px", background: "#FFFFFF", borderRadius: 22, border: "1px dashed #E4574F30", color: "#617181", fontSize: 13, boxShadow: "3px 3px 0 #16232E" }}>
                Belum ada sesi. Mulai sesi baru!
              </div>
            )}

            {[...sessions].reverse().map((sess, idx) => {
              const stats = getSessionStats(sess);
              const isActive = sess.id === currentSessionId;
              return (
                <div key={sess.id} onClick={() => onSelectSession(sess.id)}
                  style={{
                    background: isActive ? "linear-gradient(135deg, #FFFFFF, #FAF7F2)" : "#FFFFFF",
                    border: `1px solid ${isActive ? "#E4574F60" : "#16232E0a"}`,
                    borderRadius: 22, padding: 18, marginBottom: 14, cursor: "pointer", boxShadow: isActive ? "0 18px 42px #E4574F18" : "0 12px 34px #44515E10",
                    transition: "all 0.15s",
                  }}>
                  {/* Top row */}
                  <div style={{ display: "flex", alignItems: "flex-start", justifyContent: "space-between", marginBottom: 10 }}>
                    <div>
                      <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                        <span style={{ fontWeight: 700, fontSize: 14, color: isActive ? "#E4574F" : "#16232E" }}>{sess.label}</span>
                        {isActive && <span style={{ fontSize: 10, background: "#E4574F40", color: "#E4574F", border: "2px solid #E4574F", borderRadius: 20, padding: "1px 8px", fontWeight: 700 }}>AKTIF</span>}
                      </div>
                      <div style={{ fontSize: 11, color: "#617181", marginTop: 2 }}>{sess.date}</div>
                    </div>
                    <div style={{ textAlign: "right", display: "flex", flexDirection: "column", alignItems: "flex-end", gap: 5 }}>
                      <div>
                        <div style={{ fontSize: 18, fontWeight: 800, color: isActive ? "#E4574F" : "#16232E", fontFamily: "'DM Mono', monospace" }}>{stats.matchCount}</div>
                        <div style={{ fontSize: 10, color: "#617181" }}>match</div>
                      </div>
                    </div>
                  </div>

                  {/* WOW / SOS / MBG / AFK */}
                  {stats.matchCount > 0 && (
                    <div style={{ display: "flex", flexDirection: "column", gap: 5 }}>
                      {stats.wow && (
                        <div style={{ display: "flex", alignItems: "center", gap: 6, background: "#9A6A0010", borderRadius: 8, padding: "5px 10px" }}>
                          <span style={{ fontSize: 13 }}>🏆</span>
                          <span style={{ fontSize: 11, color: "#9A6A00", fontWeight: 700, minWidth: 52 }}>WOW</span>
                          <span style={{ fontSize: 12, color: "#16232E", fontWeight: 600 }}>{stats.wow.name}</span>
                          <span style={{ fontSize: 11, color: "#617181", marginLeft: "auto", fontFamily: "'DM Mono', monospace" }}>{stats.wow.P}pts · {stats.wow.W}W</span>
                        </div>
                      )}
                      {stats.sos && (
                        <div style={{ display: "flex", alignItems: "center", gap: 6, background: "#ef444415", borderRadius: 8, padding: "5px 10px" }}>
                          <span style={{ fontSize: 13 }}>🤡</span>
                          <span style={{ fontSize: 11, color: "#E4574F", fontWeight: 700, minWidth: 52 }}>SOS</span>
                          <span style={{ fontSize: 12, color: "#16232E", fontWeight: 600 }}>{stats.sos.name}</span>
                          <span style={{ fontSize: 11, color: "#617181", marginLeft: "auto", fontFamily: "'DM Mono', monospace" }}>{stats.sos.P}pts · {stats.sos.W}W</span>
                        </div>
                      )}
                      {stats.mbg && (
                        <div style={{ display: "flex", alignItems: "center", gap: 6, background: "var(--cr-accent-blue-soft)", borderRadius: 8, padding: "5px 10px" }}>
                          <span style={{ fontSize: 13 }}>📈</span>
                          <span style={{ fontSize: 11, color: "var(--cr-accent-blue)", fontWeight: 700, minWidth: 52 }}>MBG</span>
                          <span style={{ fontSize: 12, color: "#16232E", fontWeight: 600 }}>{stats.mbg.name}</span>
                          <span style={{ fontSize: 11, color: "#617181", marginLeft: "auto", fontFamily: "'DM Mono', monospace" }}>+{stats.mbg.totalR}R</span>
                        </div>
                      )}
                      {stats.matchCount > 0 && !stats.wow && (
                        <div style={{ fontSize: 12, color: "#778899", textAlign: "center", padding: "4px 0" }}>Belum ada match selesai</div>
                      )}
                    </div>
                  )}

                  {stats.matchCount === 0 && (
                    <div style={{ fontSize: 12, color: "#778899" }}>Belum ada match di sesi ini</div>
                  )}

                  <div style={{ marginTop: 10, fontSize: 11, color: isActive ? "#E4574F" : "#778899", fontWeight: 600, textAlign: "right" }}>
                    {isActive ? "▶ Lanjutkan sesi ini →" : "Tap untuk buka →"}
                  </div>
                </div>
              );
            })}

            {/* New Session Button */}
            {!readOnly && <button onClick={onNewSession} style={{
              width: "100%", padding: "18px", marginTop: sessions.length ? 8 : 16,
              background: "#E4574F",
              border: "none", borderRadius: 16, color: "#fff",
              fontWeight: 700, fontSize: 14, cursor: "pointer",
              boxShadow: "3px 3px 0 #16232E",
              display: "flex", alignItems: "center", justifyContent: "center", gap: 8,
            }}>✨ Mulai Sesi Baru</button>}
            </div>}
          </div>
        </div>
      );
    }

    // ===== WORKSPACE SCREEN =====
    function WorkspaceScreen({ workspaces, onOpen, onCreate, onRename, onReset, onDelete, onShare, onShareBackup, onBackup, onRestore, confirmDialog, setConfirmDialog }) {
      const [creating, setCreating] = React.useState(false);
      const [newName, setNewName] = React.useState("");
      const [renamingId, setRenamingId] = React.useState(null);
      const [renameName, setRenameName] = React.useState("");
      const [shareMenuWs, setShareMenuWs] = React.useState(null);
      const shareBusyRef = React.useRef(false);
      const lastShareTapRef = React.useRef(0);
      const [newEmoji, setNewEmoji] = React.useState("🏸");
      const emojis = ["🏸","🎾","🏓","⚽","🏀","🏐","🥏","🎱"];
      const fmtDate = (ts) => ts ? new Date(ts).toLocaleDateString('id-ID', { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' }) : "-";
      const runShareBackup = (event, ws) => {
        if (event) event.stopPropagation();
        const now = Date.now();
        if (shareBusyRef.current || now - lastShareTapRef.current < 900) return;
        shareBusyRef.current = true;
        lastShareTapRef.current = now;
        setTimeout(() => { shareBusyRef.current = false; }, 1200);
        if (!ws) {
          window.alert("Arena tidak ditemukan. Tutup panel Bagikan lalu coba lagi.");
          return;
        }
        if (typeof onShareBackup !== "function") {
          window.alert("Fitur Backup JSON belum siap. Coba refresh halaman.");
          return;
        }
        onShareBackup(ws);
        setShareMenuWs(null);
      };
      return (
        <div style={{ minHeight: "100dvh", background: "var(--cr-bg)", color: "var(--cr-ink)", maxWidth: 430, margin: "0 auto", padding: "calc(20px + var(--cr-safe-top)) 16px calc(40px + var(--cr-safe-bottom))" }}>
          <div style={{ display: "flex", alignItems: "flex-start", justifyContent: "space-between", marginBottom: 24 }}>
            <div>
              <div style={{ display: "flex", alignItems: "baseline", gap: 0, fontFamily: "'Space Grotesk', sans-serif", fontStyle: "normal", fontSize: 32, fontWeight: 700, lineHeight: 1, letterSpacing: "0", textTransform: "uppercase" }}>
                <span style={{ color: "#E4574F" }}>COURT</span><span style={{ color: "#E4574F", WebkitTextStroke: "0.8px #E4574F", textStroke: "0.8px #E4574F" }}>RANK</span>
              </div>
              <div style={{ fontFamily: "'Space Grotesk', sans-serif", fontSize: 22, fontWeight: 700, marginTop: 24, color: "var(--cr-line)", textTransform: "uppercase", lineHeight: 1.15 }}>Pilih Arena</div>
              <div style={{ fontSize: 14, color: "var(--cr-muted)", marginTop: 6, lineHeight: 1.45, maxWidth: 300 }}>Pilih arena untuk melanjutkan aktivitasmu hari ini.</div>
            </div>

          </div>

          {workspaces.length === 0 && !creating && (
            <div style={{ textAlign: "center", padding: "32px 16px", background: "#FFFFFF", borderRadius: 22, border: "1px dashed #E4574F35", boxShadow: "3px 3px 0 #16232E", marginBottom: 20 }}>
              <div style={{ fontSize: 32, marginBottom: 12 }}>👋</div>
              <div style={{ fontWeight: 600, color: "#16232E", marginBottom: 6 }}>Belum ada Arena</div>
              <div style={{ fontSize: 13, color: "#617181" }}>Buat Arena baru untuk mulai, atau buka link Bagikan dari teman</div>
            </div>
          )}

          <div style={{ display: "flex", flexDirection: "column", gap: 12, marginBottom: 16 }}>
            {[...workspaces].sort((a, b) => (b.updatedAt || 0) - (a.updatedAt || 0)).map(ws => (
              <div key={ws.id} style={{ background: "var(--cr-surface)", border: "2px solid var(--cr-line)", borderRadius: 22, padding: 16, boxShadow: "var(--cr-shadow-hard)" }}>
                <div style={{ display: "flex", alignItems: "center", gap: 14, marginBottom: 16 }}>
                  <div style={{ width: 40, height: 40, borderRadius: 14, background: "var(--cr-primary)", boxShadow: "0 8px 18px rgba(228, 87, 79,0.22)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 18, flex: "0 0 auto" }}>{ws.emoji}</div>
                  <div onClick={() => { if (!ws.readOnly) { setRenamingId(ws.id); setRenameName(ws.name); } }} title={ws.readOnly ? "Arena lihat saja" : "Tap untuk rename Arena"} style={{ flex: 1, minWidth: 0, cursor: ws.readOnly ? "default" : "pointer", padding: "4px 2px", borderRadius: 12 }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 6, fontWeight: 800, fontSize: 17, color: "#16232E", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}><span style={{ overflow: "hidden", textOverflow: "ellipsis" }}>{ws.name}</span>{!ws.readOnly && <span style={{ fontSize: 11, color: "#44515E", flex: "0 0 auto" }}>✎</span>}</div>
                    <div style={{ fontSize: 12, color: "#44515E", marginTop: 4, lineHeight: 1.35 }}>Update: {fmtDate(ws.updatedAt)}</div>
                    {ws.readOnly && (
                      <div style={{ display: "inline-flex", alignItems: "center", gap: 4, marginTop: 6, background: "#16232E12", border: "1px solid #16232E35", color: "#16232E", borderRadius: 999, padding: "3px 8px", fontSize: 10, fontWeight: 900 }}>
                        🔒 Lihat saja
                      </div>
                    )}
                  </div>
                  <button onClick={() => onOpen(ws)} style={{ background: "var(--cr-primary)", border: "2px solid var(--cr-line)", color: "#fff", borderRadius: 16, padding: "14px 24px", fontSize: 15, fontWeight: 850, cursor: "pointer", boxShadow: "var(--cr-shadow-hard)", minWidth: 96 }}>Buka</button>
                </div>
                <div style={{ height: 1, background: "#16232E10", marginBottom: 12 }} />
                <div style={{ display: "grid", gridTemplateColumns: "1fr", gap: 8, marginBottom: 8 }}>
                  <button onClick={() => setShareMenuWs(ws)} style={{ background: "var(--cr-tertiary)", border: "2px solid var(--cr-line)", color: "var(--cr-ink)", borderRadius: 16, padding: "12px 10px", fontSize: 13, fontWeight: 900, cursor: "pointer" }}>↗ Bagikan</button>
                </div>
                <div style={{ display: "grid", gridTemplateColumns: ws.readOnly ? "1fr" : "1fr 1fr 1fr", gap: 8 }}>
                  {!ws.readOnly && <button onClick={() => onRestore(ws)} style={{ background: "#FFFFFF", border: "2px solid #16232E", color: "#44515E", borderRadius: 16, padding: "10px 4px", fontSize: 11, fontWeight: 800, cursor: "pointer" }}>⇣ Load</button>}

                  {!ws.readOnly && <button onClick={() => onReset(ws.id)} style={{ background: "#FFFFFF", border: "2px solid #16232E", color: "#44515E", borderRadius: 16, padding: "10px 4px", fontSize: 11, fontWeight: 800, cursor: "pointer" }}>↻ Reset</button>}
                  <button onClick={() => onDelete(ws.id)} style={{ background: "#FFE9EC", border: "2px solid #E4574F", color: "#E4574F", borderRadius: 16, padding: "10px 4px", fontSize: 11, fontWeight: 850, cursor: "pointer" }}>⌫ Hapus</button>
                </div>
              </div>
            ))}
          </div>


          {shareMenuWs && (
            <div onClick={() => setShareMenuWs(null)} style={{ position: "fixed", inset: 0, background: "#16232E66", zIndex: 40, display: "flex", alignItems: "flex-end", justifyContent: "center", padding: 18 }}>
              <div onClick={(e) => e.stopPropagation()} style={{ width: "100%", maxWidth: 390, background: "#FFFFFF", border: "2px solid #16232E", borderRadius: 24, padding: 18, boxShadow: "3px 3px 0 #16232E" }}>
                <div style={{ fontFamily: "'Space Grotesk', sans-serif", fontSize: 24, fontWeight: 800, color: "#16232E", textTransform: "uppercase", marginBottom: 4 }}>Bagikan Arena</div>
                <div style={{ fontSize: 13, color: "#44515E", lineHeight: 1.45, marginBottom: 14 }}>{shareMenuWs.name}</div>
                <div style={{ display: "grid", gap: 10 }}>
                  <button onClick={() => { const ws = shareMenuWs; setShareMenuWs(null); onShare(ws); }} style={{ background: "#F0B429", border: "2px solid #16232E", color: "#16232E", borderRadius: 16, padding: "13px 12px", fontSize: 13, fontWeight: 900, cursor: "pointer", textAlign: "left" }}>↗ Bagikan Link<br /><span style={{ fontSize: 11, fontWeight: 700, color: "#44515E" }}>Untuk buka data lewat link. Cocok kalau datanya belum terlalu besar.</span></button>
                  <button type="button" onTouchEnd={(e) => runShareBackup(e, shareMenuWs)} onClick={(e) => runShareBackup(e, shareMenuWs)} style={{ background: "#FFFFFF", border: "2px solid #16232E", color: "#16232E", borderRadius: 16, padding: "13px 12px", fontSize: 13, fontWeight: 900, cursor: "pointer", textAlign: "left", touchAction: "manipulation" }}>📦 Backup JSON / WA<br /><span style={{ fontSize: 11, fontWeight: 700, color: "#44515E" }}>Buat file JSON lengkap, lalu bisa dikirim via WhatsApp. Paling aman untuk pindah HP atau backup tahunan.</span></button>
                </div>
                <button onClick={() => setShareMenuWs(null)} style={{ width: "100%", marginTop: 12, background: "#FAF7F2", border: "1px solid #16232E35", color: "#44515E", borderRadius: 14, padding: "11px", fontSize: 12, fontWeight: 850, cursor: "pointer" }}>Batal</button>
              </div>
            </div>
          )}

          {!creating ? (
            <button onClick={() => setCreating(true)} style={{ width: "100%", padding: "18px", background: "#FAF7F2", border: "2px dashed #E4574F30", borderRadius: 22, color: "#44515E", fontWeight: 850, fontSize: 14, cursor: "pointer", minHeight: 104 }}>
              + Buat Arena Baru
            </button>
          ) : (
            <div style={{ background: "#FFFFFF", border: "2px solid #E4574F", borderRadius: 22, padding: 20, boxShadow: "3px 3px 0 #16232E" }}>
              <div style={{ fontWeight: 700, marginBottom: 14, fontSize: 14 }}>Arena Baru</div>
              <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 12 }}>
                {emojis.map(e => (
                  <button key={e} onClick={() => setNewEmoji(e)} style={{ fontSize: 22, background: newEmoji === e ? "#E4574F40" : "#16232E08", border: `1px solid ${newEmoji === e ? "#E4574F80" : "transparent"}`, borderRadius: 16, padding: "8px 12px", cursor: "pointer" }}>{e}</button>
                ))}
              </div>
              <input value={newName} onChange={e => setNewName(e.target.value)} placeholder="Nama (misal: Badminton GBK, Padel Jumat...)"
                style={{ width: "100%", background: "#FAF7F2", border: "1px solid #16232E20", borderRadius: 14, padding: "12px 14px", color: "#16232E", fontSize: 13, outline: "none", marginBottom: 12 }} />
              <div style={{ display: "flex", gap: 8 }}>
                <button onClick={() => setCreating(false)} style={{ flex: 1, padding: "11px", background: "#16232E10", border: "none", borderRadius: 10, color: "#16232E", fontWeight: 600, cursor: "pointer" }}>Batal</button>
                <button onClick={() => { if (newName.trim()) { onCreate(newName.trim(), newEmoji); setCreating(false); setNewName(""); }}} style={{ flex: 1, padding: "11px", background: "#E4574F", border: "none", borderRadius: 16, color: "#fff", fontWeight: 700, cursor: "pointer" }}>Buat</button>
              </div>
            </div>
          )}

          {renamingId && (
            <div style={{ position: "fixed", inset: 0, background: "#000000cc", zIndex: 1500, display: "flex", alignItems: "center", justifyContent: "center", padding: 20 }} onClick={() => setRenamingId(null)}>
              <div style={{ background: "#FFFFFF", borderRadius: 16, padding: 20, width: "100%", maxWidth: 320, border: "2px solid #16232E" }} onClick={e => e.stopPropagation()}>
                <div style={{ fontSize: 16, fontWeight: 800, marginBottom: 12, color: "#16232E" }}>Rename Arena</div>
                <input value={renameName} onChange={e => setRenameName(e.target.value)} autoFocus style={{ width: "100%", background: "#FAF7F2", border: "1px solid #16232E20", borderRadius: 14, padding: "12px 14px", color: "#16232E", fontSize: 13, outline: "none", marginBottom: 14 }} />
                <div style={{ display: "flex", gap: 8 }}>
                  <button onClick={() => setRenamingId(null)} style={{ flex: 1, padding: "11px", background: "#16232E10", border: "none", borderRadius: 10, color: "#16232E", fontWeight: 600, cursor: "pointer" }}>Batal</button>
                  <button onClick={() => { onRename(renamingId, renameName); setRenamingId(null); }} style={{ flex: 1, padding: "11px", background: "#E4574F", border: "none", borderRadius: 16, color: "#fff", fontWeight: 700, cursor: "pointer" }}>Simpan</button>
                </div>
              </div>
            </div>
          )}
          {confirmDialog && (
            <div style={{ position: "fixed", inset: 0, background: "#000000cc", zIndex: 1500, display: "flex", alignItems: "flex-end", justifyContent: "center", padding: "20px 16px calc(20px + var(--cr-safe-bottom))" }} onClick={() => setConfirmDialog(null)}>
              <div style={{ background: "var(--cr-surface)", borderRadius: "24px 24px 18px 18px", padding: 20, width: "100%", maxWidth: 390, border: "2px solid var(--cr-line)", textAlign: "center", boxShadow: "var(--cr-shadow-hard)" }} onClick={e => e.stopPropagation()}>
                <div style={{ fontSize: 16, fontWeight: 700, marginBottom: 12, color: confirmDialog.isDanger ? "#E4574F" : "#16232E" }}>{confirmDialog.title}</div>
                <div style={{ fontSize: 13, color: "#44515E", marginBottom: 24, lineHeight: 1.5 }}>{confirmDialog.message}</div>
                <div style={{ display: "flex", gap: 10 }}>
                  <button onClick={() => setConfirmDialog(null)} style={{ flex: 1, padding: "12px", borderRadius: 10, background: "#16232E10", border: "none", color: "#16232E", fontWeight: 600, cursor: "pointer" }}>{confirmDialog.cancelText || "Batal"}</button>
                  <button onClick={confirmDialog.onConfirm} style={{ flex: 1, padding: "12px", borderRadius: 10, background: confirmDialog.isDanger ? "#FFE9EC" : "#E4574F", border: confirmDialog.isDanger ? "1px solid #E4574F45" : "none", color: confirmDialog.isDanger ? "#E4574F" : "#FFFFFF", fontWeight: 600, cursor: "pointer" }}>{confirmDialog.confirmText || (confirmDialog.isDanger ? "Hapus" : "OK")}</button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    // ===== GIST MODAL =====
    function GistModal({ token, setToken, gistId, setGistId, onSave, onRestore, onClose }) {
      const [localToken, setLocalToken] = React.useState(token);
      const [localGistId, setLocalGistId] = React.useState(gistId);
      const [showToken, setShowToken] = React.useState(false);
      return (
        <div style={{ position: "fixed", inset: 0, background: "#000000dd", zIndex: 1500, display: "flex", alignItems: "flex-end", justifyContent: "center" }} onClick={onClose}>
          <div style={{ background: "#FFFFFF", borderRadius: "28px 28px 0 0", padding: 20, width: "100%", maxWidth: 430, border: "2px solid #16232E", maxHeight: "90vh", overflowY: "auto" }} onClick={e => e.stopPropagation()}>
            <div style={{ fontSize: 15, fontWeight: 700, marginBottom: 4 }}>☁️ GitHub Gist Backup</div>
            <div style={{ fontSize: 12, color: "#617181", marginBottom: 16, lineHeight: 1.5 }}>
              Simpan & pulihkan data ke GitHub Gist. Data tersimpan di akun GitHub kamu — aman & privat.
              <br/><a href="https://github.com/settings/tokens/new?scopes=gist" target="_blank" style={{ color: "#E4574F" }}>Buat token di sini (centang "gist")</a>
            </div>
            <div style={{ fontSize: 12, color: "#44515E", marginBottom: 4, fontWeight: 600 }}>GitHub Token</div>
            <div style={{ display: "flex", gap: 6, marginBottom: 12 }}>
              <input type={showToken ? "text" : "password"} value={localToken} onChange={e => setLocalToken(e.target.value)} placeholder="ghp_xxxxxxxxxxxx"
                style={{ flex: 1, background: "#FAF7F2", border: "1px solid #16232E20", borderRadius: 14, padding: "11px 14px", color: "#16232E", fontSize: 12, outline: "none" }} />
              <button onClick={() => setShowToken(p => !p)} style={{ background: "#16232E10", border: "none", borderRadius: 8, padding: "0 12px", color: "#44515E", cursor: "pointer", fontSize: 13 }}>{showToken ? "🙈" : "👁"}</button>
            </div>
            <div style={{ fontSize: 12, color: "#44515E", marginBottom: 4, fontWeight: 600 }}>Gist ID <span style={{ color: "#778899", fontWeight: 400 }}>(kosongkan untuk buat baru)</span></div>
            <input value={localGistId} onChange={e => setLocalGistId(e.target.value)} placeholder="xxxxxxxxxxxxxxxx"
              style={{ width: "100%", background: "#FAF7F2", border: "1px solid #16232E20", borderRadius: 14, padding: "11px 14px", color: "#16232E", fontSize: 12, outline: "none", marginBottom: 16 }} />
            <div style={{ display: "flex", gap: 8 }}>
              <button onClick={() => { setToken(localToken); setGistId(localGistId); onRestore(localToken, localGistId); }} style={{ flex: 1, padding: "11px", background: "#FFFFFF", border: "2px solid #16232E", borderRadius: 14, color: "#44515E", fontWeight: 600, cursor: "pointer", fontSize: 13 }}>⬇ Restore</button>
              <button onClick={() => { setToken(localToken); setGistId(localGistId); onSave(localToken, localGistId); onClose(); }} style={{ flex: 1, padding: "11px", background: "#E4574F", border: "none", borderRadius: 16, color: "#fff", fontWeight: 700, cursor: "pointer", fontSize: 13 }}>⬆ Simpan ke Gist</button>
            </div>
            {localGistId && <div style={{ marginTop: 10, fontSize: 11, color: "#617181", textAlign: "center" }}>Gist ID: <a href={`https://gist.github.com/${localGistId}`} target="_blank" style={{ color: "#E4574F" }}>{localGistId}</a></div>}
          </div>
        </div>
      );
    }

    const root = createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
