                              </div>
                              <span style={{ fontSize: 11, color: pct >= 50 ? "#16232E" : "#E4574F", fontWeight: 700, minWidth: 36 }}>{pct}%</span>
                              <span style={{ fontSize: 10, color: "#778899", minWidth: 40 }}>{ts.w}W {ts.l}L</span>
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  )}

                  {/* Session trend */}
                  {h2h.sessTrend.length > 1 && (
                    <div style={{ background: "#FFFFFF", border: "2px solid #16232E", borderRadius: 18, padding: "10px 14px", marginBottom: 10 }}>
                      <div style={{ fontSize: 11, color: "#44515E", fontWeight: 700, letterSpacing: "0.06em", marginBottom: 8 }}>📈 TREN POIN PER SESI</div>
                      <div style={{ display: "flex", gap: 4, alignItems: "flex-end", height: 40 }}>
                        {(() => {
                          const maxPts = Math.max(...h2h.sessTrend.map(s => s.pts), 1);
                          return h2h.sessTrend.map((s, i) => (
                            <div key={i} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: 2 }}>
                              <div style={{ width: "100%", height: `${Math.max(4, (s.pts / maxPts) * 32)}px`, background: i === h2h.sessTrend.length - 1 ? "linear-gradient(180deg, #E4574F,#E4574F)" : "#16232E20", borderRadius: "3px 3px 0 0", transition: "height 0.4s" }} />
                              <div style={{ fontSize: 8, color: "#778899", textAlign: "center", lineHeight: 1 }}>{s.label.replace("Sesi ", "S")}</div>
                            </div>
                          ));
                        })()}
                      </div>
                    </div>
                  )}

                  <div style={{ fontSize: 12, fontWeight: 700, color: "#617181", marginBottom: 8, letterSpacing: "0.06em" }}>REKOR LAWAN</div>
                  {Object.entries(h2h.opponentStats).length === 0 && (
                    <div style={{ fontSize: 12, color: "#778899", textAlign: "center", padding: 16 }}>Belum ada data head-to-head</div>
                  )}
                  {Object.entries(h2h.opponentStats).map(([oid, stat]) => {
                    const opp = getPlayer(parseInt(oid));
                    if (!opp) return null;
                    const total = stat.w + stat.l + stat.d;
                    const winPct = total > 0 ? Math.round((stat.w / total) * 100) : 0;
                    return (
                      <div key={oid} style={{ display: "flex", alignItems: "center", gap: 10, padding: "8px 12px", background: "#FAF7F2", borderRadius: 8, marginBottom: 6 }}>
                        <TierBadge tier={opp.tier} small />
                        <span style={{ flex: 1, fontSize: 13, color: "#16232E" }}>{opp.name}</span>
                        <span style={{ fontSize: 12, color: "#16232E", fontFamily: "'DM Mono', monospace" }}>{stat.w}W</span>
                        {stat.d > 0 && <span style={{ fontSize: 12, color: "#9A6A00", fontFamily: "'DM Mono', monospace" }}>{stat.d}D</span>}
                        <span style={{ fontSize: 12, color: "#E4574F", fontFamily: "'DM Mono', monospace" }}>{stat.l}L</span>
                        <span style={{ fontSize: 11, color: winPct >= 50 ? "#16232E" : "#E4574F", fontWeight: 700, minWidth: 36, textAlign: "right" }}>{winPct}%</span>
                      </div>
                    );
                  })}
                  <button onClick={() => setH2hPlayer(null)} style={{ width: "100%", marginTop: 12, padding: "12px", background: "#16232E10", border: "none", borderRadius: 10, color: "#16232E", fontWeight: 600, cursor: "pointer" }}>Tutup</button>
                </div>
              </div>
            );
          })()}

          {!readOnly && smartPreview && (
            <SmartPreviewModal
              preview={smartPreview}
              players={players}
              onShuffle={handleShuffleSmartMatch}
              onConfirm={handleConfirmSmartMatch}
              onManual={(t1, t2) => handleConfirmSmartMatch(t1, t2)}
              onClose={() => setSmartPreview(null)}
            />
          )}

          {showGistModal && (
            <GistModal
              token={githubToken} setToken={setGithubToken}
              gistId={githubGistId} setGistId={setGithubGistId}
              onSave={handleSaveToGist}
              onRestore={handleRestoreFromGist}
              onClose={() => setShowGistModal(false)}
            />
          )}

          {!readOnly && scoreModal && (
            <ScoreModal
              match={scoreModal} players={players}
              onClose={() => setScoreModal(null)}
              onSubmit={(games, t1, t2, finish) => handleSubmitScore(scoreModal.id, games, t1, t2, finish)}
              onDelete={() => handleDeleteMatch(scoreModal.id)}
            />
          )}

          {!readOnly && manualModal && (
            <ManualModal
              players={availablePlayers}
              courts={courts.filter(c => !occupiedCourts.has(c))}
              selected={manualSelected} setSelected={setManualSelected}
              court={manualCourt} setCourt={setManualCourt}
              onClose={() => { setManualModal(false); setManualSelected([]); }}
              onSubmit={handleManualMatch}
            />
          )}

          {editingPlayer && (
            <EditPlayerModal
              player={editingPlayer}
              currentSessionId={currentSessionId}
              currentSessionLabel={sessions.find(s=>s.id===currentSessionId)?.label||"Sesi ini"}
              onClose={() => setEditingPlayer(null)}
              onSave={(id, newName, newTier, changeType) => {
                const player = players.find(p => p.id === id);
                const tierChanged = player && newTier !== player.tier;
                setPlayers(prev => prev.map(p => {
                  if (p.id !== id) return p;
                  const updated = { ...p, name: newName, tier: newTier };
                  if (tierChanged) {
                    const histEntry = {
                      from: p.tier, to: newTier,
                      sessionId: currentSessionId,
                      sessionLabel: sessions.find(s=>s.id===currentSessionId)?.label||"Sesi ini",
                      date: new Date().toLocaleDateString('id-ID',{day:'numeric',month:'short',year:'numeric'}),
                      type: changeType, // "koreksi" | "resmi"
                    };
                    updated.tierHistory = [...(p.tierHistory||[]), histEntry];
                  }
                  return updated;
                }));
                // If koreksi: patch tierSnapshot on all matches this session
                if (tierChanged && changeType === "koreksi") {
                  setMatches(prev => prev.map(m => {
                      const firstSessionId = sessions[0]?.id || "s1";
                    const isCurrentSessionMatch = m.sessionId === currentSessionId || (!m.sessionId && currentSessionId === firstSessionId);
                    if (!isCurrentSessionMatch) return m;
                    if (![...m.team1, ...m.team2].includes(id)) return m;
                    return { ...m, tierSnapshot: { ...(m.tierSnapshot||{}), [id]: newTier } };
                  }));
                  showNotify(`Koreksi tier ${player.tier}→${newTier} diterapkan ke semua match sesi ini`);
                } else if (tierChanged) {
                  showNotify(`${newName} resmi berubah tier ${player.tier}→${newTier} mulai match berikutnya`);
                } else {
                  showNotify("Data pemain berhasil diperbarui!");
                }
                setEditingPlayer(null);
              }}
            />
          )}

          {notify && (
            <div style={{
              position: "fixed", bottom: 80, left: "50%", transform: "translateX(-50%)",
              background: notify.type === "error" ? "#FFE9EC" : "#14532d",
              border: `1px solid ${notify.type === "error" ? "#E4574F" : "#166534"}`,
              color: notify.type === "error" ? "#E4574F" : "#86efac",
              padding: "10px 20px", borderRadius: 10, fontSize: 13, fontWeight: 500,
              zIndex: 1000, whiteSpace: "nowrap", boxShadow: "0 4px 24px #00000060",
            }}>{notify.msg}</div>
          )}

          {confirmDialog && (
            <div style={{
              position: "fixed", inset: 0, background: "#000000cc",
              zIndex: 1500, display: "flex", alignItems: "center", justifyContent: "center",
              padding: 20
            }} onClick={() => setConfirmDialog(null)}>
              <div style={{
                background: "#FFFFFF", borderRadius: 16, padding: 24, width: "100%", maxWidth: 320,
                border: "2px solid #16232E", textAlign: "center",
                boxShadow: "0 10px 40px #00000080"
              }} onClick={e => e.stopPropagation()}>
                <div style={{ fontSize: 16, fontWeight: 700, marginBottom: 12, color: confirmDialog.isDanger ? "#E4574F" : "#16232E" }}>
                  {confirmDialog.title}
                </div>
                <div style={{ fontSize: 13, color: "#44515E", marginBottom: 24, lineHeight: 1.5 }}>
                  {confirmDialog.message}
                </div>
                <div style={{ display: "flex", gap: 10 }}>
                  <button onClick={() => setConfirmDialog(null)} style={{
                    flex: 1, padding: "12px", borderRadius: 10, background: "#16232E10",
                    border: "none", color: "#16232E", fontWeight: 600, cursor: "pointer", fontFamily: "'DM Sans', sans-serif"
                  }}>Batal</button>
                  <button onClick={confirmDialog.onConfirm} style={{
                    flex: 1, padding: "12px", borderRadius: 10,
                    background: confirmDialog.isDanger ? "#FFE9EC" : "linear-gradient(135deg, #E4574F, #E4574F)",
                    border: "none", color: "#fff", fontWeight: 600, cursor: "pointer", fontFamily: "'DM Sans', sans-serif"
                  }}>Yakin</button>
                </div>
              </div>
            </div>
          )}
        </div>
      );    }

    // ===== MATCH CARD COMPONENTS =====
    function TierMatchStatus({ match, players, compact = false }) {
      const res = calcMatchResult(match, players);
      const diff = Math.abs((res.tw1 || 0) - (res.tw2 || 0));
      const t1Role = diff === 0 ? "Seimbang" : (res.tw1 > res.tw2 ? "Jagoan" : "Underdog");
      const t2Role = diff === 0 ? "Seimbang" : (res.tw2 > res.tw1 ? "Jagoan" : "Underdog");
      const roleColor = (role) => role === "Jagoan" ? "#E4574F" : role === "Underdog" ? "#9A6A00" : "#16232E";
      const roleBg = (role) => role === "Jagoan" ? "#E4574F12" : role === "Underdog" ? "#F0B42918" : "#16232E12";
      const roleBorder = (role) => role === "Jagoan" ? "#E4574F40" : role === "Underdog" ? "#F0B42955" : "#16232E35";
      const chip = (label, weight, role) => (
        <div style={{
          flex: 1, minWidth: 0, background: roleBg(role), border: `1px solid ${roleBorder(role)}`,
          borderRadius: compact ? 8 : 10, padding: compact ? "4px 6px" : "6px 8px", textAlign: "center"
        }}>
          <div style={{ fontSize: compact ? 9 : 10, color: "#617181", fontWeight: 800, letterSpacing: "0.04em" }}>{label}</div>
          <div style={{ fontSize: compact ? 10 : 11, color: roleColor(role), fontWeight: 900, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>
            {weight} pts · {role}
          </div>
        </div>
      );
      return (
        <div style={{ display: "flex", alignItems: "center", gap: 6, margin: compact ? "8px 0 0" : "0 0 10px" }}>
          {chip("TIM A", res.tw1 || 0, t1Role)}
          <div style={{
            flex: "0 0 auto", minWidth: compact ? 42 : 54, textAlign: "center", fontSize: compact ? 10 : 11,
            color: diff === 0 ? "#16232E" : "#44515E", fontWeight: 900,
            background: "#FFFFFF", border: "1px solid #16232E30", borderRadius: 999, padding: compact ? "4px 5px" : "5px 7px"
          }}>
            {diff === 0 ? "=" : diff}
          </div>
          {chip("TIM B", res.tw2 || 0, t2Role)}
        </div>
      );
    }

    function MatchCard({ match, players, onScore }) {
      const getPlayer = id => players.find(p => p.id === id);
      const teamNames = (ids) => ids.map(id => getPlayer(id)?.name || "?").join(" & ");
      const canEdit = Boolean(onScore);
      const [draftGames, setDraftGames] = React.useState((match.games && match.games.length > 0) ? match.games.map(g => ({ t1: g.t1, t2: g.t2 })) : [{ t1: 0, t2: 0 }]);
      React.useEffect(() => {
        setDraftGames((match.games && match.games.length > 0) ? match.games.map(g => ({ t1: g.t1, t2: g.t2 })) : [{ t1: 0, t2: 0 }]);
      }, [match.id, JSON.stringify(match.games || [])]);
      const normalizeGames = (games = draftGames) => games.map(g => ({ t1: Number(g?.t1) || 0, t2: Number(g?.t2) || 0 }));
      const commitGames = (games, finish = false) => {
        if (!canEdit) return;
        onScore(match.id, normalizeGames(games), finish);
      };
      const updateScore = (gi, team, val) => {
        if (!canEdit) return;
        const clean = val === "" ? "" : Math.max(0, parseInt(val, 10) || 0);
        setDraftGames(prev => {
          const next = prev.map((g, i) => i === gi ? { ...g, [team]: clean } : g);
          commitGames(next, false);
          return next;
        });
      };
      const addGame = () => setDraftGames(prev => {
        const next = [...prev, { t1: 0, t2: 0 }];
        commitGames(next, false);
        return next;
      });
      const removeGame = (gi) => setDraftGames(prev => {
        const next = prev.filter((_, i) => i !== gi);
        const safeNext = next.length ? next : [{ t1: 0, t2: 0 }];
        commitGames(safeNext, false);
        return safeNext;
      });
      const totals = normalizeGames().reduce((acc,g)=>({ t1: acc.t1 + g.t1, t2: acc.t2 + g.t2 }), { t1: 0, t2: 0 });
      return (
        <div>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
            <div style={{ textAlign: "center", flex: 1 }}>
              <div style={{ fontSize: 13, fontWeight: 600, color: "#16232E", marginBottom: 2 }}>{teamNames(match.team1)}</div>
              <div style={{ display: "flex", gap: 4, justifyContent: "center" }}>
                {match.team1.map(id => getPlayer(id)?.tier).filter(Boolean).map((t, i) => <TierBadge key={i} tier={t} small />)}
              </div>
            </div>
            <div style={{ fontSize: 12, fontWeight: 700, color: "#617181", padding: "0 10px" }}>VS</div>
            <div style={{ textAlign: "center", flex: 1 }}>
              <div style={{ fontSize: 13, fontWeight: 600, color: "#16232E", marginBottom: 2 }}>{teamNames(match.team2)}</div>
              <div style={{ display: "flex", gap: 4, justifyContent: "center" }}>
                {match.team2.map(id => getPlayer(id)?.tier).filter(Boolean).map((t, i) => <TierBadge key={i} tier={t} small />)}
              </div>
            </div>
          </div>
          <TierMatchStatus match={match} players={players} />
          <div style={{ display: "flex", flexDirection: "column", gap: 8, marginBottom: 10 }}>
            {draftGames.map((g, i) => (
              <div key={i} style={{ display: "grid", gridTemplateColumns: "42px 1fr 14px 1fr 24px", alignItems: "center", gap: 6 }}>
                <span style={{ fontSize: 11, color: "#617181" }}>Set {i + 1}</span>
                <input type="number" inputMode="numeric" disabled={!canEdit} value={g.t1} onFocus={e => { if (e.target.value === "0") updateScore(i, "t1", ""); }} onBlur={e => { if (e.target.value === "") updateScore(i, "t1", "0"); }} onChange={e => updateScore(i, "t1", e.target.value)} style={{ width: "100%", background: "#FAF7F2", border: "2px solid #16232E", borderRadius: 12, padding: "8px 4px", color: "#16232E", fontSize: 16, fontWeight: 800, textAlign: "center", outline: "none", fontFamily: "'DM Mono', monospace" }} />
                <span style={{ textAlign: "center", color: "#16232E", fontWeight: 800 }}>-</span>
                <input type="number" inputMode="numeric" disabled={!canEdit} value={g.t2} onFocus={e => { if (e.target.value === "0") updateScore(i, "t2", ""); }} onBlur={e => { if (e.target.value === "") updateScore(i, "t2", "0"); }} onChange={e => updateScore(i, "t2", e.target.value)} style={{ width: "100%", background: "#FAF7F2", border: "2px solid #16232E", borderRadius: 12, padding: "8px 4px", color: "#16232E", fontSize: 16, fontWeight: 800, textAlign: "center", outline: "none", fontFamily: "'DM Mono', monospace" }} />
                <div style={{ textAlign: "center" }}>{canEdit && draftGames.length > 1 && <button onClick={() => removeGame(i)} style={{ background: "none", border: "none", color: "#E4574F", cursor: "pointer", fontSize: 15, padding: 0 }}>✕</button>}</div>
              </div>
            ))}
          </div>
          <div style={{ display: "grid", gridTemplateColumns: draftGames.length < 3 ? "1fr 1fr" : "1fr", gap: 8 }}>
            {canEdit && draftGames.length < 3 && <button onClick={addGame} style={{ padding: "9px", background: "#FFFFFF", border: "2px dashed #16232E60", borderRadius: 12, color: "#44515E", fontWeight: 800, fontSize: 12, cursor: "pointer" }}>+ Set</button>}
            {canEdit && <button onClick={() => commitGames(draftGames, true)} style={{ padding: "9px", background: "#E4574F", border: "none", borderRadius: 12, color: "#fff", fontWeight: 800, fontSize: 12, cursor: "pointer" }}>✅ Selesai ({totals.t1}-{totals.t2})</button>}
          </div>
        </div>
      );
    }
    function DoneMatchCard({ match, players, onEdit }) {
      const getPlayer = id => players.find(p => p.id === id);
      const snap = match.tierSnapshot || {};
      const teamNames = (ids) => ids.map(id => {
        const p = getPlayer(id);
        if (!p) return "?";
        const snapTier = snap[id];
        const tierChanged = snapTier && snapTier !== p.tier;
        return tierChanged ? `${p.name} (${snapTier}→${p.tier})` : p.name;
      }).join(" & ");
      const res = calcMatchResult(match, players);
      const t1Won = res.t1Win, t2Won = res.t2Win;
      const hasSnapshot = Object.keys(snap).length > 0;
      return (
        <div onClick={onEdit || undefined} style={{
          background: "#FFFFFF", border: "2px solid #16232E",
          borderRadius: 10, padding: "10px 12px", marginBottom: 8, cursor: onEdit ? "pointer" : "default",
        }}>
          <div style={{ display: "grid", gridTemplateColumns: "minmax(0,1fr) auto minmax(0,1fr)", alignItems: "center", gap: 8 }}>
            <div style={{ minWidth: 0 }}>
              <div style={{ fontSize: 13, fontWeight: t1Won ? 850 : 650, color: t1Won ? "#16232E" : "#617181", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{teamNames(match.team1)}</div>
            </div>
            <div style={{ minWidth: 56, textAlign: "center", padding: "2px 6px", borderRadius: 10, background: "transparent", border: "none" }}>
              {match.games.map((g, i) => <div key={i} style={{ fontSize: match.games.length > 1 ? 12 : 15, lineHeight: match.games.length > 1 ? 1.1 : 1, fontFamily: "'DM Mono', monospace", color: "#16232E", fontWeight: 900 }}>{g.t1}-{g.t2}</div>)}
            </div>
            <div style={{ minWidth: 0, textAlign: "right" }}>
              <div style={{ fontSize: 13, fontWeight: t2Won ? 850 : 650, color: t2Won ? "#16232E" : "#617181", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{teamNames(match.team2)}</div>
            </div>
          </div>
          <TierMatchStatus match={match} players={players} compact />
          {!hasSnapshot && (
            <div style={{ fontSize: 10, color: "#778899", marginTop: 3 }}>ℹ️ Tier mengikuti saat match dimainkan</div>
          )}
        </div>
      );
    }

    // ===== SCORE MODAL =====
    function ScoreModal({ match, players, onClose, onSubmit, onDelete }) {
      const [games, setGames] = React.useState(match.games.length > 0 ? match.games : [{ t1: 0, t2: 0 }]);
      const [team1, setTeam1] = React.useState([...match.team1]);
      const [team2, setTeam2] = React.useState([...match.team2]);
      const playerName = (id) => players.find(p => p.id === id)?.name || "?";
      const teamNames = (ids) => ids.map(playerName);

      const updateScore = (gi, team, val) => {
        const clean = val === "" ? "" : Math.max(0, parseInt(val, 10) || 0);
        setGames(prev => prev.map((g, i) => i === gi ? { ...g, [team]: clean } : g));
      };
      const normalizeGames = () => games.map(g => ({ t1: parseInt(g.t1, 10) || 0, t2: parseInt(g.t2, 10) || 0 }));
      const addGame = () => setGames(prev => [...prev, { t1: 0, t2: 0 }]);
      const removeGame = (gi) => setGames(prev => prev.filter((_, i) => i !== gi));

      return (
        <div style={{ position: "fixed", inset: 0, background: "#000000cc", zIndex: 1500, display: "flex", alignItems: "flex-end", justifyContent: "center" }} onClick={onClose}>
          <div style={{ background: "#FFFFFF", borderRadius: "28px 28px 0 0", padding: 20, width: "100%", maxWidth: 430, border: "2px solid #16232E", maxHeight: "90vh", overflowY: "auto" }} onClick={e => e.stopPropagation()}>
            <div style={{ fontSize: 15, fontWeight: 700, marginBottom: 12, color: "#16232E", textAlign: "center" }}>Input Poin Match</div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 34px 1fr", alignItems: "stretch", gap: 10, background: "#FAF7F2", border: "2px solid #16232E", borderRadius: 16, padding: "10px 12px", marginBottom: 14 }}>
              <div style={{ minWidth: 0 }}>
                <div style={{ fontSize: 10, color: "#617181", fontWeight: 800, letterSpacing: "0.08em", marginBottom: 4 }}>TIM A</div>
                <div style={{ display: "flex", flexDirection: "column", gap: 2 }}>
                  {teamNames(team1).map((name, idx) => <div key={idx} style={{ fontSize: 13, color: "#16232E", fontWeight: 800, lineHeight: 1.2, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{name}</div>)}
                </div>
              </div>
              <div style={{ display: "flex", alignItems: "center", justifyContent: "center", color: "#16232E", fontWeight: 900, fontSize: 12 }}>VS</div>
              <div style={{ minWidth: 0, textAlign: "right" }}>
                <div style={{ fontSize: 10, color: "#617181", fontWeight: 800, letterSpacing: "0.08em", marginBottom: 4 }}>TIM B</div>
                <div style={{ display: "flex", flexDirection: "column", gap: 2, alignItems: "flex-end" }}>
                  {teamNames(team2).map((name, idx) => <div key={idx} style={{ fontSize: 13, color: "#16232E", fontWeight: 800, lineHeight: 1.2, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis", maxWidth: "100%" }}>{name}</div>)}
                </div>
              </div>
            </div>
            {games.map((g, i) => (
              <div key={i} style={{ display: "grid", gridTemplateColumns: "48px 78px 18px 78px 24px", alignItems: "center", justifyContent: "center", gap: 8, marginBottom: 10 }}>
                <span style={{ fontSize: 12, color: "#617181", textAlign: "left" }}>Set {i + 1}</span>
                <input type="number" inputMode="numeric" value={g.t1} onFocus={e => { if (e.target.value === "0") updateScore(i, "t1", ""); }} onBlur={e => { if (e.target.value === "") updateScore(i, "t1", "0"); }} onChange={e => updateScore(i, "t1", e.target.value)} style={{ width: 78, background: "#FAF7F2", border: "2px solid #16232E", borderRadius: 14, padding: "10px 8px", color: "#16232E", fontSize: 18, fontWeight: 800, textAlign: "center", outline: "none", fontFamily: "'DM Mono', monospace" }} />
                <span style={{ color: "#16232E", fontWeight: 800, textAlign: "center" }}>-</span>
                <input type="number" inputMode="numeric" value={g.t2} onFocus={e => { if (e.target.value === "0") updateScore(i, "t2", ""); }} onBlur={e => { if (e.target.value === "") updateScore(i, "t2", "0"); }} onChange={e => updateScore(i, "t2", e.target.value)} style={{ width: 78, background: "#FAF7F2", border: "2px solid #16232E", borderRadius: 14, padding: "10px 8px", color: "#16232E", fontSize: 18, fontWeight: 800, textAlign: "center", outline: "none", fontFamily: "'DM Mono', monospace" }} />
                <div style={{ width: 24, textAlign: "center" }}>{games.length > 1 && <button onClick={() => removeGame(i)} style={{ background: "none", border: "none", color: "#E4574F", cursor: "pointer", fontSize: 16, padding: 0 }}>✕</button>}</div>
              </div>
            ))}
            {games.length < 3 && (
              <button onClick={addGame} style={{ width: "100%", padding: "8px", background: "#16232E08", border: "1px dashed #16232E20", borderRadius: 8, color: "#44515E", cursor: "pointer", marginBottom: 12, fontSize: 12 }}>+ Tambah Set</button>
            )}
            <div style={{ display: "flex", gap: 8, marginTop: 8 }}>
              <button onClick={() => onSubmit(normalizeGames(), team1, team2, false)} style={{ flex: 1, padding: "11px", background: "#FFFFFF", border: "2px solid #16232E", borderRadius: 14, color: "#44515E", fontWeight: 600, cursor: "pointer", fontSize: 13 }}>💾 Simpan</button>
              <button onClick={() => onSubmit(normalizeGames(), team1, team2, true)} style={{ flex: 1, padding: "11px", background: "#E4574F", border: "none", borderRadius: 16, color: "#fff", fontWeight: 700, cursor: "pointer", fontSize: 13 }}>✅ Selesai</button>
            </div>
            <button onClick={onDelete} style={{ width: "100%", marginTop: 8, padding: "10px", background: "#FFE9EC20", border: "2px solid #E4574F", borderRadius: 10, color: "#E4574F", fontWeight: 600, cursor: "pointer", fontSize: 12 }}>🗑️ Hapus Match Ini</button>
          </div>
        </div>
      );
    }

    // ===== MANUAL MODAL =====
    function ManualModal({ players, courts, selected, setSelected, court, setCourt, onClose, onSubmit }) {
      const toggle = (id) => {
        if (selected.includes(id)) setSelected(selected.filter(x => x !== id));
        else if (selected.length < 4) setSelected([...selected, id]);
      };
      const selectedPlayers = selected.map(id => players.find(p => p.id === id)).filter(Boolean);
      const canPreviewTier = selectedPlayers.length === 2 || selectedPlayers.length === 4;
      const previewT1 = selectedPlayers.length === 2 ? selectedPlayers.slice(0, 1) : selectedPlayers.slice(0, 2);
      const previewT2 = selectedPlayers.length === 2 ? selectedPlayers.slice(1, 2) : selectedPlayers.slice(2, 4);
      const previewW1 = previewT1.reduce((s, p) => s + TIER_WEIGHT[p?.tier || "E"], 0);
      const previewW2 = previewT2.reduce((s, p) => s + TIER_WEIGHT[p?.tier || "E"], 0);
      const previewDiff = Math.abs(previewW1 - previewW2);
      const previewRole = (w, other) => previewDiff === 0 ? "Seimbang" : (w > other ? "Jagoan" : "Underdog");
      const previewRoleColor = (role) => role === "Jagoan" ? "#E4574F" : role === "Underdog" ? "#9A6A00" : "#16232E";
      return (
        <div style={{ position: "fixed", inset: 0, background: "#000000cc", zIndex: 1500, display: "flex", alignItems: "flex-end", justifyContent: "center" }} onClick={onClose}>
          <div style={{ background: "#FFFFFF", borderRadius: "28px 28px 0 0", padding: 20, width: "100%", maxWidth: 430, border: "2px solid #16232E", maxHeight: "85vh", overflowY: "auto" }} onClick={e => e.stopPropagation()}>
            <div style={{ fontSize: 15, fontWeight: 700, marginBottom: 4, color: "#16232E" }}>Buat Match Manual</div>
            <div style={{ fontSize: 12, color: "#617181", marginBottom: 14 }}>Pilih 2 (single) atau 4 (double) pemain</div>
            <div style={{ display: "flex", gap: 6, marginBottom: 14, flexWrap: "wrap" }}>
              {courts.map(c => (
                <button key={c} onClick={() => setCourt(c)} style={{ padding: "6px 14px", background: court === c ? "#E4574F" : "#16232E10", border: "none", borderRadius: 8, color: court === c ? "#fff" : "#44515E", cursor: "pointer", fontWeight: 600, fontSize: 12 }}>Match {c}</button>
              ))}
            </div>
            {players.map(p => (
              <div key={p.id} onClick={() => toggle(p.id)} style={{ display: "flex", alignItems: "center", gap: 10, padding: "10px 12px", background: selected.includes(p.id) ? "#E4574F20" : "#16232E08", border: `1px solid ${selected.includes(p.id) ? "#E4574F60" : "#16232E0a"}`, borderRadius: 10, marginBottom: 6, cursor: "pointer" }}>
                <div style={{ width: 20, height: 20, borderRadius: 5, background: selected.includes(p.id) ? "#E4574F" : "#16232E10", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 11, color: "#fff", fontWeight: 700 }}>
                  {selected.includes(p.id) ? selected.indexOf(p.id) + 1 : ""}
                </div>
                <span style={{ fontSize: 13, color: "#16232E", flex: 1 }}>{p.name}</span>
                <TierBadge tier={p.tier} small />
              </div>
            ))}
            {canPreviewTier && (
              <div style={{ background: "#FAF7F2", border: "2px solid #16232E", borderRadius: 12, padding: "10px 12px", marginTop: 10 }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
                  <div style={{ fontSize: 11, color: "#44515E", fontWeight: 800, letterSpacing: "0.06em" }}>PREVIEW TIER</div>
                  <div style={{ fontSize: 11, color: previewDiff === 0 ? "#16232E" : "#9A6A00", fontWeight: 800 }}>{previewDiff === 0 ? "⚖ Seimbang" : `${previewDiff} pts tier`}</div>
                </div>
                <div style={{ display: "flex", gap: 8, alignItems: "stretch" }}>
                  <div style={{ flex: 1, background: "#FFFFFF", borderRadius: 10, padding: 10 }}>
                    <div style={{ fontSize: 10, color: "#617181", fontWeight: 800, marginBottom: 4 }}>TIM A</div>
                    <div style={{ fontSize: 12, color: previewRoleColor(previewRole(previewW1, previewW2)), fontWeight: 800 }}>{previewW1} pts · {previewRole(previewW1, previewW2)}</div>
                    <div style={{ fontSize: 11, color: "#44515E", marginTop: 5 }}>{previewT1.map(p => p.name).join(" & ")}</div>
                  </div>
                  <div style={{ flex: 1, background: "#FFFFFF", borderRadius: 10, padding: 10 }}>
                    <div style={{ fontSize: 10, color: "#617181", fontWeight: 800, marginBottom: 4 }}>TIM B</div>
                    <div style={{ fontSize: 12, color: previewRoleColor(previewRole(previewW2, previewW1)), fontWeight: 800 }}>{previewW2} pts · {previewRole(previewW2, previewW1)}</div>
                    <div style={{ fontSize: 11, color: "#44515E", marginTop: 5 }}>{previewT2.map(p => p.name).join(" & ")}</div>
                  </div>
                </div>
              </div>
            )}
            <button onClick={onSubmit} style={{ width: "100%", marginTop: 12, padding: "13px", background: "#E4574F", border: "none", borderRadius: 16, color: "#fff", fontWeight: 700, cursor: "pointer", fontSize: 14 }}>🎯 Mulai Match</button>
          </div>
        </div>
      );
    }

    // ===== EDIT PLAYER MODAL =====
    function EditPlayerModal({ player, currentSessionId, currentSessionLabel, onClose, onSave }) {
      const [name, setName] = React.useState(player.name);
      const [tier, setTier] = React.useState(player.tier);
      const [changeType, setChangeType] = React.useState("resmi");
      const tierChanged = tier !== player.tier;
      const history = (player.tierHistory || []).filter(h => h.type !== "init");

      return (
        <div style={{ position: "fixed", inset: 0, background: "#000000cc", zIndex: 1500, display: "flex", alignItems: "flex-end", justifyContent: "center" }} onClick={onClose}>
          <div style={{ background: "#FFFFFF", borderRadius: "28px 28px 0 0", padding: 20, width: "100%", maxWidth: 430, border: "2px solid #16232E", maxHeight: "90vh", overflowY: "auto" }} onClick={e => e.stopPropagation()}>
            <div style={{ fontSize: 15, fontWeight: 700, marginBottom: 14, color: "#16232E" }}>Edit Pemain</div>

            <input value={name} onChange={e => setName(e.target.value)} style={{ width: "100%", background: "#FAF7F2", border: "1px solid #16232E20", borderRadius: 14, padding: "12px 14px", color: "#16232E", fontSize: 13, outline: "none", marginBottom: 10 }} />

            <select value={tier} onChange={e => { setTier(e.target.value); }} style={{ width: "100%", background: "#FAF7F2", border: `1px solid ${tierChanged ? "#F0B42960" : "#16232E20"}`, borderRadius: 14, padding: "12px", color: "#16232E", fontSize: 13, outline: "none", marginBottom: tierChanged ? 10 : 0 }}>
              {Object.keys(TIER_WEIGHT).map(t => <option key={t} value={t}>Tier {t} — {TIER_WEIGHT[t]} pts</option>)}
            </select>

            {tierChanged && (
              <div style={{ marginBottom: 14 }}>
                <div style={{ fontSize: 11, color: "#44515E", marginBottom: 6, fontWeight: 600 }}>Alasan perubahan Tier {player.tier} → {tier}:</div>
                <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
                  <div onClick={() => setChangeType("koreksi")} style={{ display: "flex", gap: 10, padding: "10px 12px", background: changeType === "koreksi" ? "#F0B42915" : "#16232E08", border: `1px solid ${changeType === "koreksi" ? "#F0B42960" : "#16232E0a"}`, borderRadius: 10, cursor: "pointer" }}>
                    <div style={{ width: 16, height: 16, borderRadius: "50%", border: `2px solid ${changeType === "koreksi" ? "#F0B429" : "#778899"}`, marginTop: 1, flexShrink: 0, background: changeType === "koreksi" ? "#F0B429" : "none" }} />
                    <div>
                      <div style={{ fontSize: 13, fontWeight: 600, color: changeType === "koreksi" ? "#9A6A00" : "#16232E" }}>🔧 Koreksi — Salah Input</div>
                      <div style={{ fontSize: 11, color: "#617181", marginTop: 2 }}>Semua match di {currentSessionLabel} dikoreksi pakai tier baru. Tidak dicatat sebagai kenaikan.</div>
                    </div>
                  </div>
                  <div onClick={() => setChangeType("resmi")} style={{ display: "flex", gap: 10, padding: "10px 12px", background: changeType === "resmi" ? "#E4574F15" : "#16232E08", border: `1px solid ${changeType === "resmi" ? "#E4574F60" : "#16232E0a"}`, borderRadius: 10, cursor: "pointer" }}>
                    <div style={{ width: 16, height: 16, borderRadius: "50%", border: `2px solid ${changeType === "resmi" ? "#E4574F" : "#778899"}`, marginTop: 1, flexShrink: 0, background: changeType === "resmi" ? "#E4574F" : "none" }} />
                    <div>
                      <div style={{ fontSize: 13, fontWeight: 600, color: changeType === "resmi" ? "#E4574F" : "#16232E" }}>🚀 Perubahan Resmi</div>
                      <div style={{ fontSize: 11, color: "#617181", marginTop: 2 }}>Match lama tetap memakai tier saat match dibuat. Tier baru mulai dipakai match berikutnya.</div>
                    </div>
                  </div>
                </div>
              </div>
            )}

            {history.length > 0 && (
              <div style={{ background: "#FAF7F2", border: "2px solid #16232E", borderRadius: 10, padding: "10px 12px", marginBottom: 14 }}>
                <div style={{ fontSize: 11, color: "#617181", fontWeight: 700, marginBottom: 6, letterSpacing: "0.06em" }}>RIWAYAT TIER</div>
                {history.map((h, i) => (
                  <div key={i} style={{ display: "flex", alignItems: "center", gap: 8, fontSize: 11, color: "#44515E", padding: "3px 0", borderBottom: i < history.length - 1 ? "1px solid #16232E08" : "none" }}>
                    <span style={{ color: h.type === "koreksi" ? "#9A6A00" : "#E4574F" }}>{h.type === "koreksi" ? "🔧" : "🚀"}</span>
                    <span style={{ fontFamily: "'DM Mono', monospace" }}>{h.from}→{h.to}</span>
                    <span style={{ color: "#778899" }}>·</span>
                    <span>{h.sessionLabel}</span>
                    <span style={{ color: "#778899", marginLeft: "auto" }}>{h.date}</span>
                  </div>
                ))}
              </div>
            )}

            <div style={{ display: "flex", gap: 8, marginTop: 4 }}>
              <button onClick={onClose} style={{ flex: 1, padding: "12px", borderRadius: 10, background: "#16232E10", border: "none", color: "#16232E", fontWeight: 600, cursor: "pointer" }}>Batal</button>
              <button onClick={() => onSave(player.id, name.trim(), tier, changeType)} style={{ flex: 1, padding: "12px", borderRadius: 10, background: "#E4574F", border: "none", color: "#fff", fontWeight: 600, cursor: "pointer" }}>Simpan</button>
            </div>
          </div>

    }

    // ===== SMART PREVIEW MODAL =====
    function SmartPreviewModal({ preview, players, onShuffle, onConfirm, onClose }) {
      const getPlayer = id => players.find(p => p.id === id);
      const [team1, setTeam1] = React.useState([...preview.team1]);
      const [team2, setTeam2] = React.useState([...preview.team2]);
      const [swapping, setSwapping] = React.useState(null); // id being swapped
      const t1Weight = team1.reduce((s, id) => s + TIER_WEIGHT[getPlayer(id)?.tier || "E"], 0);
      const t2Weight = team2.reduce((s, id) => s + TIER_WEIGHT[getPlayer(id)?.tier || "E"], 0);
      const diff = Math.abs(t1Weight - t2Weight);
      const t1Role = diff === 0 ? "Seimbang" : (t1Weight > t2Weight ? "Jagoan" : "Underdog");
      const t2Role = diff === 0 ? "Seimbang" : (t2Weight > t1Weight ? "Jagoan" : "Underdog");
      const roleColor = (role) => role === "Jagoan" ? "#E4574F" : role === "Underdog" ? "#9A6A00" : "#16232E";
      const balanceText = diff === 0 ? "⚖ Seimbang" : `${diff} pts tier`;

      const handleTap = (id) => {
        if (!swapping) { setSwapping(id); return; }
        if (swapping === id) { setSwapping(null); return; }
        // Swap the two tapped players between teams
        const newT1 = team1.map(x => x === swapping ? id : x === id ? swapping : x);
        const newT2 = team2.map(x => x === swapping ? id : x === id ? swapping : x);
        setTeam1(newT1); setTeam2(newT2); setSwapping(null);
      };

      const handleShuffle = () => {
        setSwapping(null);
        onShuffle(team1, team2);
      };

      React.useEffect(() => {
        setTeam1([...preview.team1]); setTeam2([...preview.team2]);
      }, [preview.team1.join(), preview.team2.join()]);

      const TeamBlock = ({ ids, label, weight, role }) => (
        <div style={{ flex: 1 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", gap: 6, marginBottom: 6 }}>
            <div style={{ fontSize: 10, fontWeight: 700, color: "#617181", letterSpacing: "0.06em" }}>{label}</div>
            <div style={{ fontSize: 10, color: roleColor(role), fontWeight: 800, fontFamily: "'DM Mono', monospace" }}>{weight} · {role}</div>
          </div>
          {ids.map(id => {
            const p = getPlayer(id);
            const isSwapping = swapping === id;
            return (
              <div key={id} onClick={() => handleTap(id)} style={{
                display: "flex", alignItems: "center", gap: 8, padding: "8px 10px",
                background: isSwapping ? "#F0B42920" : "#16232E08",
                border: `1px solid ${isSwapping ? "#F0B42980" : swapping ? "#E4574F40" : "#16232E0a"}`,
                borderRadius: 10, marginBottom: 6, cursor: "pointer", transition: "all 0.15s",
              }}>
                <div style={{ width: 28, height: 28, borderRadius: 7, background: isSwapping ? "#F0B42920" : "#16232E08", border: `1px solid ${isSwapping ? "#F0B42960" : "#16232E15"}`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 10, fontWeight: 700, color: isSwapping ? "#9A6A00" : "#617181" }}>
                  {p?.name.slice(0,2).toUpperCase()}
                </div>
                <span style={{ fontSize: 13, fontWeight: 600, color: isSwapping ? "#9A6A00" : "#16232E", flex: 1 }}>{p?.name}</span>
                <TierBadge tier={p?.tier} small />
                {isSwapping && <span style={{ fontSize: 10, color: "#9A6A00" }}>⇄</span>}
              </div>
            );
          })}
        </div>
      );

      return (
        <div style={{ position: "fixed", inset: 0, background: "#000000dd", zIndex: 1500, display: "flex", alignItems: "flex-end", justifyContent: "center" }} onClick={onClose}>
          <div style={{ background: "#FFFFFF", borderRadius: "28px 28px 0 0", padding: 20, width: "100%", maxWidth: 430, border: "2px solid #E4574F" }} onClick={e => e.stopPropagation()}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 4 }}>
              <div style={{ fontWeight: 700, fontSize: 15, color: "#16232E" }}>⚡ Smart Match — Lapangan {preview.court}</div>
              <div style={{ fontSize: 11, color: diff === 0 ? "#16232E" : diff <= 10 ? "#9A6A00" : "#E4574F", fontWeight: 700, background: diff === 0 ? "#16232E15" : diff <= 10 ? "#9A6A0015" : "#E4574F15", padding: "3px 8px", borderRadius: 6, border: `1px solid ${diff === 0 ? "#16232E30" : diff <= 10 ? "#9A6A0030" : "#E4574F30"}` }}>
                {balanceText}
              </div>
            </div>
            <div style={{ fontSize: 12, color: "#617181", marginBottom: 10 }}>
              {swapping ? "Tap pemain lain untuk tukar posisi" : "Tap dua pemain untuk tukar tim · atau acak ulang"}
            </div>

            <div style={{ display: "flex", gap: 8, alignItems: "center", justifyContent: "space-between", background: "#FAF7F2", border: "2px solid #16232E", borderRadius: 10, padding: "8px 10px", marginBottom: 12 }}>
              <div style={{ fontSize: 11, color: roleColor(t1Role), fontWeight: 800 }}>Tim A: {t1Weight} pts · {t1Role}</div>
              <div style={{ fontSize: 10, color: "#617181", fontWeight: 700 }}>vs</div>
              <div style={{ fontSize: 11, color: roleColor(t2Role), fontWeight: 800, textAlign: "right" }}>Tim B: {t2Weight} pts · {t2Role}</div>
            </div>

            <div style={{ display: "flex", gap: 10, marginBottom: 16 }}>
              <TeamBlock ids={team1} label="TIM A" weight={t1Weight} role={t1Role} />
              <div style={{ display: "flex", alignItems: "center", color: "#617181", fontSize: 13, fontWeight: 700, paddingTop: 20 }}>VS</div>
              <TeamBlock ids={team2} label="TIM B" weight={t2Weight} role={t2Role} />
            </div>

            <div style={{ display: "flex", gap: 8 }}>
              <button onClick={handleShuffle} style={{ flex: 1, padding: "12px", background: "#FFFFFF", border: "2px solid #16232E", borderRadius: 14, color: "#44515E", fontWeight: 700, fontSize: 13, cursor: "pointer" }}>🔀 Acak Ulang</button>
              <button onClick={() => onConfirm(team1, team2)} style={{ flex: 2, padding: "12px", background: "#E4574F", border: "none", borderRadius: 16, color: "#fff", fontWeight: 800, fontSize: 14, cursor: "pointer" }}>✅ Mulai Match!</button>
            </div>
          </div>
        </div>
      );
    }


    // ===== PLAYER STATS SCREEN =====
    function PlayerStatsScreen({ player, players, matches, sessions, currentSessionId, initialMode = "alltime", showModeSwitch = false, onBack }) {
      const [mode, setMode] = React.useState(initialMode); // "alltime" | "session"
      const [trendRange, setTrendRange] = React.useState(12); // 12 | 24 | "all"
      const [playerStatsShareBusy, setPlayerStatsShareBusy] = React.useState(null);
      const playerStatsRef = React.useRef(null);
      React.useEffect(() => setMode(initialMode), [initialMode, player.id]);
      const getPlayer = id => players.find(p => p.id === id);

      const getPlayerStatsBlob = async () => {
        const el = playerStatsRef.current;
        if (!el || !window.html2canvas) throw new Error("Statistik pemain belum siap");
        const originalCss = el.style.cssText;
        el.style.width = "430px";
        el.style.maxWidth = "430px";
        const canvas = await window.html2canvas(el, { backgroundColor: "#FAF7F2", scale: 2, useCORS: true });
        el.style.cssText = originalCss;
        return new Promise(resolve => canvas.toBlob(resolve, "image/jpeg", 0.9));
      };

      const handleDownloadPlayerStats = async () => {
        setPlayerStatsShareBusy("download");
        try {
          const blob = await getPlayerStatsBlob();
          const safeName = player.name.replace(/[^a-z0-9]+/gi, "-").replace(/^-|-$/g, "") || "Pemain";
          const url = URL.createObjectURL(blob);
          const a = document.createElement("a");
          a.href = url;
          a.download = `Statistik-${safeName}-CourtRank-${new Date().toISOString().slice(0, 10)}.jpg`;
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          URL.revokeObjectURL(url);
        } catch (e) {
          console.error(e);
        }
        setPlayerStatsShareBusy(null);
      };

      const handleSharePlayerStatsWA = async () => {
        setPlayerStatsShareBusy("share");
        try {
          const blob = await getPlayerStatsBlob();
          const file = new File([blob], "statistik-pemain.jpg", { type: "image/jpeg" });
          const modeLabel = mode === "alltime" ? "All Time" : "Sesi Ini";
          let textMsg = `📊 *STATISTIK PEMAIN COURTRANK*\n\n`;
          textMsg += `${player.name} · Tier ${player.tier} · ${modeLabel}\n`;
          textMsg += `${stats.total} match · ${stats.wins}W ${stats.draws}D ${stats.losses}L\n`;
          textMsg += `Win Rate ${stats.winRate}% · ${stats.totalPts} pts · Diff ${stats.totalFor - stats.totalAgainst >= 0 ? "+" : ""}${stats.totalFor - stats.totalAgainst}`;
          if (navigator.canShare && navigator.canShare({ files: [file] })) {
            await navigator.share({ title: `Statistik ${player.name}`, text: textMsg, files: [file] });
          } else {
            window.open(`https://wa.me/?text=${encodeURIComponent(textMsg)}`, "_blank");
          }
        } catch (e) {
          if (e.name !== "AbortError") console.error(e);
        }
        setPlayerStatsShareBusy(null);
      };

      const computeStats = (pid, matchPool) => {
        const done = matchPool.filter(m => m.status === "done" && [...m.team1,...m.team2].includes(pid));
        const sorted = [...done].sort((a,b) => a.id.localeCompare(b.id));

        let wins=0, losses=0, draws=0, totalFor=0, totalAgainst=0, totalPts=0, totalR=0;
        let streak=0, streakType=null, maxWin=0, maxLose=0, curWin=0, curLose=0;
        const opponentStats={}, partnerStats={}, tierStats={};

        sorted.forEach(m => {
          const onT1 = m.team1.includes(pid);
          const myTeam = onT1 ? m.team1 : m.team2;
          const oppTeam = onT1 ? m.team2 : m.team1;
          const res = calcMatchResult(m, players);
          const won = onT1 ? res.t1Win : res.t2Win;
          const lost = onT1 ? res.t2Win : res.t1Win;
          const myScore = onT1 ? res.t1Score : res.t2Score;
          const oppScore = onT1 ? res.t2Score : res.t1Score;
          const S = onT1 ? res.t1S : res.t2S;
          const R = onT1 ? res.t1R : res.t2R;

          totalFor += myScore; totalAgainst += oppScore;
          totalPts += myScore + S + R; totalR += R;
          if (won) { wins++; curWin++; curLose=0; maxWin=Math.max(maxWin,curWin); streak=streakType==="W"?streak+1:1; streakType="W"; }
          else if (lost) { losses++; curLose++; curWin=0; maxLose=Math.max(maxLose,curLose); streak=streakType==="L"?streak+1:1; streakType="L"; }
          else { draws++; curWin=0; curLose=0; streak=0; streakType=null; }

          oppTeam.forEach(oid => {
            if (!opponentStats[oid]) opponentStats[oid] = {w:0,l:0,d:0};
            if (won) opponentStats[oid].w++; else if (lost) opponentStats[oid].l++; else opponentStats[oid].d++;
            const oppTier = (m.tierSnapshot&&m.tierSnapshot[oid]) || getPlayer(oid)?.tier || "E";
            if (!tierStats[oppTier]) tierStats[oppTier] = {w:0,l:0};
            if (won) tierStats[oppTier].w++; else if (lost) tierStats[oppTier].l++;
          });
          myTeam.filter(id=>id!==pid).forEach(pid2 => {
            if (!partnerStats[pid2]) partnerStats[pid2] = {w:0,l:0};
            if (won) partnerStats[pid2].w++; else if (lost) partnerStats[pid2].l++;
          });
        });

        const total = wins+losses+draws;
        const winRate = total > 0 ? Math.round((wins/total)*100) : 0;
        const avgScore = total > 0 ? (totalFor/total).toFixed(1) : "0";
        const avgAgainst = total > 0 ? (totalAgainst/total).toFixed(1) : "0";
        const bestPartner = Object.entries(partnerStats).sort((a,b)=>b[1].w-a[1].w)[0];
        const nemesis = Object.entries(opponentStats).sort((a,b)=>b[1].l-a[1].l)[0];
        const favorite = Object.entries(opponentStats).sort((a,b)=>b[1].w-a[1].w)[0];

        // Tren poin per sesi
        const sessTrend = sessions.map(sess => {
          const sm = done.filter(m => m.sessionId===sess.id || (!m.sessionId&&sess.id===sessions[0]?.id));
          if (!sm.length) return null;
          let pts=0, w=0, l=0;
          sm.forEach(m => {
            const onT1=m.team1.includes(pid);
            const res=calcMatchResult(m,players);
            const S=onT1?res.t1S:res.t2S; const R=onT1?res.t1R:res.t2R;
            pts += (onT1?res.t1Score:res.t2Score)+S+R;
            if (onT1?res.t1Win:res.t2Win) w++; else if (onT1?res.t2Win:res.t1Win) l++;
          });
          return { label: sess.label, pts, w, l, matchCount: sm.length };
        }).filter(Boolean);

        return { total, wins, losses, draws, winRate, avgScore, avgAgainst, totalFor, totalAgainst, totalPts, totalR,
                 streak, streakType, maxWin, maxLose, opponentStats, partnerStats, tierStats,
                 bestPartner, nemesis, favorite, sessTrend };
      };

      const allMatches = matches;
      const sessMatches = matches.filter(m => m.sessionId===currentSessionId || (!m.sessionId&&sessions[0]?.id===currentSessionId));
      const stats = mode === "alltime" ? computeStats(player.id, allMatches) : computeStats(player.id, sessMatches);
      const pid = player.id;
      const tierHistory = (player.tierHistory||[]).filter(h=>h.type!=="init");

      const StatBox = ({label, value, sub, color="#16232E"}) => (
        <div style={{flex:1, background:"#FFFFFF", border:"1px solid #16232E0a", borderRadius:10, padding:"12px 10px", textAlign:"center"}}>
          <div style={{fontSize:22, fontWeight:800, color, fontFamily:"'DM Mono',monospace"}}>{value}</div>
          <div style={{fontSize:10, color:"#617181", marginTop:2}}>{label}</div>
          {sub && <div style={{fontSize:10, color:"#778899", marginTop:1}}>{sub}</div>}
        </div>
      );
      const diffTotal = stats.totalFor - stats.totalAgainst;
      const diffAvg = stats.total > 0 ? diffTotal / stats.total : 0;
      const signed = (n, digits = 0) => `${n >= 0 ? "+" : ""}${digits > 0 ? n.toFixed(digits) : n}`;

      return (
        <div style={{minHeight:"100vh", background:"#FAF7F2", color:"#16232E", maxWidth:430, margin:"0 auto"}}>
          {/* Header */}
          <div style={{background:"linear-gradient(135deg,#FFFFFF,#FAF7F2)", borderBottom:"1px solid #16232E18", padding:"16px 20px 0"}}>
            <div style={{display:"flex", alignItems:"center", gap:10, marginBottom:12}}>
              <button onClick={onBack} style={{background:"#16232E10", border:"none", borderRadius:8, padding:"6px 10px", color:"#44515E", fontSize:13, cursor:"pointer"}}>←</button>
              <div style={{width:38, height:38, borderRadius:10, background:"linear-gradient(135deg,#E4574F30,#E4574F30)", border:"1px solid #E4574F60", display:"flex", alignItems:"center", justifyContent:"center", fontSize:15, fontWeight:800, color:"#E4574F"}}>{player.name.slice(0,2).toUpperCase()}</div>
              <div style={{flex:1}}>
                <div style={{fontWeight:800, fontSize:16}}>{player.name}</div>
                <div style={{fontSize:11, color:"#44515E", display:"flex", alignItems:"center", gap:6}}><TierBadge tier={player.tier} small /> {stats.total} match dimainkan</div>
              </div>
            </div>
            {showModeSwitch && (
              <div style={{display:"flex", background:"#FAF7F2", borderRadius:10, padding:3, marginBottom:12, border:"1px solid #16232E10"}}>
                {[["alltime","🏆 All Time"],["session","📅 Sesi Ini"]].map(([k,l])=>(
                  <button key={k} onClick={()=>setMode(k)} style={{flex:1, padding:"7px 0", borderRadius:8, border:"none", cursor:"pointer", fontWeight:700, fontSize:12, background:mode===k?"#E4574F":"none", color:mode===k?"#fff":"#617181", fontFamily:"'DM Sans', sans-serif"}}>{l}</button>
                ))}
              </div>
            )}
          </div>

          <div style={{padding:"12px 16px 0", display:"flex", gap:8}}>
            <button onClick={handleDownloadPlayerStats} disabled={playerStatsShareBusy !== null} style={{flex:1, background:"#FFFFFF", border:"2px solid #16232E", borderRadius:16, padding:"12px 10px", cursor:playerStatsShareBusy !== null ? "default" : "pointer", color:"#44515E", fontWeight:800, fontSize:12, fontFamily:"'DM Sans', sans-serif"}}>{playerStatsShareBusy === "download" ? "⏳" : "💾"} Simpan Gambar</button>
            <button onClick={handleSharePlayerStatsWA} disabled={playerStatsShareBusy !== null} style={{flex:1, background:playerStatsShareBusy === "share" ? "#778899" : "#16232E", border:"2px solid #16232E", borderRadius:16, padding:"12px 10px", cursor:playerStatsShareBusy !== null ? "default" : "pointer", color:"#fff", fontWeight:800, fontSize:12, fontFamily:"'DM Sans', sans-serif"}}>{playerStatsShareBusy === "share" ? "⏳" : "💬"} Kirim WA</button>
          </div>

          <div ref={playerStatsRef} id="player-stats-board" style={{padding:"16px 16px 40px", display:"flex", flexDirection:"column", gap:14, background:"#FAF7F2"}}>

            <div style={{background:"#FFFFFF", border:"2px solid #16232E", borderRadius:18, padding:"12px 14px", boxShadow:"6px 8px 0 #16232E"}}>
              <div style={{fontSize:10, color:"#617181", fontWeight:800, letterSpacing:"0.08em", textTransform:"uppercase", marginBottom:4}}>Statistik Pemain · {mode === "alltime" ? "All Time" : "Sesi Ini"}</div>
              <div style={{display:"flex", alignItems:"center", gap:8}}>
                <div style={{fontFamily:"'Space Grotesk', sans-serif", fontStyle:"italic", fontWeight:700, fontSize:24, color:"#E4574F", textTransform:"uppercase", flex:1}}>{player.name}</div>
                <TierBadge tier={player.tier} />
              </div>
              <div style={{fontSize:11, color:"#44515E", marginTop:4}}>{stats.total} match dimainkan · {stats.wins}W {stats.draws}D {stats.losses}L</div>
            </div>

            {/* Overview boxes */}
            <div style={{display:"flex", gap:8}}>
              <StatBox label="Win Rate" value={`${stats.winRate}%`} sub={`${stats.wins}W ${stats.losses}L`} color={stats.winRate>=50?"#16232E":"#E4574F"} />
              <StatBox label="Total Poin" value={stats.totalPts} sub={`+${stats.totalR}R underdog`} color="#E4574F" />
              <StatBox label="rata point/match" value={stats.avgScore} sub={`${stats.avgAgainst} kehilangan point/match`} />
            </div>
            <div style={{display:"flex", gap:8}}>
              <StatBox label="Match" value={stats.total} sub={`${stats.wins}W ${stats.draws}D ${stats.losses}L`} />
              <StatBox label="Avg Menang" value={stats.total>0?`${Math.round((stats.wins/stats.total)*100)}%`:"—"} sub="per match" color="#9A6A00" />
              <StatBox label="Selisih Poin" value={signed(diffTotal)} color={diffTotal>=0?"#16232E":"#E4574F"} sub={`Total dari ${stats.total} match`} />
            </div>

            {/* Streak */}
            {stats.total > 0 && (
              <div style={{background:stats.streakType==="W"?"#16232E12":"#E4574F12", border:`1px solid ${stats.streakType==="W"?"#16232E25":"#E4574F25"}`, borderRadius:12, padding:"12px 16px", display:"flex", alignItems:"center", gap:12}}>
                <span style={{fontSize:28}}>{stats.streakType==="W"?"🔥":"🧊"}</span>
                <div>
                  <div style={{fontSize:14, fontWeight:700, color:stats.streakType==="W"?"#16232E":"#E4574F"}}>
                    {stats.streak > 0 && stats.streakType ? `${stats.streak} ${stats.streakType==="W"?"Menang":"Kalah"} Beruntun` : "Belum ada streak"}
                  </div>
                  <div style={{fontSize:11, color:"#617181"}}>Best: 🏆{stats.maxWin} menang · 😢{stats.maxLose} kalah beruntun</div>
                </div>
              </div>
            )}

            {/* Tren poin per sesi */}
            {stats.sessTrend.length > 0 && (
              <div style={{background:"#FFFFFF", border:"1px solid #16232E0a", borderRadius:12, padding:14}}>
                <div style={{display:"flex", alignItems:"center", justifyContent:"space-between", gap:10, marginBottom:10}}>
                  <div>
                    <div style={{fontSize:11, fontWeight:700, color:"#617181", letterSpacing:"0.06em"}}>📈 TREN POIN PER SESI</div>
                    {stats.sessTrend.length > 1 && (
                      <div style={{fontSize:10, color:"#778899", marginTop:2}}>
                        {trendRange === "all" ? "All Time" : `${Math.min(trendRange, stats.sessTrend.length)} sesi terakhir`} dari {stats.sessTrend.length} sesi tercatat
                      </div>
                    )}
                  </div>
                  {stats.sessTrend.length > 12 && (
                    <div style={{display:"flex", gap:4, background:"#FAF7F2", border:"1px solid #16232E14", borderRadius:8, padding:3}}>
                      {[[12,"12"],[24,"24"],["all","Semua"]].map(([value,label]) => (
                        <button key={label} onClick={() => setTrendRange(value)} style={{border:"none", borderRadius:6, padding:"5px 8px", background:trendRange===value?"#E4574F":"transparent", color:trendRange===value?"#fff":"#44515E", fontSize:10, fontWeight:700, cursor:"pointer"}}>{label}</button>
                      ))}
                    </div>
                  )}
                </div>
                {stats.sessTrend.length === 1 ? (
                  <div style={{fontSize:12, color:"#778899", textAlign:"center", padding:"8px 0"}}>Butuh minimal 2 sesi untuk melihat tren</div>
                ) : (
                  <div>
                    {(() => {
                      const visibleTrend = trendRange === "all" ? stats.sessTrend : stats.sessTrend.slice(-trendRange);
                      const maxPts = Math.max(...visibleTrend.map(s=>s.pts),1);
                      const first = visibleTrend[0];
                      const last = visibleTrend[visibleTrend.length-1];
                      const best = visibleTrend.reduce((top, s) => s.pts > top.pts ? s : top, first);
                      const delta = last.pts - first.pts;
                      const labelStep = visibleTrend.length > 36 ? 10 : visibleTrend.length > 24 ? 5 : visibleTrend.length > 12 ? 3 : 1;
                      return (
                        <>
                          <div style={{display:"flex", gap:8, marginBottom:10}}>
                            <div style={{flex:1, background:"#FAF7F2", border:"1px solid #16232E14", borderRadius:8, padding:"7px 9px"}}>
                              <div style={{fontSize:9, color:"#778899", fontWeight:700, letterSpacing:"0.05em"}}>PERUBAHAN</div>
                              <div style={{fontSize:14, color:delta>0?"#16232E":delta<0?"#E4574F":"#44515E", fontWeight:800}}>{delta>0?`+${delta}`:delta} pts</div>
                            </div>
                            <div style={{flex:1, background:"#FAF7F2", border:"1px solid #16232E14", borderRadius:8, padding:"7px 9px"}}>
                              <div style={{fontSize:9, color:"#778899", fontWeight:700, letterSpacing:"0.05em"}}>TERTINGGI</div>
                              <div style={{fontSize:14, color:"#16232E", fontWeight:800}}>{best.pts} <span style={{fontSize:10, color:"#617181", fontWeight:600}}>{best.label.replace("Sesi ","S")}</span></div>
                            </div>
                          </div>
                          <div style={{display:"flex", gap:3, alignItems:"flex-end", height:66, marginBottom:6}}>
                            {visibleTrend.map((s,i)=>{
                              const originalIndex = stats.sessTrend.length - visibleTrend.length + i;
                              const isLast = originalIndex===stats.sessTrend.length-1;
                              const prev = originalIndex>0?stats.sessTrend[originalIndex-1]:null;
                              const trend = prev ? (s.pts>prev.pts?"up":s.pts<prev.pts?"down":"flat") : "flat";
                              const showLabel = i===0 || i===visibleTrend.length-1 || i % labelStep === 0;
                              const barColor = isLast ? "linear-gradient(180deg,#E4574F,#E4574F)" : trend==="up"?"#16232E60":trend==="down"?"#E4574F60":"#16232E20";
                              return (
                                <div key={`${s.label}-${i}`} title={`${s.label}: ${s.pts} pts`} style={{flex:1, minWidth:trendRange==="all"?3:6, display:"flex", flexDirection:"column", alignItems:"center", gap:2}}>
                                  {(visibleTrend.length <= 24 || isLast || s.pts === best.pts) && <div style={{fontSize:8, color:"#617181", minHeight:10}}>{s.pts}</div>}
                                  <div style={{width:"100%", height:`${Math.max(6,(s.pts/maxPts)*48)}px`, background:barColor, borderRadius:"3px 3px 0 0"}} />
                                  <div style={{fontSize:8, color:showLabel?"#778899":"transparent", textAlign:"center", lineHeight:1, minHeight:9}}>{s.label.replace("Sesi ","S")}</div>
                                </div>
                              );
                            })}
                          </div>
                        </>
                      );
                    })()}
                    <div style={{display:"flex", gap:10, justifyContent:"center", marginTop:4}}>
                      {[["#16232E60","Naik"],["#E4574F60","Turun"],["linear-gradient(180deg,#E4574F,#E4574F)","Terkini"]].map(([c,l])=>(
                        <div key={l} style={{display:"flex", alignItems:"center", gap:4, fontSize:10, color:"#617181"}}>
                          <div style={{width:8, height:8, borderRadius:2, background:c}} />{l}
                        </div>
                      ))}
                    </div>
                  </div>
                )}
              </div>
            )}

            {/* Win rate vs tier */}
            {Object.keys(stats.tierStats).length > 0 && (
              <div style={{background:"#FFFFFF", border:"1px solid #16232E0a", borderRadius:12, padding:14}}>
                <div style={{fontSize:11, fontWeight:700, color:"#617181", letterSpacing:"0.06em", marginBottom:10}}>📊 WIN RATE VS TIER</div>
                <div style={{display:"flex", flexDirection:"column", gap:7}}>
                  {Object.entries(TIER_WEIGHT).filter(([t])=>stats.tierStats[t]).map(([tier])=>{
                    const ts = stats.tierStats[tier];
                    const tot = ts.w+ts.l;
                    const pct = tot>0?Math.round((ts.w/tot)*100):0;
                    const c = TIER_COLORS[tier];
                    return (
                      <div key={tier} style={{display:"flex", alignItems:"center", gap:8}}>
                        <span style={{fontSize:11, background:c.bg, color:c.text, border:`1px solid ${c.border}`, borderRadius:4, padding:"1px 6px", minWidth:28, textAlign:"center", fontWeight:700}}>Tier {tier}</span>
                        <div style={{flex:1, height:8, background:"#FAF7F2", borderRadius:99, overflow:"hidden"}}>
                          <div style={{height:"100%", width:`${pct}%`, background:pct>=50?"#16232E":"#E4574F", borderRadius:99, transition:"width 0.5s"}} />
                        </div>
                        <span style={{fontSize:12, color:pct>=50?"#16232E":"#E4574F", fontWeight:700, minWidth:36, textAlign:"right"}}>{pct}%</span>
                        <span style={{fontSize:10, color:"#778899", minWidth:44}}>{ts.w}W {ts.l}L</span>
                      </div>
                    );
                  })}
                </div>
              </div>
            )}

            {/* Highlights: Partner, Nemesis, Mangsa */}
            {(stats.bestPartner||stats.nemesis||stats.favorite) && (
              <div style={{display:"flex", flexDirection:"column", gap:8}}>
                <div style={{fontSize:11, fontWeight:700, color:"#617181", letterSpacing:"0.06em"}}>🎖 HIGHLIGHTS</div>
                {stats.bestPartner && (
                  <div style={{background:"#16232E12", border:"1px solid #16232E25", borderRadius:18, padding:"10px 14px", display:"flex", alignItems:"center", gap:10}}>
                    <span style={{fontSize:20}}>🤝</span>
                    <div style={{flex:1}}>
                      <div style={{fontSize:11, color:"#16232E", fontWeight:700}}>PARTNER TERBAIK</div>
                      <div style={{fontSize:14, fontWeight:700, color:"#16232E"}}>{getPlayer(parseInt(stats.bestPartner[0]))?.name||"?"}</div>
                    </div>
                    <div style={{textAlign:"right"}}>
                      <div style={{fontSize:13, fontWeight:700, color:"#16232E"}}>{stats.bestPartner[1].w}W</div>
                      <div style={{fontSize:10, color:"#617181"}}>{stats.bestPartner[1].l}L bersama</div>
                    </div>
                  </div>
                )}
                {stats.nemesis && stats.nemesis[1].l > 0 && (
                  <div style={{background:"#ef444412", border:"1px solid #ef444425", borderRadius:18, padding:"10px 14px", display:"flex", alignItems:"center", gap:10}}>
                    <span style={{fontSize:20}}>😤</span>
                    <div style={{flex:1}}>
                      <div style={{fontSize:11, color:"#E4574F", fontWeight:700}}>MUSUH BEBUYUTAN</div>
                      <div style={{fontSize:14, fontWeight:700, color:"#16232E"}}>{getPlayer(parseInt(stats.nemesis[0]))?.name||"?"}</div>
                    </div>
                    <div style={{textAlign:"right"}}>
                      <div style={{fontSize:13, fontWeight:700, color:"#E4574F"}}>Kalah {stats.nemesis[1].l}x</div>
                      <div style={{fontSize:10, color:"#617181"}}>Menang {stats.nemesis[1].w}x</div>
                    </div>
                  </div>
                )}
                {stats.favorite && stats.favorite[1].w > 0 && (
                  <div style={{background:"#F0B42912", border:"1px solid #F0B42925", borderRadius:18, padding:"10px 14px", display:"flex", alignItems:"center", gap:10}}>
                    <span style={{fontSize:20}}>🎯</span>
                    <div style={{flex:1}}>
                      <div style={{fontSize:11, color:"#9A6A00", fontWeight:700}}>MANGSA EMPUK</div>
                      <div style={{fontSize:14, fontWeight:700, color:"#16232E"}}>{getPlayer(parseInt(stats.favorite[0]))?.name||"?"}</div>
                    </div>
                    <div style={{textAlign:"right"}}>
                      <div style={{fontSize:13, fontWeight:700, color:"#9A6A00"}}>Menang {stats.favorite[1].w}x</div>
                      <div style={{fontSize:10, color:"#617181"}}>Kalah {stats.favorite[1].l}x</div>
                    </div>
                  </div>
                )}
              </div>
            )}

            {/* Riwayat Tier */}
            {tierHistory.length > 0 && (
              <div style={{background:"#FFFFFF", border:"1px solid #16232E0a", borderRadius:12, padding:14}}>
                <div style={{fontSize:11, fontWeight:700, color:"#617181", letterSpacing:"0.06em", marginBottom:8}}>📋 RIWAYAT TIER</div>
                {tierHistory.map((h,i)=>(
                  <div key={i} style={{display:"flex", alignItems:"center", gap:8, padding:"6px 0", borderBottom:i<tierHistory.length-1?"1px solid #16232E08":"none"}}>
                    <span style={{fontSize:13}}>{(h.type==="naik"||h.type==="resmi")?"🚀":"🔧"}</span>
                    <span style={{fontFamily:"'DM Mono',monospace", fontSize:12, color:(h.type==="naik"||h.type==="resmi")?"#E4574F":"#9A6A00", fontWeight:700}}>{h.from}→{h.to}</span>
                    <span style={{fontSize:12, color:"#16232E", flex:1}}>{h.sessionLabel}</span>
                    <span style={{fontSize:11, color:"#778899"}}>{h.date}</span>
                  </div>
                ))}
              </div>
            )}

            {/* H2H Rekor Lawan */}
            {Object.keys(stats.opponentStats).length > 0 && (
              <div style={{background:"#FFFFFF", border:"1px solid #16232E0a", borderRadius:12, padding:14}}>
                <div style={{fontSize:11, fontWeight:700, color:"#617181", letterSpacing:"0.06em", marginBottom:8}}>⚔️ REKOR LAWAN</div>
                {Object.entries(stats.opponentStats).sort((a,b)=>(b[1].w+b[1].l)-(a[1].w+a[1].l)).map(([oid, stat])=>{
                  const opp = getPlayer(parseInt(oid));
                  if (!opp) return null;
                  const tot = stat.w+stat.l+stat.d;
                  const pct = tot>0?Math.round((stat.w/tot)*100):0;
                  return (
                    <div key={oid} style={{display:"flex", alignItems:"center", gap:8, padding:"7px 0", borderBottom:"1px solid #16232E06"}}>
                      <TierBadge tier={opp.tier} small />
                      <span style={{flex:1, fontSize:13, color:"#16232E", fontWeight:500}}>{opp.name}</span>
                      <span style={{fontSize:12, color:"#16232E", fontFamily:"'DM Mono',monospace"}}>{stat.w}W</span>
                      {stat.d>0&&<span style={{fontSize:12, color:"#9A6A00", fontFamily:"'DM Mono',monospace"}}>{stat.d}D</span>}
                      <span style={{fontSize:12, color:"#E4574F", fontFamily:"'DM Mono',monospace"}}>{stat.l}L</span>
                      <span style={{fontSize:11, color:pct>=50?"#16232E":"#E4574F", fontWeight:700, minWidth:34, textAlign:"right"}}>{pct}%</span>
                    </div>
                  );
                })}
              </div>
            )}

            {stats.total === 0 && (
              <div style={{textAlign:"center", padding:"40px 16px", color:"#617181"}}>
                <div style={{fontSize:32, marginBottom:12}}>🏸</div>
                <div style={{fontSize:14, fontWeight:600}}>Belum ada data match</div>
                <div style={{fontSize:12, marginTop:4}}>{mode==="session"?"Belum ada match di sesi ini":"Pemain ini belum pernah bermain"}</div>
              </div>
            )}

          </div>
        </div>
      );
    }

    // ===== SESSION SCREEN =====
    function SessionScreen({ sessions, matches, players, checkedIn, checkedInBySession, currentSessionId, wsName, wsEmoji, readOnly = false, onSelectSession, onNewSession, onDeleteSession, onBack, onBackup, onRestore, onEditPlayer, onAddPlayer, onDeletePlayer, onViewStats, newPlayerName, setNewPlayerName, newPlayerTier, setNewPlayerTier }) {
      const medals = ["🥇","🥈","🥉"];
      const [sessionTab, setSessionTab] = React.useState("sessions"); // sessions | players | rules
      const [allTimeShareBusy, setAllTimeShareBusy] = React.useState(null);

      const getAllTimeStandingsBlob = async () => {
        const el = document.getElementById("alltime-standings-board");
        if (!el || !window.html2canvas) throw new Error("Klasemen All Time belum siap");
        const originalCss = el.style.cssText;
        el.style.width = "430px";
        el.style.maxWidth = "430px";
        const canvas = await window.html2canvas(el, { backgroundColor: "#FAF7F2", scale: 2, useCORS: true });
        el.style.cssText = originalCss;
        return new Promise(resolve => canvas.toBlob(resolve, "image/jpeg", 0.9));
      };

      const handleDownloadAllTimeImage = async () => {
        setAllTimeShareBusy("download");
        try {
          const blob = await getAllTimeStandingsBlob();
          const url = URL.createObjectURL(blob);
          const a = document.createElement("a");
          a.href = url;
          a.download = `Klasemen-All-Time-CourtRank-${new Date().toISOString().slice(0, 10)}.jpg`;
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          URL.revokeObjectURL(url);
        } catch (e) {
          console.error(e);
        }
        setAllTimeShareBusy(null);
      };

      const handleShareAllTimeWA = async (allTimeStandings, allDoneMatches) => {
        setAllTimeShareBusy("share");
        try {
          const blob = await getAllTimeStandingsBlob();
          const file = new File([blob], "klasemen-all-time.jpg", { type: "image/jpeg" });
          let textMsg = `🏆 *KLASEMEN ALL TIME COURTRANK*\n\n`;
          textMsg += `${wsName} · ${sessions.length} sesi · ${allDoneMatches.length} match selesai\n`;
          if (allTimeStandings.length > 0) {
            const wow = allTimeStandings[0];
            const sos = allTimeStandings.length > 1 ? allTimeStandings[allTimeStandings.length - 1] : null;
            let mbgAt = null, maxR = 0;
            allTimeStandings.forEach(p => {
              if (p.totalR > maxR) {
                maxR = p.totalR;
                mbgAt = p;
              }
            });
            textMsg += `\n🏆 *WOW ALL TIME: ${wow.name}*`;
            textMsg += `\n(Winner Over Winners) · ${wow.P} pts · ${wow.W}W ${wow.L}L`;
            if (sos) {
              textMsg += `\n\n🤡 *SOS ALL TIME: ${sos.name}*`;
              textMsg += `\n(Score Optimization Needed) · ${sos.P} pts`;
            }
            if (mbgAt) {
              textMsg += `\n\n📈 *MBG ALL TIME: ${mbgAt.name}*`;
              textMsg += `\n(Making Big Gains) · +${mbgAt.totalR}R`;
            }
          }
          if (navigator.canShare && navigator.canShare({ files: [file] })) {
            await navigator.share({ title: "Klasemen All Time CourtRank", text: textMsg, files: [file] });
          } else {
            window.open(`https://wa.me/?text=${encodeURIComponent(textMsg)}`, "_blank");
          }
        } catch (e) {
          if (e.name !== "AbortError") console.error(e);
        }
        setAllTimeShareBusy(null);
      };

      const getSessionStats = (sess) => {
        const sessMatches = matches.filter(m => m.status === "done" && (m.sessionId === sess.id || (!m.sessionId && sess.id === sessions[0]?.id)));
        const sessCheckedIn = new Set(checkedInBySession?.[sess.id] || []);
        const sessStandings = buildStandings(players, sessMatches, sessCheckedIn).filter(p => sessCheckedIn.has(p.id));
        const wow = sessStandings[0] || null;
        const sos = sessStandings.length > 1 ? sessStandings[sessStandings.length - 1] : null;
        // MBG: Making Big Gains, pemain dengan subsidi tier terbesar
        let mbg = null, maxR = 0;
        sessStandings.forEach(p => { if (p.totalR > maxR) { maxR = p.totalR; mbg = p; } });

        return { matchCount: sessMatches.length, wow, sos, mbg: maxR > 0 ? mbg : null };
      };

      return (
        <div style={{ minHeight: "100vh", background: "#FAF7F2", color: "#16232E", maxWidth: 430, margin: "0 auto" }}>
          {/* Header */}
          <div style={{ background: "linear-gradient(135deg, #FFFFFF, #FAF7F2)", borderBottom: "2px solid #16232E", padding: "16px 20px 0" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 12 }}>
              <button onClick={onBack} style={{ background: "#16232E10", border: "none", borderRadius: 16, padding: "8px 12px", color: "#44515E", fontSize: 13, cursor: "pointer" }}>←</button>
              <div style={{ width: 34, height: 34, borderRadius: 9, background: "#E4574F", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 18 }}>{wsEmoji}</div>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontFamily: "'Space Grotesk', sans-serif", fontStyle: "normal", fontWeight: 700, fontSize: 20, color: "#E4574F", textTransform: "uppercase", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis", lineHeight: 1.1 }}>{wsName}</div>
                <div style={{ fontSize: 11, color: "#44515E" }}>{sessions.length} sesi · {players.length} pemain · {matches.filter(m => m.status === "done").length} match</div>
              </div>
              {readOnly ? (
                <div style={{ background: "#16232E12", border: "1px solid #16232E35", color: "#16232E", borderRadius: 12, padding: "6px 8px", fontSize: 10, fontWeight: 850, whiteSpace: "nowrap" }}>Lihat saja</div>
              ) : (
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 5, minWidth: 92 }}>
                  <button title="Backup data Arena" onClick={onBackup} style={{ background: "#FFFFFF", border: "1.5px solid #16232E", color: "#44515E", borderRadius: 11, padding: "6px 4px", fontSize: 10, fontWeight: 850, cursor: "pointer" }}>Backup</button>
                  <button title="Load file backup" onClick={onRestore} style={{ background: "#FFFFFF", border: "1.5px solid #16232E", color: "#44515E", borderRadius: 11, padding: "6px 4px", fontSize: 10, fontWeight: 850, cursor: "pointer" }}>Load</button>
                </div>
              )}
            </div>
            <div style={{ display: "flex", gap: 0 }}>
              {[
                { key: "sessions", icon: "📅", text: "Sesi" },
                { key: "alltime", icon: "🏆", text: "Klasemen" },
                { key: "stats", icon: "📊", text: "Statistik" },
                { key: "players", icon: "👥", text: "Pemain" },
                { key: "rules", icon: "📖", text: "Aturan" },
              ].map(t => (
                <button key={t.key} onClick={() => setSessionTab(t.key)} style={{
                  flex: 1, minWidth: 0, height: 40, background: "none", border: "none", cursor: "pointer",
                  padding: "0 2px", fontSize: 11, fontWeight: sessionTab === t.key ? 700 : 500,
                  color: sessionTab === t.key ? "#E4574F" : "#617181",
